<html lang="de" dir="ltr">
<head>

  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body.ops-app {
      font-family: system-ui, "Segoe UI", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 0;
    }
    a { color: var(--accent); }
    header.ops-header {
      flex-shrink: 0;
      position: relative;
      top: auto;
      padding: 0.75rem 1.25rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      z-index: 20;
    }
    header h1 { margin: 0; font-size: 1.1rem; }
    .nav a { text-decoration: none; font-size: 0.82rem; padding: 0.35rem 0.6rem; border: 1px solid var(--border); border-radius: 8px; }
    #authErr { flex-shrink: 0; margin: 0.5rem 1rem; }
    .shell {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 220px minmax(0, 1fr) 300px;
      grid-template-rows: minmax(0, 1fr);
      gap: 0.75rem;
      padding: 0.75rem;
      max-width: 1680px;
      width: 100%;
      margin: 0 auto;
      align-self: stretch;
    }
    @media (max-width: 1200px) {
      .shell:not(.embed-shell) {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 140px) minmax(0, 1fr) minmax(0, 200px);
      }
      .shell:not(.embed-shell) .side { order: 1; }
      .shell:not(.embed-shell) .chat { order: 2; }
      .shell:not(.embed-shell) .insights { order: 3; }
    }
    body.embed-mode {
      height: 100%;
      overflow: hidden;
    }
    body.embed-mode header.ops-header {
      padding: 0.45rem 0.75rem;
    }
    body.embed-mode header.ops-header h1 {
      font-size: 0.95rem;
    }
    body.embed-mode header.ops-header .nav a:not(.embed-keep) {
      display: none;
    }
    body.embed-mode .shell.embed-shell {
      grid-template-columns: 170px minmax(0, 1fr) 240px;
      grid-template-rows: minmax(0, 1fr);
      padding: 0.5rem;
      gap: 0.5rem;
    }
    @media (max-width: 900px) {
      body.embed-mode .shell.embed-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(88px, auto) minmax(320px, 1fr) minmax(140px, auto);
      }
    }
    .panel {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
    }
    .panel h2 { margin: 0; padding: 0.65rem 0.85rem; font-size: 0.9rem; border-bottom: 1px solid var(--border); flex-shrink: 0; }
    .panel .toolbar { flex-shrink: 0; }
    .agent-tabs { flex-shrink: 0; }
    .chip-row { flex-shrink: 0; }
    .chat-form { flex-shrink: 0; }
    .scroll {
      overflow-x: hidden;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding: 0.65rem;
      -webkit-overflow-scrolling: touch;
    }
    .agent-tabs { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.5rem; border-bottom: 1px solid var(--border); }
    .agent-tabs button {
      font-size: 0.72rem; padding: 0.3rem 0.55rem; border-radius: 999px; cursor: pointer;
      border: 1px solid var(--border); background: #0c1218; color: var(--muted);
    }
    .agent-tabs button.active { border-color: var(--accent); color: var(--accent); background: #14242a; }
    #chatLog { display: flex; flex-direction: column; gap: 0.5rem; min-height: 0; }
    .msg-user { background: #1e3a5f; padding: 0.55rem; border-radius: 8px; font-size: 0.85rem; white-space: pre-wrap; }
    .msg-bot { background: #152228; padding: 0.55rem; border-radius: 8px; font-size: 0.85rem; white-space: pre-wrap; }
    .msg-meta { font-size: 0.68rem; color: var(--muted); margin-top: 0.25rem; }
    .chat-form { padding: 0; border-top: none; display: flex; flex-direction: column; gap: 0; flex-shrink: 0; }
    .chat-form .input-row { display: flex; gap: 0.4rem; align-items: stretch; }
    .toolbar button {
      padding: 0.45rem 0.75rem; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #061018; font-weight: 700; font-size: 0.8rem;
    }
    .toolbar button.secondary { background: #1a2e3a; color: var(--text); border: 1px solid var(--border); }
    .session-item {
      display: block; width: 100%; text-align: start; padding: 0.45rem 0.5rem; margin-bottom: 0.35rem;
      border-radius: 8px; border: 1px solid transparent; background: #0c1218; color: var(--text);
      cursor: pointer; font-size: 0.78rem;
    }
    .session-item.active { border-color: var(--accent); }
    .session-item small { display: block; color: var(--muted); font-size: 0.68rem; }
    .session-row {
      display: flex; align-items: stretch; gap: 0.25rem; margin-bottom: 0.35rem;
    }
    .session-row .session-item { flex: 1; margin-bottom: 0; min-width: 0; }
    .session-row.active .session-item { border-color: var(--accent); }
    .session-delete {
      flex: 0 0 auto; width: 2rem; border-radius: 8px; border: 1px solid var(--border);
      background: #0c1218; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1;
    }
    .session-delete:hover { color: var(--danger); border-color: var(--danger); }
    .chat-toolbar {
      display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.45rem 0.65rem 0;
      border-bottom: 1px solid var(--border);
    }
    .chat-toolbar button.secondary {
      padding: 0.35rem 0.65rem; border-radius: 8px; border: 1px solid var(--border);
      background: #1a2e3a; color: var(--text); cursor: pointer; font-size: 0.75rem;
    }
    .chat-toolbar button.secondary:hover { border-color: var(--danger); color: var(--danger); }
    .insight-card {
      border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem 0.65rem; margin-bottom: 0.45rem;
      font-size: 0.78rem;
    }
    .insight-card.critical { border-color: var(--danger); }
    .insight-card.high { border-color: var(--warn); }
    .insight-card strong { color: var(--accent); font-size: 1rem; }
    .insight-card .card-actions { margin-top: 0.45rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .insight-card .card-actions button {
      font-size: 0.68rem; padding: 0.25rem 0.5rem; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: #14242a; color: var(--accent);
    }
    .playbook-block { margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .playbook-block h3 { margin: 0 0 0.4rem; font-size: 0.78rem; color: var(--accent); font-weight: 600; }
    .issue-row {
      padding: 0.4rem 0.5rem; margin-bottom: 0.35rem; border-radius: 8px; background: #0c1218;
      font-size: 0.75rem; cursor: pointer; border: 1px solid transparent;
    }
    .issue-row:hover { border-color: var(--accent); }
    .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      margin-inline-end: 0.35rem; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .toast {
      position: fixed; bottom: 1rem; right: 1rem; padding: 0.55rem 0.85rem; border-radius: 10px;
      background: #14242a; border: 1px solid var(--accent); font-size: 0.8rem; z-index: 100;
      animation: fadein 0.25s ease;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .chip-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.35rem 0; }
    .chip-row button {
      font-size: 0.68rem; padding: 0.2rem 0.45rem; border-radius: 999px;
      border: 1px solid var(--border); background: #0a1016; color: var(--muted); cursor: pointer;
    }
    select, #companySelect {
      padding: 0.4rem 0.55rem; border-radius: 8px; border: 1px solid var(--border);
      background: #0a1016; color: var(--text); font-size: 0.82rem;
    }
    .status-line { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .hidden { display: none !important; }
    .err { color: var(--danger); padding: 1rem; }
  </style>
</head>
<body class="ops-app">
  <header class="ops-header">
    <div>
      <h1 id="pageTitle">BauPass KI Command Center</h1>
      <div class="status-line" id="statusLine"></div>
    </div>
    <nav class="nav">
      <select id="companySelect" class="hidden"></select>
      <a id="navEnterpriseHub" href="/enterprise-hub.html">Enterprise Hub</a>
      <a id="navAdminV2" href="/admin-v2/index.html">Admin v2</a>
      <a id="navPosteingang" href="/admin-v2/index.html">Posteingang</a>
      <a id="navOpsLive" href="/ops-command-center.html">Ops Live</a>
    </nav>
  </header>

  <div id="authErr" class="err hidden">
    <span id="authErrText">Bitte anmelden.</span>
    <a id="authLoginLink" href="/admin-v2/index.html?login=1" style="margin-inline-start:0.5rem">Anmelden</a>
    · <a id="authControlPassLink" href="/index.html">Control Pass</a>
  </div>

  <div class="shell hidden embed-shell" id="shell">
    <aside class="panel side">
      <h2 id="sessionsTitle">Chats</h2>
      <div class="toolbar" style="padding:0.5rem;display:flex;gap:0.35rem;flex-wrap:wrap">
        <button type="button" class="secondary" id="newChatBtn">+ Neu</button>
        <button type="button" class="secondary" id="deleteAllChatsBtn">Alle löschen</button>
      </div>
      <div class="scroll" id="sessionList"></div>
    </aside>

    <main class="panel chat">
      <div class="agent-tabs" id="agentTabs"></div>
      <div class="chat-toolbar">
        <button type="button" class="secondary" id="exportChatBtn">Chat exportieren</button>
        <button type="button" class="secondary" id="clearChatBtn">Chat leeren</button>
      </div>
      <div class="scroll" id="chatLog"></div>
      <div class="chip-row" id="quickPrompts" style="padding:0 0.65rem"></div>
      <form class="chat-form" id="chatForm">
        <div class="input-row">
          <textarea id="question" rows="1" placeholder="Frage stellen…"></textarea>
          <button type="button" id="aiVoiceBtn" aria-label="Spracheingabe"></button>
          <button type="submit" id="sendBtn" aria-label="Senden"></button>
        </div>
        <details class="bp-ai-tools-panel">
          <summary id="toolsPanelSummary">Tools &amp; Briefings</summary>
          <div class="bp-ai-tools-row">
            <button type="button" class="secondary" id="briefingBtn">Tagesbriefing</button>
            <button type="button" class="secondary" id="emailBriefingBtn">Briefing mailen</button>
            <button type="button" class="secondary" id="webhookBriefingBtn">Slack/Teams</button>
          </div>
        </details>
      </form>
    </main>

    <aside class="panel insights">
      <h2 id="insightsTitle">Live Insights</h2>
      <div class="toolbar" style="padding:0.5rem;display:flex;flex-wrap:wrap;gap:0.35rem">
        <button type="button" class="secondary" data-topic="security">Security</button>
        <button type="button" class="secondary" data-topic="compliance">Compliance</button>
        <button type="button" class="secondary" data-topic="attendance">Attendance</button>
        <button type="button" class="secondary" data-topic="executive">Executive</button>
      </div>
      <div class="scroll" id="insightCards"></div>
    </aside>
  </div>

    const t = (k) => (I18N[LANG] || I18N.de)[k] || k;
    function formatStatusLine(data, ts) {
      return t("statusLine")
        .replace("{onsite}", data?.snapshot?.workersOnSite ?? "—")
        .replace("{security}", data?.snapshot?.openSecurityFindings ?? 0)
        .replace("{queries}", data?.usage?.queries ?? 0)
        .replace("{refreshed}", t("refreshed"))
        .replace("{time}", ts);

    const CARD_LABELS = {
      de: { onsite: "Auf Baustelle", security: "Sicherheit", workforceRisk: "Risiko", attendanceRisk: "Ausfallrisiko", fraud: "Betrug", productivity: "Produktivität", emergency: "Notfall", tomorrowForecast: "Prognose morgen" },
      en: { onsite: "On site", security: "Security", workforceRisk: "Risk", attendanceRisk: "Attendance risk", fraud: "Fraud", productivity: "Productivity", emergency: "Emergency", tomorrowForecast: "Tomorrow forecast" },
      ar: { onsite: "على الموقع", security: "الأمن", workforceRisk: "المخاطر", attendanceRisk: "غياب", fraud: "احتيال", productivity: "الإنتاجية", emergency: "طوارئ", tomorrowForecast: "توقعات الغد" },

    let selectedCompanyId = new URLSearchParams(location.search).get("company_id") || "";

    let sessions = [];

    function readStoredCompanyId() {
      return window.BaupassAuth?.readStoredCompanyId?.() || "";
    }

    function resolveCompanyId(user) {
      if (window.BaupassAuth?.resolveCompanyIdFromUser) {
        return window.BaupassAuth.resolveCompanyIdFromUser(user || bootUser || {});
      }
      const qs = (new URLSearchParams(location.search).get("company_id") || "").trim();
      if (qs) return qs;
      const u = user || bootUser || {};
      const role = String(u.role || currentRole || "");
      if (role === "company-admin") {
        return String(u.company_id || "").trim() || readStoredCompanyId();
      }
      if (role === "superadmin") {
        return String(u.preview_company_id || "").trim() || readStoredCompanyId();
      }
      return String(u.company_id || "").trim() || readStoredCompanyId();
    }

    function syncSelectedCompanyId(user, { reload = false } = {}) {
      const resolved = resolveCompanyId(user);
      if (!resolved) return false;
      const changed = resolved !== selectedCompanyId;
      selectedCompanyId = resolved;
      const sel = document.getElementById("companySelect");
      if (sel && [...sel.options].some((o) => o.value === resolved)) {
        sel.value = resolved;
      }
      if (changed && reload) {
        boot().catch(() => {});
        startInsightsRealtime();
      }
      return true;
    }

    function companyRequiredForUi() {
      syncSelectedCompanyId(bootUser);
      return currentRole === "superadmin" && !selectedCompanyId;
    }

    function actionLabel(a) {
      const key = "label" + LANG.charAt(0).toUpperCase() + LANG.slice(1);
      return a[key] || a.labelDe || a.labelEn || a.action || a.id;
    }

    function attachMeta(div, meta) {
      if (meta.sources?.length || meta.toolsUsed?.length) {
        const m = document.createElement("div");
        m.className = "msg-meta";
        const parts = [];
        if (meta.toolsUsed?.length) parts.push(`${t("tools")}: ${meta.toolsUsed.join(", ")}`);
        if (meta.sources?.length) parts.push(`${t("sources")}: ${meta.sources.join(" · ")}`);
        m.textContent = parts.join(" | ");
        div.appendChild(m);
      }
      const actionList = meta.actions?.length ? meta.actions : meta.suggestedActions;
      if (actionList?.length) {
        if (window.BaupassAiUi) {
          window.BaupassAiUi.renderActionButtons(div, actionList, LANG);
        } else {
          const row = document.createElement("div");
          row.className = "chip-row";
          row.style.marginTop = "0.35rem";
          actionList.forEach((a) => {
            const b = document.createElement("button");
            b.type = "button";
            b.textContent = actionLabel(a);
            if (a.type === "navigate" && a.url) b.onclick = () => { location.href = a.url; };
            else if (a.type === "execute") b.onclick = () => runExecuteAction(a, lastAnswerText);
            row.appendChild(b);
          });
          div.appendChild(row);
        }
      }
    }

    async function runExecuteAction(a, text) {
      const action = a.action;
      if (action === "send_briefing_webhook") {
        try {
          const r = await api("/api/ai/actions/execute", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "send_briefing_webhook",
              company_id: selectedCompanyId,
              briefing_text: text || lastAnswerText,
            }),
          });
          appendMsg("bot", r.ok ? `${t("webhookOk")} (${r.sent}/${r.total})` : (r.error || "—"), {});
        } catch (e) {
          appendMsg("bot", e.payload?.hint || e.message, {});
        }
        return;
      }
      if (action === "send_briefing_email") {
        const to = prompt(t("emailPrompt"));
        if (!to) return;
        try {
          const r = await api("/api/ai/briefing/email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ to, company_id: selectedCompanyId, lang: LANG, body: text }),
          });
          appendMsg("bot", r.ok ? t("emailOk") : (r.error || t("emailFail")), {});
        } catch (e) {
          appendMsg("bot", e.payload?.error || e.message, {});
        }
        return;
      }
      if (action === "approve_leave_request" || action === "reject_leave_request" || action === "notify_worker") {
        try {
          const r = await api("/api/ai/actions/execute", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action, params: a.params || {}, company_id: selectedCompanyId }),
          });
          appendMsg("bot", r.ok ? `✓ ${action}` : (r.error || "—"), {});
        } catch (e) {
          appendMsg("bot", e.payload?.hint || e.message, {});
        }
        return;
      }
      if (action === "export_briefing_markdown") {
        const blob = new Blob([text || lastAnswerText], { type: "text/markdown" });
        const aEl = document.createElement("a");
        aEl.href = URL.createObjectURL(blob);
        aEl.download = `baupass-briefing-${new Date().toISOString().slice(0, 10)}.md`;
        aEl.click();
        return;
      }
      try {
        const r = await api("/api/ai/actions/execute", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action, params: a.params || {}, company_id: selectedCompanyId, briefing_text: text }),
        });
        appendMsg("bot", r.ok ? JSON.stringify(r) : (r.error || "—"), {});
      } catch (e) {
        appendMsg("bot", e.payload?.hint || e.message, {});
      }
    }

    applyUiLanguage();

    function authHeaders(extra = {}) {
      if (window.BaupassAuth) return window.BaupassAuth.authHeaders(extra);
      const headers = { ...extra };
      const token = (localStorage.getItem("baupass-control-token") || localStorage.getItem("baupass-admin-v2-token") || "").trim();
      if (token && !headers.Authorization) headers.Authorization = `Bearer ${token}`;
      return headers;
    }

    function showAuthError() {
      document.getElementById("authErr")?.classList.remove("hidden");
      document.getElementById("shell")?.classList.add("hidden");
    }

    function showApp() {
      document.getElementById("authErr")?.classList.add("hidden");
      document.getElementById("shell")?.classList.remove("hidden");
    }

    async function bootstrapSession() {
      if (window.BaupassAuth?.bootstrapSession) {
        return window.BaupassAuth.bootstrapSession();
      }
      const data = await api("/api/session/bootstrap");
      if (data?.authenticated === false || !data?.user?.role) throw new Error("auth");
      return data;
    }

    async function api(path, opts = {}) {
      const headers = authHeaders(opts.headers || {});
      const res = await fetch(path, { credentials: "include", ...opts, headers });
      const data = await res.json().catch(() => ({}));
      if (res.status === 401) throw new Error("auth");
      if (!res.ok) { const e = new Error(data.hint || data.error || res.statusText); e.payload = data; throw e; }
      return data;
    }

    function appendMsg(role, text, meta = {}) {
      const log = document.getElementById("chatLog");
      const div = document.createElement("div");
      div.className = role === "user" ? "msg-user" : "msg-bot";
      div.textContent = text;
      if (role === "bot") {
        lastAnswerText = text;
        attachMeta(div, meta);
      }
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
      return div;
    }

          selectedCompanyId = sel.value || "";

        const st = await api(`/api/ai/status?lang=${encodeURIComponent(LANG)}`);

    function renderSessions() {
      const el = document.getElementById("sessionList");
      if (!sessions.length) {
        el.innerHTML = `<p class="status-line">${t("noChats")}</p>`;
        return;
      }
      el.innerHTML = sessions.map((s) =>
        `<div class="session-row ${s.id === sessionId ? "active" : ""}">
          <button type="button" class="session-item" data-id="${s.id}">
            <span>${escapeHtml(s.title || s.id)}</span><small>${escapeHtml(s.agentId)} · ${escapeHtml((s.updatedAt || "").slice(0, 16))}</small>

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");

    async function deleteSession(id, { confirm = true } = {}) {
      if (!id || companyRequiredForUi()) return;
      if (confirm && !window.confirm(t("confirmDeleteChat"))) return;
      await api(`/api/ai/sessions/${encodeURIComponent(id)}?${companyQs()}`, { method: "DELETE" });

    async function deleteAllSessions() {
      if (companyRequiredForUi() || !sessions.length) return;
      if (!window.confirm(t("confirmDeleteAllChats"))) return;
      await api(`/api/ai/sessions?${companyQs()}`, { method: "DELETE" });
      sessionId = "";
      document.getElementById("chatLog").innerHTML = "";
      await loadSessions();
      showToast(t("allChatsDeleted"));

    async function clearCurrentChat() {
      if (companyRequiredForUi()) {
        appendMsg("bot", t("needCompany"));
        return;
      }
      const hasMessages = document.getElementById("chatLog")?.children?.length > 0;
      if (!sessionId && !hasMessages) return;
      if (!window.confirm(t("confirmClearChat"))) return;
      if (sessionId) {
        await deleteSession(sessionId, { confirm: false });
      } else {
        document.getElementById("chatLog").innerHTML = "";
        showToast(t("chatCleared"));
      }

    async function exportCurrentChat() {
      const lines = [];
      if (sessionId) {
        try {
          const data = await api(`/api/ai/sessions/${sessionId}?${companyQs()}`);
          (data.messages || []).forEach((m) => {
            const role = m.role === "user" ? t("exportRoleUser") : t("exportRoleAi");
            lines.push(`**${role}:** ${m.content || ""}`);
          });
        } catch (e) {
          showToast(e.payload?.hint || e.message);
          return;
        }
      } else {
        document.querySelectorAll("#chatLog > div").forEach((node) => {
          const role = node.classList.contains("msg-user") ? t("exportRoleUser") : t("exportRoleAi");
          lines.push(`**${role}:** ${node.textContent || ""}`);
        });
      }
      if (!lines.length) {
        showToast(t("exportChatEmpty"));
        return;
      }
      const title = sessions.find((s) => s.id === sessionId)?.title || t("exportDefaultTitle");
      const body = `# ${title}\n\n${lines.join("\n\n")}\n`;
      const blob = new Blob([body], { type: "text/markdown;charset=utf-8" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `baupass-ki-${new Date().toISOString().slice(0, 10)}.md`;
      a.click();
      URL.revokeObjectURL(a.href);
    }

    function showToast(msg) {
      const el = document.createElement("div");
      el.className = "toast";
      el.textContent = msg;
      document.body.appendChild(el);
      setTimeout(() => el.remove(), 2800);
    }

    function runInsightAction(a) {
      if (!a) return;
      if (a.type === "navigate" && a.url) {
        const u = a.url.includes("?") ? a.url : `${a.url}?${companyQs()}`;
        location.href = u;
        return;
      }
      if (a.type === "analyze" && a.topic) {
        document.querySelector(`[data-topic="${a.topic}"]`)?.click();
        return;
      }
      if (a.type === "prompt" && a.prompt) submitQuestion(a.prompt);
    }

    function renderInsights(data) {
      const labels = CARD_LABELS[LANG] || CARD_LABELS.de;
      const cards = data?.cards || [];
      let html = "";
      const next = data?.nextActions || [];
      if (next.length) {
        html += `<div class="playbook-block"><h3>${t("nextActions")}</h3><div class="card-actions">` +
          next.map((a, i) => `<button type="button" data-na="${i}">${a.label || a.id}</button>`).join("") +
          `</div></div>`;
      }
      html += cards.map((c) => {
        const pulse = c.severity === "critical" ? '<span class="pulse-dot"></span>' : "";
        const acts = (c.actions || []).map((a, i) =>
          `<button type="button" data-ca="${c.id}-${i}">${a.label || a.type}</button>`
        ).join("");
        return `<div class="insight-card ${c.severity || ""}" data-card="${c.id}">
          <div>${pulse}${labels[c.titleKey] || c.titleKey}</div>
          <strong>${c.value}</strong>
          <div class="status-line">${c.detail || ""}</div>
          ${acts ? `<div class="card-actions">${acts}</div>` : ""}
        </div>`;
      }).join("");
      const issues = data?.operationalIssues || [];
      if (issues.length) {
        html += `<div class="playbook-block"><h3>${t("issues")}</h3>` +
          issues.map((iss, i) => {
            const msg = typeof iss === "string" ? iss : (iss.message || iss.site || JSON.stringify(iss));
            return `<div class="issue-row" data-issue="${i}" title="${escapeHtml(t("askIssue"))}">${msg}</div>`;
          }).join("") + `</div>`;
      }
      if (data?.opsUrl) {
        html += `<div class="playbook-block"><a href="${data.opsUrl}">${t("openOps")} →</a></div>`;
      }
      const el = document.getElementById("insightCards");
      el.innerHTML = html || `<p class="status-line">—</p>`;
      next.forEach((a, i) => {
        el.querySelector(`[data-na="${i}"]`)?.addEventListener("click", () => runInsightAction(a));
      });
      cards.forEach((c) => {
        (c.actions || []).forEach((a, i) => {
          el.querySelector(`[data-ca="${c.id}-${i}"]`)?.addEventListener("click", () => runInsightAction(a));
        });
      });
      issues.forEach((iss, i) => {
        el.querySelector(`[data-issue="${i}"]`)?.addEventListener("click", () => {
          const msg = typeof iss === "string" ? iss : (iss.message || iss.site || "");
          submitQuestion(t("issueAskPrompt").replace("{msg}", msg));
        });
      });
    }

      if (companyRequiredForUi()) {
        sessions = [];

        return;
      }
      try {

          sessions = [];

    async function loadSession(id) {
      sessionId = id;
      renderSessions();
      const data = await api(`/api/ai/sessions/${id}?${companyQs()}`);
      document.getElementById("chatLog").innerHTML = "";

    async function newSession() {
      if (companyRequiredForUi()) { appendMsg("bot", t("needCompany")); return; }
      const s = await api("/api/ai/sessions", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ company_id: selectedCompanyId, agent_id: activeAgent, lang: LANG }),
      });
      sessionId = s.id;
      document.getElementById("chatLog").innerHTML = "";
      await loadSessions();

    function commandCenterVoiceOptions() {
      return {
        inputId: "question",
        buttonId: "aiVoiceBtn",
        sendId: "sendBtn",
        formId: "chatForm",
        hintId: "bpAiComposerHint",
        get lang() { return LANG; },
        get hintText() { return t("voiceHint"); },
        multilingual: true,
        authHeaders: () => authHeaders(),
        onTranscript: (text) => {
          void submitQuestion(text);
          const el = document.getElementById("question");
          if (el) el.value = "";
        },
        onMicError: (err) => {
          appendMsg("bot", window.BaupassAiUi?.voiceErrorMessage?.(err, LANG) || t("aiVoiceMicDenied"), true);
        },
        onTranscribeError: (err) => {
          appendMsg("bot", window.BaupassAiUi?.voiceErrorMessage?.(err, LANG) || String(err?.message || err), true);
        },
        onListening: (active) => {
          const hint = document.getElementById("bpAiComposerHint");
          if (hint) hint.textContent = active ? t("aiVoiceListening") : t("voiceHint");
        },
      };
    }

    async function submitQuestion(q) {
      if (companyRequiredForUi()) { appendMsg("bot", t("needCompany")); return; }
      if (!sessionId) await newSession();
      appendMsg("user", q);
      const log = document.getElementById("chatLog");
      const botDiv = document.createElement("div");
      botDiv.className = "msg-bot";
      botDiv.textContent = "";
      log.appendChild(botDiv);
      const thinking = document.createElement("div");
      thinking.className = "msg-bot";
      thinking.textContent = t("thinking");
      log.appendChild(thinking);
      log.scrollTop = log.scrollHeight;
      let meta = {};
      const statusEl = document.createElement("div");
      statusEl.className = "msg-meta";
      log.appendChild(statusEl);
      const friendlyAiError = (err) => {
        const hint = String(err?.hint || err?.error || err?.message || "").trim();
        if (!hint || hint === "company_required") return t("needCompany");
        if (/openai|api.key|nicht konfiguriert|not configured/i.test(hint)) {
          return t("errAiNotConfigured");
        }
        if (/401|403|auth|anmeld|sign in/i.test(hint)) {
          return t("errAuth");
        }
        if (/429|rate|too many|limit/i.test(hint)) {
          return t("errRateLimit");
        }
        if (/network|fetch|failed to fetch/i.test(hint)) {
          return t("errNetwork");
        }
        return hint;
      };
      try {
        const res = await fetch("/api/ai/query/stream", {
          method: "POST",
          credentials: "include",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({
            question: q, company_id: selectedCompanyId, agent_id: activeAgent,
            session_id: sessionId, lang: LANG,
          }),
        });
        let thinkingRemoved = false;
        const dropThinking = () => {
          if (!thinkingRemoved) {
            thinking.remove();
            thinkingRemoved = true;
          }
        };
        if (!res.ok) {
          dropThinking();
          const err = await res.json().catch(() => ({}));
          botDiv.textContent = friendlyAiError(err);
          return;
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const parts = buf.split("\n\n");
          buf = parts.pop() || "";
          for (const block of parts) {
            const line = block.split("\n").find((l) => l.startsWith("data:"));
            if (!line) continue;
            try {
              const payload = JSON.parse(line.slice(5).trim());
              if (payload.type === "tool_start") {
                dropThinking();
                statusEl.textContent = `${t("toolRunning")}: ${payload.tool}…`;
              }
              if (payload.type === "tool_done") {
                statusEl.textContent = `${payload.tool} ✓`;
              }
              if (payload.type === "thinking") {
                dropThinking();
                statusEl.textContent = (statusEl.textContent || t("thinking")) + (payload.text || "");
              }
              if (payload.type === "answer_start") {
                dropThinking();
                statusEl.textContent = "";
              }
              if (payload.type === "answer_reset") {
                botDiv.textContent = "";
                statusEl.textContent = "";
              }
              if (payload.type === "status") {
                dropThinking();
                statusEl.textContent = payload.text || "";
              }
              if (payload.type === "chunk") {
                dropThinking();
                botDiv.textContent += payload.text || "";
                log.scrollTop = log.scrollHeight;
              }
              if (payload.type === "done") meta = payload;
              if (payload.type === "error") botDiv.textContent += "\n" + (payload.hint || payload.error);
            } catch { /* skip */ }
          }
        }
        lastAnswerText = botDiv.textContent;
        attachMeta(botDiv, {
          sources: meta.sources,
          toolsUsed: meta.toolsUsed,
          suggestedActions: meta.suggestedActions,
          actions: meta.actions || meta.suggestedActions,
        });
        await loadSessions();
        await loadInsights();
      } catch (e) {
        if (thinking.parentNode) thinking.remove();
        botDiv.textContent = e.message || String(e);
      }
    }

    async function runBriefing() {
      appendMsg("user", t("briefing"));
      const thinking = document.createElement("div");
      thinking.className = "msg-bot";
      thinking.textContent = t("thinking");
      document.getElementById("chatLog").appendChild(thinking);
      try {
        const data = await api(`/api/ai/briefing?${companyQs()}`);
        thinking.remove();
        lastAnswerText = data.answer || "";
        appendMsg("bot", data.answer || "—", {
          sources: data.sources,
          suggestedActions: [
            { id: "em", type: "execute", action: "send_briefing_email", labelDe: t("emailBriefing"), labelEn: t("emailBriefing"), labelAr: t("emailBriefing") },
            { id: "ex", type: "execute", action: "export_briefing_markdown", labelDe: "Markdown", labelEn: "Markdown", labelAr: "Markdown" },
          ],
        });
      } catch (e) {
        thinking.remove();
        appendMsg("bot", e.payload?.hint || e.message);
      }
    }

    document.getElementById("webhookBriefingBtn").onclick = async () => {
      try {
        const r = await api("/api/ai/briefing/webhook", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ company_id: selectedCompanyId, lang: LANG }),
        });
        appendMsg("bot", r.sent ? `${t("webhookOk")} (${r.sent}/${r.total})` : JSON.stringify(r.results || r));
      } catch (e) {
        appendMsg("bot", e.payload?.hint || e.message);
      }
    };

    document.getElementById("emailBriefingBtn").onclick = async () => {
      const to = prompt(t("emailPrompt"));
      if (!to) return;
      try {
        const r = await api("/api/ai/briefing/email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to, company_id: selectedCompanyId, lang: LANG }),
        });
        appendMsg("bot", r.ok ? t("emailOk") : (r.error || t("emailFail")));
      } catch (e) {
        appendMsg("bot", e.payload?.hint || e.message);
      }
    };

    async function runAnalysis(topic) {
      if (companyRequiredForUi()) {
        appendMsg("bot", t("needCompany"));
        return;
      }
      appendMsg("user", `[${topic}]`);
      const thinking = document.createElement("div");
      thinking.className = "msg-bot";
      thinking.textContent = t("thinking");
      document.getElementById("chatLog").appendChild(thinking);
      try {
        const data = await api("/api/ai/analyze", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ topic, company_id: selectedCompanyId, lang: LANG }),
        });
        thinking.remove();
        appendMsg("bot", data.answer || "—", { sources: data.sources, toolsUsed: data.toolsUsed });
      } catch (e) {
        thinking.remove();
        appendMsg("bot", e.payload?.hint || e.message);
      }
    }

    document.getElementById("chatForm").onsubmit = (ev) => {
      ev.preventDefault();
      const q = document.getElementById("question").value.trim();
      if (!q) return;
      document.getElementById("question").value = "";
      submitQuestion(q);
    };
    document.getElementById("briefingBtn").onclick = runBriefing;
    document.getElementById("newChatBtn").onclick = newSession;
    document.getElementById("deleteAllChatsBtn").onclick = () => deleteAllSessions().catch((e) => showToast(e.payload?.hint || e.message));
    document.getElementById("clearChatBtn").onclick = () => clearCurrentChat().catch((e) => showToast(e.payload?.hint || e.message));
    document.getElementById("exportChatBtn").onclick = () => exportCurrentChat().catch((e) => showToast(e.payload?.hint || e.message));
    document.querySelectorAll("[data-topic]").forEach((btn) => {
      btn.onclick = () => runAnalysis(btn.dataset.topic);
    });

    async function boot() {
      await loadAgents();
      renderAgents();
      await Promise.all([loadInsights(), loadPrompts(), loadSessions()]);
      startInsightsPolling();
      startInsightsRealtime();
    }

    window.addEventListener("storage", (event) => {
      if (event.key !== UI_LANG_KEY || !event.newValue) return;
      applyUiLanguage({ reloadAgents: true, reloadInsights: true });
      loadPrompts().catch(() => {});
      if (!companyRequiredForUi()) loadInsights().catch(() => {});
    });

    window.addEventListener("baupass-lang-sync", () => {
      applyUiLanguage({ reloadAgents: true, reloadInsights: true });
      loadPrompts().catch(() => {});
      if (!companyRequiredForUi()) loadInsights().catch(() => {});
    });

    window.addEventListener("baupass-company-sync", (event) => {
      const cid = String(event?.detail?.companyId || "").trim();
      if (!cid) return;
      syncSelectedCompanyId({ ...bootUser, preview_company_id: cid, role: currentRole || "superadmin" }, { reload: true });
    });

    (async () => {
      try {
        const bootData = await bootstrapSession();
        bootUser = bootData?.user || null;
        currentRole = bootUser?.role || "";
        syncSelectedCompanyId(bootUser);
        showApp();
        await loadCompanies();
        if (window.BaupassAiUi) {
          window.BaupassAiUi.bindVoiceInput(commandCenterVoiceOptions());
        }
        uiBooted = true;
        applyUiLanguage();
        await boot();
        const autoQ = new URLSearchParams(location.search).get("autoprompt");
        if (autoQ) {
          try { await submitQuestion(decodeURIComponent(autoQ)); } catch { /* ignore */ }
        }
      } catch {
        showAuthError();
        applyUiLanguage();
      }
    })();
  </script>
</body>
</html>
