<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-title" content="SUPPIX AI" />
  <meta name="application-name" content="SUPPIX AI" />
  <title>SUPPIX — KI Command Center</title>
  <link rel="apple-touch-icon" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <link rel="icon" type="image/svg+xml" href="/branding/suppix-ai-mark.svg" />
  <link id="appFavicon" rel="icon" type="image/png" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <link rel="stylesheet" href="/design-tokens.css" />
  <link rel="stylesheet" href="/embed-shell.css?v=20260531shell2" />
  <link rel="stylesheet" href="/ops-shell.css" />
  <link rel="stylesheet" href="/ai-voice-ui.css?v=20260601voice13" />
  <style>
    * { box-sizing: border-box; }
    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
    }
    body.ops-app {
      font-family: "Segoe UI Variable", "Segoe UI", ui-sans-serif, system-ui, sans-serif;
      background:
        radial-gradient(1200px 500px at 12% -10%, rgba(56, 189, 248, 0.08), transparent 55%),
        radial-gradient(900px 420px at 88% 0%, rgba(99, 102, 241, 0.06), transparent 50%),
        var(--bg, #050816);
      color: var(--text);
      display: flex;
      flex-direction: column;
      min-height: 0;
      letter-spacing: 0.01em;
    }
    a { color: var(--accent); }
    header.ops-header {
      flex-shrink: 0;
      position: relative;
      top: auto;
      padding: 0.55rem 0.9rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem;
      align-items: center;
      justify-content: space-between;
      background: var(--panel);
      z-index: 20;
    }
    header h1 { margin: 0; font-size: 1.1rem; }
    .nav a { text-decoration: none; font-size: 0.82rem; padding: 0.35rem 0.6rem; border: 1px solid var(--border); border-radius: 8px; }
    #authErr { flex-shrink: 0; margin: 0.5rem 1rem; }
    .shell {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      display: grid;
      grid-template-columns: 190px minmax(0, 1fr) 260px;
      grid-template-rows: minmax(0, 1fr);
      gap: 0.55rem;
      padding: 0.55rem;
      max-width: 1680px;
      width: 100%;
      margin: 0 auto;
      align-self: stretch;
    }
    @media (max-width: 1200px) {
      .shell:not(.embed-shell) {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(0, 140px) minmax(0, 1fr) minmax(0, 200px);
      }
      .shell:not(.embed-shell) .side { order: 1; }
      .shell:not(.embed-shell) .chat { order: 2; }
      .shell:not(.embed-shell) .insights { order: 3; }
    }
    body.embed-mode {
      height: 100%;
      overflow: hidden;
    }
    body.embed-mode header.ops-header {
      padding: 0.45rem 0.75rem;
    }
    body.embed-mode header.ops-header h1 {
      font-size: 0.95rem;
    }
    body.embed-mode header.ops-header .nav a:not(.embed-keep) {
      display: none;
    }
    body.embed-mode .shell.embed-shell {
      grid-template-columns: 170px minmax(0, 1fr) 240px;
      grid-template-rows: minmax(0, 1fr);
      padding: 0.5rem;
      gap: 0.5rem;
    }
    @media (max-width: 900px) {
      body.embed-mode .shell.embed-shell {
        grid-template-columns: 1fr;
        grid-template-rows: minmax(88px, auto) minmax(320px, 1fr) minmax(140px, auto);
      }
    }
    .panel {
      background: rgba(12, 18, 36, 0.88);
      border: 1px solid rgba(120, 156, 255, 0.12);
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      min-height: 0;
      max-height: 100%;
      overflow: hidden;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.28);
    }
    .panel.chat {
      background: linear-gradient(180deg, rgba(14, 20, 36, 0.96), rgba(10, 14, 26, 0.98));
    }
    .panel h2 {
      margin: 0;
      padding: 0.65rem 0.85rem;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid rgba(120, 156, 255, 0.1);
      flex-shrink: 0;
      font-weight: 600;
    }
    .panel .toolbar { flex-shrink: 0; }
    .agent-tabs { flex-shrink: 0; }
    .chip-row { flex-shrink: 0; }
    .chat-form { flex-shrink: 0; }
    .scroll {
      overflow-x: hidden;
      overflow-y: auto;
      flex: 1;
      min-height: 0;
      padding: 0.85rem 1rem 1.1rem;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: thin;
      scrollbar-color: rgba(142, 164, 192, 0.35) transparent;
    }
    .agent-tabs { display: flex; flex-wrap: wrap; gap: 0.35rem; padding: 0.55rem 0.75rem; border-bottom: 1px solid rgba(120,156,255,0.1); }
    .agent-tabs button {
      font-size: 0.72rem; padding: 0.32rem 0.65rem; border-radius: 999px; cursor: pointer;
      border: 1px solid rgba(120,156,255,0.14); background: rgba(8,12,22,0.7); color: var(--muted);
      transition: border-color 0.15s ease, color 0.15s ease, background 0.15s ease;
    }
    .agent-tabs button:hover { color: var(--text); border-color: rgba(56,189,248,0.35); }
    .agent-tabs button.active {
      border-color: rgba(56,189,248,0.55); color: #e8f8ff;
      background: linear-gradient(180deg, rgba(56,189,248,0.18), rgba(56,189,248,0.08));
    }
    #chatLog { display: flex; flex-direction: column; gap: 1rem; min-height: 0; }
    .msg-user {
      background: linear-gradient(165deg, rgba(37, 99, 235, 0.38), rgba(30, 58, 95, 0.92));
      padding: 0.8rem 1rem;
      border-radius: 16px 16px 6px 16px;
      font-size: 0.92rem;
      line-height: 1.5;
      white-space: pre-wrap;
      align-self: flex-end;
      max-width: min(88%, 38rem);
      border: 1px solid rgba(125, 211, 252, 0.14);
      box-shadow: 0 8px 22px rgba(8, 20, 40, 0.28);
    }
    .msg-bot {
      background: transparent;
      padding: 0.15rem 0 0.2rem;
      border-radius: 0;
      font-size: 0.95rem;
      line-height: 1.62;
      border: none;
      max-width: min(100%, 46rem);
      align-self: stretch;
      animation: msgIn 0.22s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(6px); }
      to { opacity: 1; transform: none; }
    }
    .msg-bot.msg-thinking {
      color: var(--muted);
      font-style: normal;
      padding: 0.75rem 0.9rem;
      border-radius: 14px;
      background: rgba(255,255,255,0.03);
      border: 1px dashed rgba(120,156,255,0.18);
      width: fit-content;
    }
    .msg-bot-label {
      display: inline-flex;
      align-items: center;
      gap: 0.4rem;
      margin-bottom: 0.45rem;
      font-size: 0.68rem;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: #9fb4cf;
      font-weight: 650;
    }
    .msg-bot-label::before {
      content: "";
      width: 0.55rem;
      height: 0.55rem;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 30%, #7dd3fc, #38bdf8 55%, #0284c7);
      box-shadow: 0 0 0 3px rgba(56,189,248,0.15);
    }
    .msg-body {
      color: #eef5ff;
      padding: 0.15rem 0.1rem 0.35rem;
    }
    .msg-body p { margin: 0 0 0.78rem; }
    .msg-body p:last-child { margin-bottom: 0; }
    .msg-body ul, .msg-body ol {
      margin: 0.2rem 0 0.8rem;
      padding-inline-start: 1.15rem;
    }
    .msg-body li { margin: 0.28rem 0; color: #e4eefc; }
    .msg-body li::marker { color: #67e8f9; }
    .msg-body strong { font-weight: 700; color: #ffffff; }
    .msg-body em { color: #d7e6f8; font-style: italic; }
    .msg-body code {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 0.84em;
      background: rgba(125, 211, 252, 0.1);
      border: 1px solid rgba(125, 211, 252, 0.14);
      padding: 0.12rem 0.4rem;
      border-radius: 6px;
      color: #dbeafe;
    }
    .msg-body a {
      color: #7dd3fc;
      text-decoration: none;
      border-bottom: 1px solid rgba(125, 211, 252, 0.35);
    }
    .msg-body a:hover { color: #bae6fd; border-bottom-color: #bae6fd; }
    .msg-meta {
      font-size: 0.68rem;
      color: #8096b0;
      margin-top: 0.55rem;
      padding: 0.45rem 0.6rem;
      border-radius: 10px;
      background: rgba(255,255,255,0.025);
      border: 1px solid rgba(120,156,255,0.08);
    }
    .msg-actions {
      display: flex;
      align-items: center;
      gap: 0.1rem;
      margin-top: 0.55rem;
      padding-top: 0.15rem;
      flex-wrap: wrap;
      position: relative;
      opacity: 0.72;
      transition: opacity 0.18s ease;
    }
    .msg-bot:hover .msg-actions,
    .msg-actions:focus-within,
    .msg-actions.has-open-menu {
      opacity: 1;
    }
    .msg-action-btn {
      width: 2.05rem;
      height: 2.05rem;
      border-radius: 10px;
      border: 1px solid transparent;
      cursor: pointer;
      background: transparent;
      color: #93a9c2;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      transition: background 0.15s ease, color 0.15s ease, border-color 0.15s ease, transform 0.12s ease;
    }
    .msg-action-btn svg {
      width: 1.05rem;
      height: 1.05rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .msg-action-btn:hover {
      background: rgba(255,255,255,0.06);
      color: #f2f7ff;
      border-color: rgba(120,156,255,0.16);
    }
    .msg-action-btn:active { transform: scale(0.96); }
    .msg-action-btn.active {
      color: #7dd3fc;
      background: rgba(56,189,248,0.12);
      border-color: rgba(56,189,248,0.22);
    }
    .msg-action-btn.speaking,
    .msg-action-btn.read-active {
      color: #7dd3fc;
      background: rgba(56,189,248,0.14);
      border-color: rgba(56,189,248,0.28);
    }
    .msg-more-menu {
      position: absolute;
      inset-inline-start: 0;
      bottom: calc(100% + 0.4rem);
      min-width: 15rem;
      background: rgba(18, 26, 40, 0.96);
      border: 1px solid rgba(120,156,255,0.18);
      border-radius: 14px;
      box-shadow: 0 16px 40px rgba(0,0,0,0.5);
      padding: 0.4rem;
      z-index: 20;
      backdrop-filter: blur(12px);
    }
    .msg-more-menu .msg-more-time {
      display: block;
      text-align: end;
      color: #8096b0;
      font-size: 0.68rem;
      padding: 0.3rem 0.6rem 0.45rem;
    }
    .msg-more-menu button {
      display: flex;
      width: 100%;
      align-items: center;
      gap: 0.6rem;
      text-align: start;
      border: none;
      background: transparent;
      color: #e8f0fa;
      cursor: pointer;
      padding: 0.6rem 0.7rem;
      border-radius: 10px;
      font-size: 0.84rem;
    }
    .msg-more-menu button:hover { background: rgba(255,255,255,0.06); }
    .msg-more-menu .msg-more-ico {
      width: 1.15rem;
      height: 1.15rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      opacity: 0.9;
    }
    .msg-more-menu .msg-more-ico svg {
      width: 1.05rem;
      height: 1.05rem;
      fill: none;
      stroke: currentColor;
      stroke-width: 1.7;
      stroke-linecap: round;
      stroke-linejoin: round;
    }
    .ai-action-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.7rem;
    }
    .ai-action-btn {
      border-radius: 999px !important;
      border: 1px solid rgba(120,156,255,0.18) !important;
      background: rgba(14, 22, 36, 0.9) !important;
      color: #cfe7ff !important;
      padding: 0.35rem 0.75rem !important;
      font-size: 0.74rem !important;
    }
    .ai-action-btn:hover {
      border-color: rgba(56,189,248,0.45) !important;
      color: #fff !important;
    }
    .chat-form { padding: 0; border-top: none; display: flex; flex-direction: column; gap: 0; flex-shrink: 0; }
    .chat-form .input-row { display: flex; gap: 0.4rem; align-items: stretch; }
    .toolbar button {
      padding: 0.45rem 0.75rem; border-radius: 8px; border: none; cursor: pointer;
      background: var(--accent); color: #061018; font-weight: 700; font-size: 0.8rem;
    }
    .toolbar button.secondary { background: #1a2e3a; color: var(--text); border: 1px solid var(--border); }
    .session-item {
      display: block; width: 100%; text-align: start; padding: 0.45rem 0.5rem; margin-bottom: 0.35rem;
      border-radius: 8px; border: 1px solid transparent; background: #0c1218; color: var(--text);
      cursor: pointer; font-size: 0.78rem;
    }
    .session-item.active { border-color: var(--accent); }
    .session-item small { display: block; color: var(--muted); font-size: 0.68rem; }
    .session-row {
      display: flex; align-items: stretch; gap: 0.25rem; margin-bottom: 0.35rem;
    }
    .session-row .session-item { flex: 1; margin-bottom: 0; min-width: 0; }
    .session-row.active .session-item { border-color: var(--accent); }
    .session-delete {
      flex: 0 0 auto; width: 2rem; border-radius: 8px; border: 1px solid var(--border);
      background: #0c1218; color: var(--muted); cursor: pointer; font-size: 1rem; line-height: 1;
    }
    .session-delete:hover { color: var(--danger); border-color: var(--danger); }
    .chat-toolbar {
      display: flex; flex-wrap: wrap; gap: 0.4rem; padding: 0.55rem 0.85rem 0.65rem;
      border-bottom: 1px solid rgba(120,156,255,0.1);
    }
    .chat-toolbar button.secondary {
      padding: 0.38rem 0.75rem; border-radius: 999px; border: 1px solid rgba(120,156,255,0.16);
      background: rgba(16, 24, 40, 0.85); color: #d5e4f5; cursor: pointer; font-size: 0.74rem;
      transition: border-color 0.15s ease, color 0.15s ease;
    }
    .chat-toolbar button.secondary:hover { border-color: rgba(56,189,248,0.4); color: #fff; }
    .insight-card {
      border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem 0.65rem; margin-bottom: 0.45rem;
      font-size: 0.78rem;
    }
    .insight-card.critical { border-color: var(--danger); }
    .insight-card.high { border-color: var(--warn); }
    .insight-card strong { color: var(--accent); font-size: 1rem; }
    .insight-card .card-actions { margin-top: 0.45rem; display: flex; flex-wrap: wrap; gap: 0.3rem; }
    .insight-card .card-actions button {
      font-size: 0.68rem; padding: 0.25rem 0.5rem; border-radius: 6px; cursor: pointer;
      border: 1px solid var(--border); background: #14242a; color: var(--accent);
    }
    .playbook-block { margin-bottom: 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--border); }
    .playbook-block h3 { margin: 0 0 0.4rem; font-size: 0.78rem; color: var(--accent); font-weight: 600; }
    .issue-row {
      padding: 0.4rem 0.5rem; margin-bottom: 0.35rem; border-radius: 8px; background: #0c1218;
      font-size: 0.75rem; cursor: pointer; border: 1px solid transparent;
    }
    .issue-row:hover { border-color: var(--accent); }
    .pulse-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: var(--accent);
      margin-inline-end: 0.35rem; animation: pulse 1.5s ease-in-out infinite; }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.35; } }
    .toast {
      position: fixed; bottom: 1.1rem; right: 1.1rem; padding: 0.65rem 0.95rem; border-radius: 12px;
      background: rgba(16, 24, 40, 0.96); border: 1px solid rgba(56,189,248,0.35);
      font-size: 0.82rem; z-index: 100; color: #eaf4ff;
      box-shadow: 0 14px 34px rgba(0,0,0,0.4);
      animation: fadein 0.25s ease;
    }
    @keyframes fadein { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }
    .chip-row { display: flex; flex-wrap: wrap; gap: 0.3rem; margin: 0.35rem 0; }
    .chip-row button {
      font-size: 0.68rem; padding: 0.2rem 0.45rem; border-radius: 999px;
      border: 1px solid var(--border); background: #0a1016; color: var(--muted); cursor: pointer;
    }
    select, #companySelect {
      padding: 0.4rem 0.55rem; border-radius: 8px; border: 1px solid var(--border);
      background: #0a1016; color: var(--text); font-size: 0.82rem;
    }
    .status-line { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .hidden { display: none !important; }
    .err { color: var(--danger); padding: 1rem; }
    .leave-preview-btn {
      display: block;
      width: 100%;
      text-align: left;
      margin-top: 0.35rem;
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.03);
      color: var(--text);
      cursor: pointer;
      font: inherit;
    }
    .leave-preview-btn:hover { border-color: var(--accent); }
    .leave-pdf-frame {
      width: 100%;
      min-height: 420px;
      border: 1px solid var(--border);
      border-radius: 10px;
      background: #fff;
    }
  </style>
</head>
<body class="ops-app">
  <header class="ops-header">
    <div style="display:flex;align-items:center;gap:0.75rem;">
      <img data-tenant-logo class="tenant-logo-chip" src="/branding/suppix-ai-mark.svg" alt="Suppix AI" />
      <div>
      <h1 id="pageTitle">Suppix AI Command Center</h1>
      <div class="status-line" id="statusLine"></div>
      </div>
    </div>
    <nav class="nav">
      <select id="companySelect" class="hidden"></select>
      <a id="navEnterpriseHub" href="/enterprise-hub.html">Enterprise Hub</a>
      <a id="navAdminV2" href="/admin-v2/index.html">Betrieb</a>
      <a id="navPosteingang" href="/admin-v2/index.html">Posteingang</a>
      <a id="navOpsLive" href="/ops-command-center.html">Ops Live</a>
      <select id="aiLangSelect" aria-label="Sprache" style="font-size:0.78rem;padding:0.25rem 0.35rem;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);">
        <option value="de">DE</option><option value="en">EN</option><option value="ar">AR</option>
        <option value="tr">TR</option><option value="fr">FR</option><option value="es">ES</option>
        <option value="it">IT</option><option value="pl">PL</option>
      </select>
    </nav>
  </header>

  <div id="authErr" class="err hidden">
    <span id="authErrText">Bitte anmelden.</span>
    <a id="authLoginLink" href="/admin-v2/index.html?login=1" style="margin-inline-start:0.5rem">Anmelden</a>
    · <a id="authControlPassLink" href="/index.html">SUPPIX</a>
  </div>

  <div class="shell hidden embed-shell" id="shell">
    <aside class="panel side">
      <h2 id="sessionsTitle">Chats</h2>
      <div class="toolbar" style="padding:0.5rem;display:flex;gap:0.35rem;flex-wrap:wrap">
        <button type="button" class="secondary" id="newChatBtn">+ Neu</button>
        <button type="button" class="secondary" id="deleteAllChatsBtn">Alle löschen</button>
      </div>
      <div class="scroll" id="sessionList"></div>
    </aside>

    <main class="panel chat">
      <div class="agent-tabs" id="agentTabs"></div>
      <div class="chat-toolbar">
        <button type="button" class="secondary" id="exportChatBtn">Chat exportieren</button>
        <button type="button" class="secondary" id="clearChatBtn">Chat leeren</button>
      </div>
      <div class="scroll" id="chatLog"></div>
      <form class="chat-form" id="chatForm">
        <div class="input-row">
          <textarea id="question" rows="1" placeholder="Frage stellen…"></textarea>
          <button type="button" id="aiVoiceBtn" aria-label="Spracheingabe"></button>
          <button type="submit" id="sendBtn" aria-label="Senden"></button>
        </div>
        <details class="bp-ai-tools-panel">
          <summary id="toolsPanelSummary">Tools &amp; Briefings</summary>
          <div class="bp-ai-tools-row">
            <button type="button" class="secondary" id="briefingBtn">Tagesbriefing</button>
            <button type="button" class="secondary" id="decisionBtn">Entscheidung</button>
            <button type="button" class="secondary" id="emailBriefingBtn">Briefing mailen</button>
            <button type="button" class="secondary" id="webhookBriefingBtn">Slack/Teams</button>
          </div>
        </details>
      </form>
    </main>

    <aside class="panel insights">
      <h2 id="insightsTitle">Live Insights</h2>
      <div class="toolbar" style="padding:0.5rem;display:flex;flex-wrap:wrap;gap:0.35rem">
        <button type="button" class="secondary" data-topic="security">Security</button>
        <button type="button" class="secondary" data-topic="compliance">Compliance</button>
        <button type="button" class="secondary" data-topic="attendance">Attendance</button>
        <button type="button" class="secondary" data-topic="executive">Executive</button>
      </div>
      <div class="scroll">
        <div id="leaveRequestsPanel"></div>
        <div id="aiProposalsPanel"></div>
        <div id="insightCards"></div>
      </div>
    </aside>
  </div>

  <div id="aiLeavePdfModal" class="admin-modal-overlay hidden" role="dialog" aria-modal="true" style="position:fixed;inset:0;background:rgba(0,0,0,.55);display:flex;align-items:center;justify-content:center;padding:1rem;z-index:50;">

    function polishAnswerText(text) {
      let s = String(text || "");
      s = s.replace(/DECISION_JSON\s*=\s*\{[\s\S]*?\n\}\s*/gi, "");
      s = s.replace(/```(?:json)?\s*\{[\s\S]*?"recommendation"[\s\S]*?\}\s*```/gi, "");
      s = s.replace(/\n{3,}/g, "\n\n").trim();
      return s;
    }

    function formatAiAnswerHtml(text) {
      const raw = polishAnswerText(text);
      if (!raw) return "";
      const escape = (v) => String(v)
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;");
      const inline = (line) => escape(line)
        .replace(/`([^`]+)`/g, "<code>$1</code>")
        .replace(/\*\*([^*]+)\*\*/g, "<strong>$1</strong>")
        .replace(/(^|[^*\w])\*([^*\n]+)\*(?!\*)/g, "$1<em>$2</em>")
        .replace(/\[([^\]]+)\]\((https?:\/\/[^)\s]+)\)/g, '<a href="$2" target="_blank" rel="noopener">$1</a>');

      const lines = raw.split(/\r?\n/);
      const parts = [];
      let listType = null;
      let listItems = [];
      const flushList = () => {
        if (!listType || !listItems.length) return;
        parts.push(`<${listType}>${listItems.map((li) => `<li>${li}</li>`).join("")}</${listType}>`);
        listType = null;
        listItems = [];
      };
      let para = [];
      const flushPara = () => {
        if (!para.length) return;
        parts.push(`<p>${para.join("<br>")}</p>`);
        para = [];
      };
      for (const line of lines) {
        const trimmed = line.trim();
        if (!trimmed) {
          flushList();
          flushPara();
          continue;
        }
        const ul = trimmed.match(/^[-*•]\s+(.+)$/);
        const ol = trimmed.match(/^\d+[.)]\s+(.+)$/);
        if (ul || ol) {
          flushPara();
          const nextType = ul ? "ul" : "ol";
          if (listType && listType !== nextType) flushList();
          listType = nextType;
          listItems.push(inline(ul ? ul[1] : ol[1]));
          continue;
        }
        flushList();
        para.push(inline(trimmed));
      }
      flushList();
      flushPara();
      return parts.join("") || `<p>${inline(raw)}</p>`;
    }

      menu.appendChild(readBtn);
      row.append(copyBtn, likeBtn, dislikeBtn, shareBtn, regenBtn, speakBtn, moreBtn, menu);

      const setSpeakingUi = (on) => {
        speakBtn.classList.toggle("read-active", on);
        moreBtn.classList.toggle("speaking", on);

        const labelEl = readBtn.querySelector("[data-read-label]");

      const runReadAloud = async () => {
        closeMsgMoreMenus();
        row.classList.remove("has-open-menu");
        const speaking = window.BaupassAiUi?.isSpeaking?.();
        if (speaking) {
          window.BaupassAiUi?.stopSpeaking?.();
          setSpeakingUi(false);
          return;
        }
        setSpeakingUi(true);
        try {
          const speakText = window.BaupassAiUi?.cleanTextForSpeech?.(text, { lang: LANG, spoken: true })
            || window.BaupassAiUi?.cleanTextForDisplay?.(text)
            || text;
          await window.BaupassAiUi?.speakReply?.(speakText, LANG, {
            spoken: true,
            force: true,
            authHeaders: () => authHeaders(),
          });
        } catch (e) {
          showToast(e?.message || t("errGeneric"));
        } finally {
          setSpeakingUi(false);
        }
      };

      copyBtn.onclick = async () => {
        try {
          await navigator.clipboard.writeText(text);
          showToast(t("msgCopied"));

          showToast(t("msgCopied"));
        }

      likeBtn.onclick = () => {
        likeBtn.classList.add("active");
        dislikeBtn.classList.remove("active");
        showToast(t("msgLike"));

      dislikeBtn.onclick = () => {
        dislikeBtn.classList.add("active");
        likeBtn.classList.remove("active");
        showToast(t("msgDislike"));

      shareBtn.onclick = async () => {
        try {
          if (navigator.share) {
            await navigator.share({ text });
            return;
          }
        } catch {
          /* fall through */
        }
        try {
          await navigator.clipboard.writeText(text);
          showToast(t("msgShareCopied"));
        } catch {
          showToast(t("msgShareCopied"));

      regenBtn.onclick = () => {

          return;

        submitQuestion(q);

      speakBtn.onclick = () => { void runReadAloud(); };
      moreBtn.onclick = (ev) => {
        ev.stopPropagation();

        closeMsgMoreMenus(opening ? menu : null);
        menu.classList.toggle("hidden", !opening);
        row.classList.toggle("has-open-menu", opening);
      };

    async function runExecuteAction(a, text) {
      const action = a.action;
      if (action === "send_briefing_webhook") {
        try {
          const r = await api("/api/ai/actions/execute", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              action: "send_briefing_webhook",
              company_id: selectedCompanyId,
              briefing_text: text || lastAnswerText,
            }),
          });
          appendMsg("bot", r.ok ? `${t("webhookOk")} (${r.sent}/${r.total})` : (r.error || "—"), {});
        } catch (e) {
          appendMsg("bot", e.payload?.hint || e.message, {});
        }
        return;
      }
      if (action === "send_briefing_email") {
        const to = prompt(t("emailPrompt"));
        if (!to) return;
        try {
          const r = await api("/api/ai/briefing/email", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ to, company_id: selectedCompanyId, lang: LANG, body: text }),
          });
          appendMsg("bot", r.ok ? t("emailOk") : (r.error || t("emailFail")), {});
        } catch (e) {
          appendMsg("bot", e.payload?.error || e.message, {});
        }
        return;
      }
      if (action === "approve_leave_request" || action === "reject_leave_request" || action === "notify_worker") {
        try {
          const r = await api("/api/ai/actions/execute", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ action, params: a.params || {}, company_id: selectedCompanyId }),
          });
          appendMsg("bot", r.ok ? `✓ ${action}` : (r.error || "—"), {});
          if (r.ok) {
            await loadPendingLeaveRequests();
            closeAiLeavePreview();
          }
        } catch (e) {
          appendMsg("bot", e.payload?.hint || e.message, {});
        }
        return;
      }
      if (action === "export_briefing_markdown") {
        const blob = new Blob([text || lastAnswerText], { type: "text/markdown" });
        const aEl = document.createElement("a");
        aEl.href = URL.createObjectURL(blob);
        aEl.download = `baupass-briefing-${new Date().toISOString().slice(0, 10)}.md`;
        aEl.click();
        return;
      }
      try {
        const r = await api("/api/ai/actions/execute", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ action, params: a.params || {}, company_id: selectedCompanyId, briefing_text: text }),
        });
        appendMsg("bot", r.ok ? JSON.stringify(r) : (r.error || "—"), {});
      } catch (e) {
        appendMsg("bot", e.payload?.hint || e.message, {});
      }
    }

      if (res.status === 401) throw new Error("auth");
      if (!res.ok) { const e = new Error(data.hint || data.error || res.statusText); e.payload = data; throw e; }

    async function submitQuestion(q, options = {}) {
      if (aiQuestionInFlight) return;
      if (isSupportReadOnlyMode()) {
        appendMsg("bot", "Support-Modus: KI-Chat ist in dieser Sitzung nur lesend.");
        return;
      }
      if (companyRequiredForUi()) { appendMsg("bot", t("needCompany")); return; }
      const input = document.getElementById("question");
      if (input) {
        input.value = "";
        input.dispatchEvent(new Event("input", { bubbles: true }));
      }
      aiQuestionInFlight = true;
      window.BaupassAiUi?.resetTtsTurn?.();
      window.BaupassAiUi?.stopSpeaking?.();
      window.BaupassAiUi?.stopVoiceCapture?.("question");
      if (!sessionId) await newSession();
      appendMsg("user", q);
      lastUserQuestion = String(q || "").trim();
      const log = document.getElementById("chatLog");
      const isVoiceTurn = Boolean(options.spoken);
      const botDiv = document.createElement("div");
      botDiv.className = "msg-bot";
      const botBody = document.createElement("div");
      botBody.className = "msg-body";
      botBody.style.whiteSpace = "pre-wrap";
      botDiv.appendChild(botBody);
      log.appendChild(botDiv);
      const thinking = document.createElement("div");
      thinking.className = "msg-bot msg-thinking";
      thinking.textContent = t("thinking");
      log.appendChild(thinking);
      log.scrollTop = log.scrollHeight;
        let meta = {};
        let pendingSpeech = null;
        let streamedText = "";
        const statusEl = document.createElement("div");
      statusEl.className = "msg-meta";
      if (!isVoiceTurn) log.appendChild(statusEl);
      const setStreamText = (value) => {
        streamedText = String(value || "");
        botBody.textContent = streamedText;
      };
      const appendStreamText = (chunk) => {
        streamedText += String(chunk || "");
        botBody.textContent = streamedText;
      };
      const friendlyAiError = (err, opts = {}) => {
        const code = String(err?.error || err?.payload?.error || "").trim();
        const hint = String(err?.hint || err?.payload?.hint || err?.message || "").trim();
        const retrySec = Number(err?.retryAfterSeconds || err?.payload?.retryAfterSeconds || 0);
        const openAiRateMsg = () => {
          const base = retrySec > 0
            ? t("errRateLimitWait").replace("{sec}", String(retrySec))
            : t("errRateLimit");
          return opts.spoken ? `${base} ${t("errRateLimitVoiceNote")}` : base;
        };
        const serverRateMsg = () => (
          retrySec > 0
            ? t("errServerRateLimitWait").replace("{sec}", String(retrySec))
            : t("errServerRateLimit")
        );
        if (code === "openai_quota_exceeded" || /insufficient_quota|exceeded your current quota|chatgpt plus/i.test(hint)) {
          return t("errOpenAiQuota");
        }
        if (code === "ai_not_configured" || code === "openai_not_configured") {
          return t("errAiNotConfigured");
        }
        if (code === "openai_auth_error") {
          return t("errOpenAiAuth");
        }
        if (code === "rate_limited") {
          return serverRateMsg();
        }
        if (code === "support_session_read_only") {
          return "Support-Modus: KI-Chat ist in dieser Sitzung nur lesend.";
        }
        if (code === "openai_rate_limit" || code === "rate_limit_exceeded") {
          return openAiRateMsg();
        }
        if (!hint || hint === "company_required") return t("needCompany");
        if (/401|403|auth|anmeld|sign in/i.test(hint)) {
          return t("errAuth");
        }
        if (/429/.test(hint) || /rate limit exceeded|rate_limit_exceeded|too many requests/i.test(hint)) {
          if (/tpm|rpm|tokens per min|requests per min|gpt-|openai/i.test(hint)) {
            return openAiRateMsg();
          }
          return code === "rate_limited" ? serverRateMsg() : openAiRateMsg();
        }
        if (/network|fetch|failed to fetch/i.test(hint)) {
          return t("errNetwork");
        }
        return hint;
      };
      try {
        const res = await fetch("/api/ai/query/stream", {
          method: "POST",
          credentials: "include",
          headers: authHeaders({ "Content-Type": "application/json" }),
          body: JSON.stringify({
            question: q, company_id: selectedCompanyId, agent_id: options.agentId || activeAgent,
            session_id: sessionId, lang: LANG, spoken: Boolean(options.spoken),
            ...(options.analysisTopic ? { analysis_topic: options.analysisTopic } : {}),
          }),
        });
        let thinkingRemoved = false;
        const dropThinking = () => {
          if (thinkingRemoved || !thinking.parentNode) return;
          thinking.remove();
          thinkingRemoved = true;
        };
        if (!res.ok) {
          dropThinking();
          const err = await res.json().catch(() => ({}));
          setBotMessageContent(botDiv, friendlyAiError(err, { spoken: Boolean(options.spoken) }), {});
          return;
        }
        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buf = "";
        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buf += decoder.decode(value, { stream: true });
          const parts = buf.split("\n\n");
          buf = parts.pop() || "";
          for (const block of parts) {
            const line = block.split("\n").find((l) => l.startsWith("data:"));
            if (!line) continue;
            try {
              const payload = JSON.parse(line.slice(5).trim());
              if (payload.type === "tool_start") {
                dropThinking();
                if (statusEl) statusEl.textContent = `${t("toolRunning")}: ${payload.tool}…`;
              }
              if (payload.type === "tool_done") {
                if (statusEl) statusEl.textContent = `${payload.tool} ✓`;
              }
              if (payload.type === "thinking") {
                dropThinking();
                if (statusEl) statusEl.textContent = (statusEl.textContent || t("thinking")) + (payload.text || "");
              }
              if (payload.type === "answer_start") {
                dropThinking();
                if (statusEl) statusEl.textContent = "";
                if (isVoiceTurn) {
                  window.BaupassAiUi?.markTtsPreparing?.();
                }
              }
              if (payload.type === "answer_reset") {
                setStreamText("");
                if (statusEl) statusEl.textContent = "";
              }
              if (payload.type === "status") {
                dropThinking();
                if (statusEl) statusEl.textContent = payload.text || "";
              }
              if (payload.type === "chunk") {
                dropThinking();
                appendStreamText(payload.text || "");
                log.scrollTop = log.scrollHeight;
                if (isVoiceTurn) {
                  window.BaupassAiUi?.tryLockTtsPrefetch?.(streamedText, LANG, {
                    spoken: true,
                    authHeaders: () => authHeaders(),
                  });
                }
              }
              if (payload.type === "done") {
                meta = payload;
                if (isVoiceTurn && streamedText && payload.ok !== false && !pendingSpeech) {
                  const speakText = window.BaupassAiUi?.cleanTextForSpeech?.(streamedText, { lang: LANG, spoken: true })
                    || window.BaupassAiUi?.cleanTextForDisplay?.(streamedText)
                    || streamedText;
                  pendingSpeech = window.BaupassAiUi?.speakReply?.(speakText, LANG, {
                    spoken: true,
                    authHeaders: () => authHeaders(),
                  });
                }
              }
              if (payload.type === "error") {
                setStreamText(friendlyAiError(payload, { spoken: Boolean(options.spoken) }));
              }
            } catch { /* skip */ }
          }
        }
        statusEl?.remove?.();
        if (thinking.parentNode) thinking.remove();
        botBody.style.whiteSpace = "";
        const finalText = streamedText || botBody.textContent || "";
        setBotMessageContent(botDiv, finalText, {
          sources: isVoiceTurn ? null : meta.sources,
          toolsUsed: isVoiceTurn ? null : meta.toolsUsed,
          suggestedActions: meta.suggestedActions,
          actions: meta.actions || meta.suggestedActions,
          decision: meta.decision,
        });
        if (finalText && meta.ok !== false) {
          const speakTask = pendingSpeech || (isVoiceTurn
            ? window.BaupassAiUi?.speakReply?.(finalText, LANG, {
                spoken: true,
                authHeaders: () => authHeaders(),
              })
            : null);
          await Promise.all([
            speakTask || Promise.resolve(),
            loadSessions(),
            loadInsights(),
          ]);
        } else {
          await Promise.all([loadSessions(), loadInsights()]);
        }
      } catch (e) {
        if (thinking.parentNode) thinking.remove();
        setBotMessageContent(botDiv, e.message || String(e), {});
      } finally {
        aiQuestionInFlight = false;
      }
    }

        /* optional panel */
      }
    }

    async function runDecision() {
      const input = document.getElementById("question");
      const q = (input?.value || "").trim() || "Was sind die wichtigsten Entscheidungen für Betrieb und Anwesenheit jetzt?";
      appendMsg("user", q);
      if (input) input.value = "";
      const thinking = document.createElement("div");
      thinking.className = "msg-bot";
      thinking.textContent = t("thinking");
      document.getElementById("chatLog").appendChild(thinking);
      try {
        const data = await api("/api/ai/decision", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            question: q,
            company_id: selectedCompanyId,
            lang: LANG,
            autoStage: true,
          }),
        });
        thinking.remove();
        lastAnswerText = data.answer || "";
        appendMsg("bot", data.answer || "—", {
          sources: data.sources,
          toolsUsed: data.toolsUsed,
          decision: data.decision,
          suggestedActions: data.suggestedActions,
        });
        await loadAiProposals();
      } catch (e) {
        thinking.remove();
        appendMsg("bot", e.payload?.hint || e.message);
      }
    }

    document.getElementById("webhookBriefingBtn").onclick = async () => {
      try {
        const r = await api("/api/ai/briefing/webhook", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ company_id: selectedCompanyId, lang: LANG }),
        });
        appendMsg("bot", r.sent ? `${t("webhookOk")} (${r.sent}/${r.total})` : JSON.stringify(r.results || r));
      } catch (e) {
        appendMsg("bot", e.payload?.hint || e.message);
      }
    };

    document.getElementById("emailBriefingBtn").onclick = async () => {
      const to = prompt(t("emailPrompt"));
      if (!to) return;
      try {
        const r = await api("/api/ai/briefing/email", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ to, company_id: selectedCompanyId, lang: LANG }),
        });
        appendMsg("bot", r.ok ? t("emailOk") : (r.error || t("emailFail")));
      } catch (e) {
        appendMsg("bot", e.payload?.hint || e.message);
      }
    };

    async function runAnalysis(topic) {
      const promptKey = `analysisPrompt_${topic}`;
      const q = t(promptKey);
      if (!q || q === promptKey) return;
      const agentId = ANALYSIS_AGENT_IDS[topic] || "operations";
      await submitQuestion(q, { spoken: false, agentId, analysisTopic: topic });
    }

    document.getElementById("chatForm").onsubmit = (ev) => {
      ev.preventDefault();
      const input = document.getElementById("question");
      window.BaupassAiUi?.stopVoiceCapture?.("question");
      let q = input.value.trim();
      if (!q) return;
      const spoken = window.BaupassAiUi?.consumeVoiceInputFlag?.(input) || false;
      q = window.BaupassAiUi?.cleanQuestionText?.(q) || q;
      input.value = "";
      submitQuestion(q, { spoken });
    };
    document.getElementById("briefingBtn").onclick = runBriefing;
    document.getElementById("decisionBtn").onclick = runDecision;
    document.getElementById("aiLeaveCloseBtn")?.addEventListener("click", closeAiLeavePreview);
    document.getElementById("aiLeaveApproveBtn")?.addEventListener("click", async () => {
      if (!aiLeavePreviewId) return;
      try {
        const r = await api("/api/ai/actions/execute", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "approve_leave_request",
            params: { leave_id: aiLeavePreviewId },
            company_id: selectedCompanyId,
          }),
        });
        showToast(r.ok ? t("leaveApprovedToast") : (r.error || t("errGeneric")));
        if (r.ok) {
          closeAiLeavePreview();
          await loadPendingLeaveRequests();
          await loadInsights();
        }
      } catch (e) {
        showToast(e.payload?.hint || e.message);
      }
    });
    document.getElementById("aiLeaveRejectBtn")?.addEventListener("click", async () => {
      if (!aiLeavePreviewId) return;
      const reviewNote = (document.getElementById("aiLeaveRejectNote")?.value || "").trim();
      try {
        const r = await api("/api/ai/actions/execute", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({
            action: "reject_leave_request",
            params: { leave_id: aiLeavePreviewId, review_note: reviewNote || t("leaveRejectedDefaultNote") },
            company_id: selectedCompanyId,
          }),
        });
        showToast(r.ok ? t("leaveRejectedToast") : (r.error || t("errGeneric")));
        if (r.ok) {
          closeAiLeavePreview();
          await loadPendingLeaveRequests();
          await loadInsights();
        }
      } catch (e) {
        showToast(e.payload?.hint || e.message);
      }
    });
    document.getElementById("newChatBtn").onclick = newSession;
    document.getElementById("deleteAllChatsBtn").onclick = () => deleteAllSessions().catch((e) => showToast(e.payload?.hint || e.message));
    document.getElementById("clearChatBtn").onclick = () => clearCurrentChat().catch((e) => showToast(e.payload?.hint || e.message));
    document.getElementById("exportChatBtn").onclick = () => exportCurrentChat().catch((e) => showToast(e.payload?.hint || e.message));
    document.querySelectorAll("[data-topic]").forEach((btn) => {
      btn.onclick = () => runAnalysis(btn.dataset.topic);
    });

    async function boot() {
      await loadAgents();
      renderAgents();
      await Promise.all([loadInsights(), loadSessions()]);
      startInsightsPolling();
      startInsightsRealtime();
    }

    function consumeAutoprompt() {
      const params = new URLSearchParams(location.search);
      let autoQ = String(params.get("autoprompt") || "").trim();
      let agent = String(params.get("agent") || "").trim();
      try {
        const stored = sessionStorage.getItem("baupass_ai_autoprompt");
        if (stored && stored.trim()) {
          autoQ = stored.trim();
          sessionStorage.removeItem("baupass_ai_autoprompt");
        }
        const storedAgent = sessionStorage.getItem("baupass_ai_agent");
        if (storedAgent && storedAgent.trim()) {
          agent = storedAgent.trim();
          sessionStorage.removeItem("baupass_ai_agent");
        }
      } catch {
        /* ignore */
      }
      // URLSearchParams already decodes; only decode again if still percent-encoded.
      if (autoQ && /%[0-9A-Fa-f]{2}/.test(autoQ)) {
        try {
          autoQ = decodeURIComponent(autoQ);
        } catch {
          /* keep raw */
        }
      }
      // Drop autoprompt from the URL so refresh doesn't resend / leave text behind.
      if (params.has("autoprompt") || params.has("agent")) {
        params.delete("autoprompt");
        // keep agent in UI state only; remove from URL after consume
        const keepAgent = params.get("agent");
        params.delete("agent");
        if (keepAgent && !agent) agent = keepAgent;
        const qs = params.toString();
        const next = `${location.pathname}${qs ? `?${qs}` : ""}${location.hash || ""}`;
        try {
          history.replaceState({}, "", next);
        } catch {
          /* ignore */
        }
      }
      return { autoQ, agent };
    }

    window.addEventListener("storage", (event) => {
      if ((event.key !== UI_LANG_KEY && event.key !== "baupass-admin-v2-lang") || !event.newValue) return;
      applyUiLanguage({ reloadAgents: true, reloadInsights: true });
      if (!companyRequiredForUi()) loadInsights().catch(() => {});
    });

    window.addEventListener("baupass-lang-sync", () => {
      applyUiLanguage({ reloadAgents: true, reloadInsights: true });
      if (!companyRequiredForUi()) loadInsights().catch(() => {});
    });
    window.addEventListener("baupass-admin-lang", () => {
      applyUiLanguage({ reloadAgents: true, reloadInsights: true });
      if (!companyRequiredForUi()) loadInsights().catch(() => {});
    });

    window.addEventListener("baupass-company-sync", (event) => {
      const cid = String(event?.detail?.companyId || "").trim();
      if (!cid) return;
      syncSelectedCompanyId({ ...bootUser, preview_company_id: cid, role: currentRole || "superadmin" }, { reload: true });
    });

    window.addEventListener("baupass-session-cleared", () => {
      stopInsightsTransport();
      showAuthError();
    });

    (async () => {
      try {
        const bootData = await bootstrapSession();
        bootUser = bootData?.user || null;
        currentRole = bootUser?.role || "";
        syncSelectedCompanyId(bootUser);
        await applyCommandCenterBranding();
        showApp();
        applySupportReadOnlyUi();
        await loadCompanies();
        if (window.BaupassAiUi) {
          window.BaupassAiUi.bindVoiceInput(commandCenterVoiceOptions());
          window.addEventListener("baupass-ai-tts-error", (ev) => {
            const msg = window.BaupassAiUi?.voiceErrorMessage?.(ev.detail || {}, LANG);
            if (msg) showToast(msg);
          });
          window.addEventListener("baupass-ai-tts-fallback", () => {
            showToast(t("errBrowserVoiceFallback"));
          });
        }
        uiBooted = true;
        applyUiLanguage();
        const { autoQ, agent: autoAgent } = consumeAutoprompt();
        if (autoAgent) {
          activeAgent = autoAgent;
        }
        if (autoQ) {
          const input = document.getElementById("question");
          if (input) {
            input.value = "";
            input.dispatchEvent(new Event("input", { bubbles: true }));
          }
          try {
            await loadAgents();
            renderAgents();
          } catch {
            /* agents optional for first answer */
          }
          try {
            await submitQuestion(autoQ, { agentId: autoAgent || activeAgent || "decision" });
          } catch (e) {
            appendMsg("bot", e?.payload?.hint || e?.message || String(e));
          }
          if (input) {
            input.value = "";
            input.dispatchEvent(new Event("input", { bubbles: true }));
          }
          // Side panels after the answer — keeps first response snappy.
          Promise.all([loadInsights(), loadSessions()])
            .then(() => {
              startInsightsPolling();
              startInsightsRealtime();
            })
            .catch(() => {});
        } else {
          await boot();
        }
      } catch {
        showAuthError();
        applyUiLanguage();
      }
    })();
  </script>
</body>
</html>
