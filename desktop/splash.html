<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SUPPIX Start</title>
  <style>
    :root {
      --bg0: #091118;
      --bg1: #10202b;
      --bg2: #173445;
      --coffee: #c78652;
      --coffee-dark: #8a5230;
      --ink: #f4ede5;
      --muted: #b6c8d3;
      --line: rgba(244, 237, 229, 0.18);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      font-family: "Segoe UI", "Noto Sans", Arial, sans-serif;
      background: radial-gradient(120% 120% at 80% 10%, #1c3f53 0%, transparent 48%),
                  linear-gradient(140deg, var(--bg0) 0%, var(--bg1) 48%, var(--bg2) 100%);
      color: var(--ink);
    }

    .stage {
      position: relative;
      width: 100%;
      height: 100%;
      padding: 28px;
      display: grid;
      place-items: center;
    }

    .card {
      width: 100%;
      height: 100%;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(255, 255, 255, 0.07), rgba(255, 255, 255, 0.02));
      box-shadow: 0 22px 60px rgba(0, 0, 0, 0.45);
      display: grid;
      grid-template-rows: 1fr auto;
      padding: 30px;
      position: relative;
      overflow: hidden;
    }

    .orb {
      position: absolute;
      width: 280px;
      height: 280px;
      right: -90px;
      top: -90px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, rgba(6, 182, 212, 0.45), rgba(168, 85, 247, 0.08));
      filter: blur(8px);
      animation: drift 8s ease-in-out infinite;
    }

    .head {
      display: flex;
      align-items: center;
      gap: 16px;
      z-index: 1;
    }

    .logo {
      width: 58px;
      height: 58px;
      border-radius: 16px;
      background: linear-gradient(150deg, rgba(6, 182, 212, 0.25) 0%, rgba(168, 85, 247, 0.35) 100%);
      display: grid;
      place-items: center;
      overflow: hidden;
      box-shadow: 0 8px 24px rgba(6, 182, 212, 0.25);
      border: 1px solid rgba(103, 232, 249, 0.3);
    }

    .logo img {
      width: 52px;
      height: 52px;
      object-fit: contain;
      display: block;
    }

    .title {
      margin: 0;
      font-size: 24px;
      line-height: 1.2;
      letter-spacing: -0.01em;
    }

    .subtitle {
      margin: 6px 0 0;
      font-size: 14px;
      color: var(--muted);
    }

    .foot {
      z-index: 1;
    }

    .progress {
      position: relative;
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      background: rgba(255, 255, 255, 0.12);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }

    .progress-fill {
      position: absolute;
      inset: 0;
      width: 0%;
      border-radius: 999px;
      background: linear-gradient(90deg, #e3b88f 0%, var(--coffee) 55%, var(--coffee-dark) 100%);
      transition: width 220ms ease;
      box-shadow: 0 0 22px rgba(199, 134, 82, 0.5);
    }

    .meta {
      margin-top: 10px;
      font-size: 12px;
      color: #d9e2e8;
      letter-spacing: 0.02em;
      display: flex;
      justify-content: space-between;
      gap: 12px;
    }

    @keyframes drift {
      0% { transform: translate(0, 0); }
      50% { transform: translate(-14px, 10px); }
      100% { transform: translate(0, 0); }
    }
  </style>
</head>
<body>
  <main class="stage" aria-live="polite">
    <section class="card">
      <div class="orb" aria-hidden="true"></div>
      <header class="head">
        <div class="logo" aria-hidden="true"><img src="../branding/suppix-ai-mark.svg" alt="" width="52" height="52" /></div>
        <div>
          <h1 class="title">SUPPIX startet</h1>
          <p class="subtitle">Sichere Verbindung und Arbeitsbereich werden vorbereitet</p>
        </div>
      </header>
      <footer class="foot">
        <div class="progress" aria-hidden="true"><div id="splashProgressFill" class="progress-fill"></div></div>
        <div class="meta">
          <span id="splashMessage">Ladevorgang läuft</span>
          <span id="splashDetail">0%</span>
        </div>
      </footer>
    </section>
  </main>
</body>
</html>
