<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Eingehender Anruf — SUPPIX</title>
  <style>
    :root {
      --bg0: #0b141a;
      --bg1: #111b21;
      --accent: #25d366;
      --danger: #e53935;
      --text: #e9edef;
      --muted: #8696a0;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      height: 100%;
      font-family: "Segoe UI", system-ui, -apple-system, sans-serif;
      background: radial-gradient(120% 90% at 50% 0%, #163528 0%, var(--bg0) 55%, #070b0e 100%);
      color: var(--text);
      overflow: hidden;
      user-select: none;
      -webkit-app-region: drag;
    }
    .wrap {
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: 28px 22px 26px;
    }
    .top {
      width: 100%;
      text-align: center;
    }
    .badge {
      display: inline-block;
      padding: 4px 10px;
      border-radius: 999px;
      background: rgba(37, 211, 102, 0.14);
      color: var(--accent);
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .rings {
      position: relative;
      width: 148px;
      height: 148px;
      margin: 36px auto 18px;
    }
    .rings::before,
    .rings::after {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 2px solid rgba(37, 211, 102, 0.35);
      animation: pulse 1.8s ease-out infinite;
    }
    .rings::after { animation-delay: 0.6s; }
    @keyframes pulse {
      0% { transform: scale(0.72); opacity: 0.85; }
      100% { transform: scale(1.35); opacity: 0; }
    }
    .avatar {
      position: absolute;
      inset: 18px;
      border-radius: 50%;
      background: linear-gradient(145deg, #1f3c2f, #0f1f18);
      border: 2px solid rgba(233, 237, 239, 0.18);
      display: grid;
      place-items: center;
      font-size: 42px;
      font-weight: 800;
      letter-spacing: 0.02em;
      box-shadow: 0 12px 36px rgba(0, 0, 0, 0.35);
    }
    h1 {
      margin: 0 0 6px;
      font-size: 24px;
      font-weight: 800;
      line-height: 1.2;
    }
    .sub {
      margin: 0;
      color: var(--muted);
      font-size: 14px;
    }
    .timer {
      margin-top: 10px;
      font-variant-numeric: tabular-nums;
      color: rgba(233, 237, 239, 0.78);
      font-size: 13px;
    }
    .actions {
      width: 100%;
      display: flex;
      justify-content: space-around;
      gap: 18px;
      -webkit-app-region: no-drag;
      padding-bottom: 8px;
    }
    button {
      width: 78px;
      height: 78px;
      border: 0;
      border-radius: 50%;
      cursor: pointer;
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 4px;
      font-size: 11px;
      font-weight: 700;
      box-shadow: 0 10px 24px rgba(0, 0, 0, 0.35);
      transition: transform 0.12s ease, filter 0.12s ease;
    }
    button:hover { transform: translateY(-1px); filter: brightness(1.05); }
    button:active { transform: scale(0.97); }
    button.accept { background: var(--accent); }
    button.decline { background: var(--danger); }
    button svg { width: 26px; height: 26px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="top">
      <span class="badge">Eingehender Anruf</span>
      <div class="rings" aria-hidden="true"><div class="avatar" id="avatar">?</div></div>
      <h1 id="name">Mitarbeiter</h1>
      <p class="sub" id="subtitle">Sicheren Sprachkanal annehmen</p>
      <p class="timer" id="timer">00:00</p>
    </div>
    <div class="actions">
      <button type="button" class="decline" id="declineBtn" title="Ablehnen">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round"><path d="M6 6l12 12M18 6L6 18"/></svg>
        Ablehnen
      </button>
      <button type="button" class="accept" id="acceptBtn" title="Annehmen">
        <svg viewBox="0 0 24 24" fill="currentColor"><path d="M6.6 10.8c1.4 2.8 3.8 5.1 6.6 6.6l2.2-2.2c.3-.3.7-.4 1.1-.2 1.2.4 2.5.6 3.8.6.6 0 1 .4 1 1V20c0 .6-.4 1-1 1C10.6 21 3 13.4 3 4c0-.6.4-1 1-1h3.5c.6 0 1 .4 1 1 0 1.3.2 2.6.6 3.8.1.4 0 .8-.2 1.1L6.6 10.8z"/></svg>
        Annehmen
      </button>
    </div>
  </div>
  <script>
    (function () {
      const params = new URLSearchParams(location.search);
      const payload = {
        callId: params.get("callId") || "",
        workerName: params.get("workerName") || "Mitarbeiter",
        workerId: params.get("workerId") || "",
        companyId: params.get("companyId") || "",
      };
      const nameEl = document.getElementById("name");
      const avatarEl = document.getElementById("avatar");
      const timerEl = document.getElementById("timer");
      nameEl.textContent = payload.workerName;
      const initials = payload.workerName
        .split(/\s+/)
        .map((p) => p[0] || "")
        .join("")
        .slice(0, 2)
        .toUpperCase() || "?";
      avatarEl.textContent = initials;

      const started = Date.now();
      setInterval(() => {
        const sec = Math.floor((Date.now() - started) / 1000);
        const m = String(Math.floor(sec / 60)).padStart(2, "0");
        const s = String(sec % 60).padStart(2, "0");
        timerEl.textContent = `${m}:${s}`;
      }, 250);

      async function act(action) {
        try {
          if (window.baupassIncomingCall?.respond) {
            await window.baupassIncomingCall.respond(action, payload);
          }
        } catch (_) {
          /* ignore */
        }
      }
      document.getElementById("acceptBtn").addEventListener("click", () => act("accept"));
      document.getElementById("declineBtn").addEventListener("click", () => act("decline"));

      // Soft ring cue in the floating window.
      try {
        const audio = new Audio("../sounds/phone-call-ring.mp3");
        audio.loop = true;
        audio.volume = 0.9;
        void audio.play().catch(() => {});
        window.addEventListener("beforeunload", () => {
          try { audio.pause(); } catch (_) {}
        });
      } catch (_) {
        /* ignore */
      }
    })();
  </script>
</body>
</html>
