# Build WorkPass worker APK (release, debug-signed) and upload as artifact.
# Pipeline: git push main → this workflow → Artifacts → baupass-worker-apk
# Download: GitHub → Actions → latest run → Artifacts → baupass-worker-apk
name: Build worker APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Backend base URL baked into the APK
        required: false
        default: https://baupass-production.up.railway.app
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "backend/app/api/worker_app_routes.py"
      - "backend/app/platform/security/worker_devices.py"
      - ".github/workflows/flutter-worker-apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/flutter-worker-apk.yml"

concurrency:
  group: worker-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Complete Flutter platform scaffolding
        working-directory: mobile
        run: flutter create . --org com.baupass --project-name worker

      - name: Restore native customizations
        run: |
          rm -rf mobile/android/app/src/main/kotlin/com/baupass/baupass_worker || true
          git checkout HEAD -- \
            mobile/android/app/build.gradle.kts \
            mobile/android/app/google-services.json \
            mobile/android/settings.gradle.kts \
            mobile/android/app/src/main/kotlin/com/baupass/worker/NfcReaderPlugin.kt \
            mobile/android/app/src/main/kotlin/com/baupass/worker/BrandingPlugin.kt \
            mobile/android/app/src/main/kotlin/com/baupass/worker/MainActivity.kt \
            mobile/android/app/src/main/AndroidManifest.xml \
            mobile/android/app/src/main/res/values/strings.xml \
            mobile/android/app/src/main/res/values/colors.xml \
            mobile/android/app/src/main/res/drawable/ic_launcher_foreground.xml \
            mobile/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml \
            mobile/android/app/src/main/res/mipmap-anydpi-v26/ic_launcher_round.xml \
            mobile/lib/firebase_bootstrap.dart \
            mobile/lib/services/push_foreground_listener.dart \
            mobile/lib/services/push_navigation.dart \
            mobile/lib/services/push_notification_service.dart \
            mobile/lib/features/auth/login_screen.dart \
            mobile/lib/app.dart \
            mobile/lib/main.dart \
            mobile/pubspec.yaml \
            mobile/test/widget_test.dart

      - name: Resolve dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Analyze Dart
        working-directory: mobile
        run: flutter analyze --no-fatal-infos

      - name: Build release APK
        id: build_apk
        working-directory: mobile
        env:
          API_URL: ${{ github.event.inputs.api_base_url || 'https://baupass-production.up.railway.app' }}
        run: |
          set -o pipefail
          flutter build apk --release --dart-define=BAUPASS_API_URL="$API_URL" 2>&1 | tee build-apk.log || {
            echo "::error title=APK build failed::$(grep -E 'FAILURE:|error:|Error:|Exception' build-apk.log | tail -n 5 | tr '\n' ' ')"
            {
              echo "### Build failed"
              echo '```'
              cat build-apk.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Upload build log on failure
        if: failure() && steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-apk-log
          path: mobile/build-apk.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: baupass-worker-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Job summary
        if: success()
        env:
          API_URL: ${{ github.event.inputs.api_base_url || 'https://baupass-production.up.railway.app' }}
        run: |
          {
            echo "## Mitarbeiter-App (APK)"
            echo ""
            echo "- **API URL baked in:** \`$API_URL\`"
            echo "- **Artifact:** \`baupass-worker-apk\` → \`app-release.apk\`"
            echo "- **Install (USB):** \`adb install -r app-release.apk\`"
            echo "- **Windows script:** \`deploy/install-worker-apk.ps1 -ApkPath ...\`"
            echo ""
            echo "Feldtest: \`docs/mobile-field-test-DE.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
