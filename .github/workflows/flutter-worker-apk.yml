# Build BauPass worker APK (release, debug-signed) and upload as artifact.
# Download: GitHub → Actions → latest run → Artifacts → baupass-worker-apk
name: Build worker APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Backend base URL baked into the APK
        required: false
        default: https://baupass-production.up.railway.app
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/flutter-worker-apk.yml"

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Complete Flutter platform scaffolding
        working-directory: mobile
        run: flutter create . --org com.baupass --project-name baupass_worker

      - name: Resolve dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK
        working-directory: mobile
        env:
          API_URL: ${{ github.event.inputs.api_base_url || 'https://baupass-production.up.railway.app' }}
        run: >
          flutter build apk --release
          --dart-define=BAUPASS_API_URL=${{ env.API_URL }}

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: baupass-worker-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
