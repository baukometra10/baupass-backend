# Build WorkPass worker APK (release, debug-signed) and upload as artifact.
# Pipeline: git push main → this workflow → Artifacts → baupass-worker-apk
# Download: GitHub → Actions → latest run → Artifacts → baupass-worker-apk
name: Build worker APK

on:
  workflow_dispatch:
    inputs:
      api_base_url:
        description: Backend base URL baked into the APK
        required: false
        default: https://suppix-workpass-ai.up.railway.app
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - "backend/app/api/worker_app_routes.py"
      - "backend/app/platform/security/worker_devices.py"
      - ".github/workflows/flutter-worker-apk.yml"
  pull_request:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/flutter-worker-apk.yml"

concurrency:
  group: worker-apk-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apk:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: "3.29.3"
          cache: true

      - name: Accept Android licenses
        run: yes | flutter doctor --android-licenses || true

      - name: Inject Firebase google-services.json (optional)
        working-directory: mobile/android/app
        env:
          FIREBASE_JSON: ${{ secrets.FIREBASE_GOOGLE_SERVICES_JSON }}
        run: |
          if [ -n "$FIREBASE_JSON" ]; then
            printf '%s' "$FIREBASE_JSON" > google-services.json
            cp google-services.json "$RUNNER_TEMP/google-services.json.injected"
            echo "Firebase config injected from secret."
          else
            echo "FIREBASE_GOOGLE_SERVICES_JSON not set — using repo placeholder if present."
          fi

      - name: Complete Flutter platform scaffolding
        working-directory: mobile
        run: flutter create . --org com.baupass --project-name worker

      - name: Restore native customizations
        run: |
          rm -rf mobile/android/app/src/main/kotlin/com/baupass/baupass_worker || true
          git checkout HEAD -- \
            mobile/android/app/build.gradle.kts \
            mobile/android/settings.gradle.kts \
            mobile/android/gradle.properties \
            mobile/android/gradle/wrapper/gradle-wrapper.properties \
            mobile/android/build.gradle.kts \
            mobile/android/app/src/main/kotlin/com/baupass/worker/NfcReaderPlugin.kt \
            mobile/android/app/src/main/kotlin/com/baupass/worker/BrandingPlugin.kt \
            mobile/android/app/src/main/kotlin/com/baupass/worker/MainActivity.kt \
            mobile/android/app/src/main/AndroidManifest.xml \
            mobile/android/app/src/main/res \
            mobile/lib \
            mobile/pubspec.yaml \
            mobile/test

      - name: Restore injected Firebase config
        run: |
          if [ -f "$RUNNER_TEMP/google-services.json.injected" ]; then
            cp "$RUNNER_TEMP/google-services.json.injected" mobile/android/app/google-services.json
            echo "Restored injected Firebase google-services.json."
          fi

      - name: Resolve dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build release APK
        id: build_apk
        working-directory: mobile
        env:
          API_URL: ${{ github.event.inputs.api_base_url || 'https://suppix-workpass-ai.up.railway.app' }}
        run: |
          set -o pipefail
          flutter build apk --release --dart-define=BAUPASS_API_URL="$API_URL" 2>&1 | tee build-apk.log || {
            echo "::error title=APK build failed::$(grep -E 'What went wrong|Execution failed|error:|Error:|FAILURE:' build-apk.log | tail -n 20 | tr '\n' ' ')"
            {
              echo "### Build failed"
              echo '```'
              tail -n 200 build-apk.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          }

      - name: Upload build log on failure
        if: failure() && steps.build_apk.outcome == 'failure'
        uses: actions/upload-artifact@v4
        with:
          name: build-apk-log
          path: mobile/build-apk.log
          if-no-files-found: warn
          retention-days: 7

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: baupass-worker-apk
          path: mobile/build/app/outputs/flutter-apk/app-release.apk
          if-no-files-found: error
          retention-days: 30

      - name: Job summary
        if: success()
        env:
          API_URL: ${{ github.event.inputs.api_base_url || 'https://suppix-workpass-ai.up.railway.app' }}
        run: |
          {
            echo "## Mitarbeiter-App (APK)"
            echo ""
            echo "- **API URL baked in:** \`$API_URL\`"
            echo "- **Artifact:** \`baupass-worker-apk\` → \`app-release.apk\`"
            echo "- **Install (USB):** \`adb install -r app-release.apk\`"
            echo "- **Windows script:** \`deploy/install-worker-apk.ps1 -ApkPath ...\`"
            echo ""
            echo "Feldtest: \`docs/mobile-field-test-DE.md\`"
          } >> "$GITHUB_STEP_SUMMARY"
