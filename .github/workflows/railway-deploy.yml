# Optional backup deploy when Railway Git snapshot fails.
# Repo: https://github.com/baukometra10/baupass-backend
# Primary path: Railway → Deploy from GitHub repo (auto on push to main).
# Required GitHub repository secrets:
#   RAILWAY_TOKEN        – Account token from https://railway.com/account/tokens
#   RAILWAY_SERVICE_ID   – Service ID (Railway → Service → Settings → Service ID)
name: railway-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    if: ${{ secrets.RAILWAY_TOKEN != '' && secrets.RAILWAY_SERVICE_ID != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Railway CLI
        run: npm install -g @railway/cli@latest

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --service "${{ secrets.RAILWAY_SERVICE_ID }}" --detach

  smoke-test:
    needs: deploy
    if: ${{ secrets.PUBLIC_BASE_URL != '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Wait for service
        run: sleep 45

      - name: Health smoke test
        env:
          BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          set -e
          curl -fsS "$BASE_URL/api/health/live"
          curl -fsS "$BASE_URL/api/health/ready" | grep -q ready
          curl -fsS "$BASE_URL/api/health"
          curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/admin-v2/index.html" | grep -q 200
          echo "Smoke tests passed (health + admin-v2 static)."

  deploy-skipped-hint:
    if: ${{ secrets.RAILWAY_TOKEN == '' || secrets.RAILWAY_SERVICE_ID == '' }}
    runs-on: ubuntu-latest
    steps:
      - name: Remind to configure Railway secrets
        run: |
          echo "Railway deploy skipped: set RAILWAY_TOKEN and RAILWAY_SERVICE_ID in GitHub repo secrets."
          echo "Then re-run this workflow or push again."
