# Optional backup deploy when Railway Git snapshot fails.
# Repo: https://github.com/baukometra10/baupass-backend
# Primary path: Railway → Deploy from GitHub repo (auto on push to main).
# Required GitHub repository secrets:
#   RAILWAY_TOKEN        – Account token from https://railway.com/account/tokens
#   RAILWAY_SERVICE_ID   – Service ID (Railway → Service → Settings → Service ID)
#   PUBLIC_BASE_URL      – e.g. https://baupass-production.up.railway.app (enterprise go-live checks)
name: railway-deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: railway-deploy-main
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Deploy to Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
          RAILWAY_SERVICE_ID: ${{ secrets.RAILWAY_SERVICE_ID }}
        run: |
          if [ -z "$RAILWAY_TOKEN" ] || [ -z "$RAILWAY_SERVICE_ID" ]; then
            echo "::warning title=Railway CLI deploy skipped::Set RAILWAY_TOKEN and RAILWAY_SERVICE_ID in GitHub repo secrets (see docs/railway-auto-deploy-AR.md). Primary deploy is usually Railway GitHub integration on push to main."
            echo "deployed=false" >> "$GITHUB_ENV"
            exit 0
          fi
          export RAILWAY_API_TOKEN="$RAILWAY_TOKEN"
          npm install -g @railway/cli@latest
          railway up --service "$RAILWAY_SERVICE_ID" --detach
          echo "deployed=true" >> "$GITHUB_ENV"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Wait for service
        if: env.deployed == 'true'
        run: sleep 45

      - name: Health smoke test
        env:
          BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          if [ -z "$BASE_URL" ]; then
            echo "::notice title=Smoke skipped::Set PUBLIC_BASE_URL to run post-deploy checks."
            exit 0
          fi
          set -e
          curl -fsS "$BASE_URL/api/health/live"
          curl -fsS "$BASE_URL/api/health/ready" | grep -q ready
          curl -fsS "$BASE_URL/api/health"
          curl -fsS "$BASE_URL/api/health/platform" | grep -q '"probes"'
          curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/admin-v2/index.html" | grep -q 200
          curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/enterprise-hub.html" | grep -q 200
          curl -fsS -o /dev/null -w "%{http_code}" "$BASE_URL/join.html" | grep -q 200
          curl -fsS "$BASE_URL/api/platform/enterprise-catalog/preview" | grep -q layerCount
          curl -fsS "$BASE_URL/api/platform/setup-status" | grep -q readyScore
          curl -fsS "$BASE_URL/worker-join-config.json" | grep -q apkUrl
          echo "Smoke tests passed (health + admin-v2 + enterprise-hub + join)."

      - name: Enterprise go-live validation (live API)
        env:
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
        run: |
          if [ -z "$PUBLIC_BASE_URL" ]; then
            echo "PUBLIC_BASE_URL not set — skipping enterprise validation."
            exit 0
          fi
          set -e
          python backend/ops/validate_enterprise_env.py \
            --base-url "$PUBLIC_BASE_URL" \
            --live-only \
            --json-only > /tmp/enterprise-report.json
          python - <<'PY'
          import json, sys
          with open("/tmp/enterprise-report.json") as f:
              r = json.load(f)
          print(json.dumps(r, indent=2, ensure_ascii=False))
          if not r.get("ok"):
              sys.exit("Enterprise go-live checks failed (critical or live API)")
          ent = (r.get("live") or {}).get("checks", {}).get("health", {}).get("enterprise") or {}
          if ent.get("demoAllowed") is True:
              sys.exit("demoAllowed must be false on production")
          print("Enterprise go-live: OK")
          PY

      - name: Production E2E smoke
        env:
          PUBLIC_BASE_URL: ${{ secrets.PUBLIC_BASE_URL }}
          BAUPASS_SMOKE_TOKEN: ${{ secrets.BAUPASS_SMOKE_TOKEN }}
        run: |
          if [ -z "$PUBLIC_BASE_URL" ]; then
            echo "PUBLIC_BASE_URL not set — skipping production E2E smoke."
            exit 0
          fi
          set -e
          python backend/ops/e2e_production_smoke.py --base-url "$PUBLIC_BASE_URL"
