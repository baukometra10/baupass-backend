name: backend-ci

on:
  push:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Migration dry run
        run: python -m backend.app.migrations.runner --dry-run

      - name: Inline thread guard
        run: python backend/ops/check_no_inline_threads.py

      - name: Run tests
        env:
          BAUPASS_ENV: testing
          BAUPASS_ENABLE_BACKGROUND_JOBS: "0"
          BAUPASS_ENABLE_IMAP_POLLER: "0"
          BAUPASS_SKIP_IMAP_POLL: "1"
        run: |
          set -o pipefail
          if ! pytest backend/tests -q --tb=short 2>&1 | tee pytest.log; then
            {
              echo "### pytest failures"
              echo '```'
              tail -n 60 pytest.log
              echo '```'
            } >> "$GITHUB_STEP_SUMMARY"
            exit 1
          fi
