name: backend-ci

on:
  push:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml
  pull_request:
    paths:
      - backend/**
      - .github/workflows/backend-ci.yml

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Migration dry run
        run: python -m backend.app.migrations.runner --dry-run

      - name: Inline thread guard
        run: python backend/ops/check_no_inline_threads.py

      - name: Run tests
        env:
          BAUPASS_ENV: testing
        run: pytest backend/tests -q
