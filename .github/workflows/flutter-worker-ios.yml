# Build iOS app (unsigned) for local signing / TestFlight upload.
name: Build worker iOS

on:
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "mobile/**"
      - ".github/workflows/flutter-worker-ios.yml"

jobs:
  ios:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Complete Flutter platform scaffolding
        working-directory: mobile
        run: flutter create . --org com.baupass --project-name baupass_worker

      - name: Restore native customizations
        run: |
          git checkout HEAD -- \
            mobile/ios/Runner/NfcReaderPlugin.swift \
            mobile/ios/Runner/AppDelegate.swift \
            mobile/ios/Runner/Info.plist \
            mobile/ios/Runner/Runner.entitlements \
            mobile/test/widget_test.dart

      - name: Resolve dependencies
        working-directory: mobile
        run: flutter pub get

      - name: Build iOS (no codesign)
        working-directory: mobile
        env:
          API_URL: https://baupass-production.up.railway.app
        run: >
          flutter build ios --release --no-codesign
          --dart-define=BAUPASS_API_URL=${{ env.API_URL }}

      - name: Package Runner.app
        run: |
          cd mobile/build/ios/iphoneos
          zip -r ../../../baupass-worker-ios-unsigned.zip Runner.app

      - name: Upload iOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: baupass-worker-ios-unsigned
          path: mobile/baupass-worker-ios-unsigned.zip
          if-no-files-found: error
