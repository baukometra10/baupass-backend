name: baupass_worker
description: White-label employee app — hybrid Flutter with native NFC.
publish_to: "none"
version: 0.1.18+69

environment:
  sdk: ">=3.3.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  app_links: ^6.3.2
  just_audio: ^0.9.46
  connectivity_plus: ^6.1.0
  geolocator: ^13.0.2
  http: ^1.2.2
  qr_flutter: ^4.1.0
  mobile_scanner: ^6.0.2
  path_provider: ^2.1.4
  record: ^6.0.0
  shared_preferences: ^2.3.2
  cryptography: ^2.7.0
  flutter_secure_storage: ^9.2.2
  uuid: ^4.5.1
  firebase_core: ^3.6.0
  firebase_messaging: ^15.1.0
  open_file: ^3.5.10
  file_picker: ^10.3.10
  url_launcher: ^6.3.1
  flutter_webrtc: ^0.12.12
  flutter_callkit_incoming: ^2.0.4+1
  livekit_client: 2.4.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

dependency_overrides:
  geolocator_android: 4.6.1
  record_linux: ^1.3.0
  # Flutter 3.44 / Dart 3.12 local resolver needs these pins:
  leak_tracker: 11.0.2
  leak_tracker_testing: 3.0.2
  leak_tracker_flutter_testing: 3.0.10
  plugin_platform_interface: 2.1.8
  just_audio: 0.9.46

flutter:
  uses-material-design: true
  assets:
    - assets/branding/
