<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mitarbeiter-App</title>
  <meta http-equiv="cache-control" content="no-cache, no-store, must-revalidate" />
  <meta http-equiv="pragma" content="no-cache" />
  <meta http-equiv="expires" content="0" />
  <script>
    (function () {
      var FALLBACK_BUILD = "20260627d";

      function buildTargetUrl(build) {
        var url = new URL(window.location.href);
        var target = new URL("/emp-app.html", window.location.origin);
        url.searchParams.forEach(function (value, key) {
          if (key !== "refresh" && key !== "boot") {
            target.searchParams.set(key, value);
          }
        });
        target.searchParams.set("worker", "1");
        target.searchParams.set("v", build || FALLBACK_BUILD);
        target.searchParams.set("apiBase", window.location.origin);
        if (!target.searchParams.get("view")) {
          target.searchParams.set("view", "card");
        }
        return target;
      }

      function clearOldWorkerRuntime() {
        var jobs = [];
        if ("serviceWorker" in navigator && navigator.serviceWorker.getRegistrations) {
          jobs.push(
            navigator.serviceWorker.getRegistrations()
              .then(function (registrations) {
                return Promise.all(registrations.map(function (registration) {
                  return registration.unregister().catch(function () {});
                }));
              })
              .catch(function () {})
          );
        }
        if ("caches" in window && caches.keys) {
          jobs.push(
            caches.keys()
              .then(function (keys) {
                return Promise.all(keys
                  .filter(function (key) { return key.indexOf("baupass-worker-") === 0; })
                  .map(function (key) { return caches.delete(key).catch(function () {}); }));
              })
              .catch(function () {})
          );
        }
        return Promise.all(jobs);
      }

      function redirectWithBuild(build) {
        var target = buildTargetUrl(build);
        var timeout = new Promise(function (resolve) { window.setTimeout(resolve, 900); });
        Promise.race([clearOldWorkerRuntime(), timeout]).finally(function () {
          window.location.replace(target.toString());
        });
      }

      fetch("/worker-build.json?t=" + Date.now(), { cache: "no-store" })
        .then(function (response) { return response.ok ? response.json() : null; })
        .then(function (meta) {
          var build = String((meta && meta.build) || FALLBACK_BUILD).trim() || FALLBACK_BUILD;
          redirectWithBuild(build);
        })
        .catch(function () {
          redirectWithBuild(FALLBACK_BUILD);
        });
    })();
  </script>
  <noscript>
    <meta http-equiv="refresh" content="0;url=/emp-app.html?worker=1&view=card&v=20260627d" />
  </noscript>
</head>
<body>
  <p>Weiterleitung zur Mitarbeiter-App…</p>
  <p><a href="/emp-app.html?worker=1&view=card&v=20260627d">Weiter</a></p>
</body>
</html>
