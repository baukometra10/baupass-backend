# Render Blueprint – Free Plan (ohne Disk; Daten bei Neustart/Deploy ggf. neu)
# Für dauerhafte DB: Render Dashboard → Disk hinzufügen (kostenpflichtiger Plan)
services:
  - type: web
    name: baupass
    runtime: python
    plan: free
    buildCommand: pip install -r backend/requirements.txt
    startCommand: python backend/run_prod.py
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.9"
