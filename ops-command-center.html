<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BauPass — Ops Command Center</title>
  <link rel="stylesheet" href="/design-tokens.css" />
  <link rel="stylesheet" href="/embed-shell.css?v=20260531shell2" />
  <link rel="stylesheet" href="/ops-shell.css" />
  <style>
    main { padding: 1rem 1.5rem; display: grid; gap: 1rem; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); }
    .card {
      background: var(--panel); border-radius: 12px; padding: 1rem; border: 1px solid var(--border);
      transition: border-color 0.2s, transform 0.15s;
    }
    .card.critical { border-color: var(--danger); box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.25); }
    .card.clickable { cursor: pointer; }
    .card.clickable:hover { border-color: var(--accent); transform: translateY(-2px); }
    .metric { font-size: 2rem; font-weight: 700; color: var(--accent); }
    .label { font-size: 0.85rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 0.85rem; }
    th, td { text-align: start; padding: 0.5rem 0.4rem; border-bottom: 1px solid var(--border); }
    tr[data-cid] { cursor: pointer; }
    tr[data-cid]:hover { background: #14202c; }
    .err { color: var(--danger); padding: 1rem; }
    #status { font-size: 0.8rem; color: var(--muted); }
    .actions { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .actions a, .actions button {
      font-size: 0.78rem; padding: 0.35rem 0.65rem; border-radius: 8px; border: 1px solid var(--border);
      background: #0c1218; color: var(--accent); cursor: pointer; text-decoration: none;
    }
    .event-feed { max-height: 220px; overflow-y: auto; font-size: 0.78rem; }
    .event-line { padding: 0.35rem 0; border-bottom: 1px solid var(--border); color: var(--muted); }
    .event-line strong { color: var(--text); }
    .guardian-card { grid-column: 1 / -1; border-color: var(--accent); }
    .guardian-card.degraded { border-color: var(--warn); }
    .guardian-card.down { border-color: var(--danger); box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.25); }
    .guardian-head { display: flex; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .guardian-status { font-size: 1.35rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }
    .guardian-card.degraded .guardian-status { color: var(--warn); }
    .guardian-card.down .guardian-status { color: var(--danger); }
    .guardian-probes { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.65rem; }
    .guardian-probe {
      font-size: 0.72rem; padding: 0.2rem 0.45rem; border-radius: 999px;
      border: 1px solid var(--border); color: var(--muted);
    }
    .guardian-probe.ok { border-color: rgba(75, 227, 209, 0.35); color: var(--accent); }
    .guardian-probe.fail { border-color: rgba(248, 113, 113, 0.45); color: var(--danger); }
    .guardian-actions { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.65rem; }
    .guardian-actions button {
      font-size: 0.75rem; padding: 0.35rem 0.65rem; border-radius: 8px;
      border: 1px solid var(--border); background: #0c1218; color: var(--accent); cursor: pointer;
    }
    .guardian-ops { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-top: 0.65rem; }
    .guardian-ops span { font-size: 0.72rem; color: var(--muted); padding: 0.2rem 0.45rem; border: 1px solid var(--border); border-radius: 999px; }
    .guardian-ops span.warn { color: var(--warn); border-color: rgba(251, 191, 36, 0.4); }
    .guardian-history { margin-top: 0.65rem; font-size: 0.72rem; color: var(--muted); max-height: 120px; overflow-y: auto; }
    .guardian-history-row { padding: 0.2rem 0; border-bottom: 1px solid var(--border); }
  </style>
</head>
<body class="ops-app">
  <header class="ops-header">
    <div>
      <h1><span class="ops-pulse" id="liveDot"></span> Ops Command Center</h1>
      <div id="status">Laden…</div>
    </div>
    <nav class="ops-nav">
      <a href="/ai-command-center.html">KI Command Center</a>
      <a href="/enterprise-hub.html">Enterprise Hub</a>
      <a href="/admin-v2/index.html">Admin v2</a>
      <a href="/foreman.html">Vorarbeiter</a>
      <a href="/ops-live-map.html" id="mapLink">Live Karte</a>
    </nav>
  </header>
  <main id="grid"></main>
  <script src="/embed-helpers.js?v=20260529f"></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="/ops-realtime.js"></script>
  <script>
    const qs = new URLSearchParams(location.search);
    const companyId = qs.get("company_id") || "";
    const mapLink = document.getElementById("mapLink");
    if (mapLink && companyId) mapLink.href = `/ops-live-map.html?company_id=${encodeURIComponent(companyId)}`;
    let lastPayload = null;

    function companyLink(path, cid) {
      const u = new URL(path, location.origin);
      if (cid) u.searchParams.set("company_id", cid);
      if (window.BaupassEmbed?.isEmbedMode?.()) {
        u.searchParams.set("embed", "1");
      }
      return u.pathname + u.search;
    }

    function renderForecastCard(grid, fc) {
      if (!fc?.date || !grid) return;
      const el = document.createElement("div");
      el.className = "card";
      el.dataset.action = "tomorrow";
      el.title = "KI: Personalplanung für morgen";
      el.innerHTML = `
        <div class="label">Prognose morgen · ${fc.weekdayLabel || ""}</div>
        <div class="metric" style="font-size:1.35rem">${fc.expectedOnSite ?? "—"} <span style="font-size:0.75rem;color:var(--muted)">on-site</span></div>
        <div class="label" style="margin-top:0.35rem">${(fc.summary || "").slice(0, 90)}…</div>`;
      el.addEventListener("click", () => {
        const base = companyLink("/ai-command-center.html", companyId);
        const q = encodeURIComponent("Was ist die Personalprognose für morgen und welche Maßnahmen empfiehlst du?");
        location.href = `${base}${base.includes("?") ? "&" : "?"}autoprompt=${q}`;
      });
      grid.insertBefore(el, grid.querySelector(".card[style*='grid-column']") || grid.firstChild);
    }

    function renderGuardianCard(guardian, history) {
      if (!guardian || !guardian.timestamp) return "";
      const status = String(guardian.status || "unknown").toLowerCase();
      const cls = status === "ok" ? "" : status === "down" ? "down" : "degraded";
      const statusLabel = status === "ok" ? "OK" : status === "down" ? "Offline" : "Eingeschränkt";
      const failed = Array.isArray(guardian.failedProbes) ? guardian.failedProbes : [];
      const probes = Array.isArray(guardian.probes) ? guardian.probes : [];
      const probeHtml = probes.map((p) => {
        const ok = !!p.ok;
        const label = p.id || "probe";
        return `<span class="guardian-probe ${ok ? "ok" : "fail"}">${label}${p.latencyMs != null ? ` · ${p.latencyMs}ms` : ""}</span>`;
      }).join("");
      const host = (guardian.cloud && guardian.cloud.host) || "";
      const checked = (guardian.timestamp || "").replace("T", " ").slice(0, 19);
      const alertHint = failed.length
        ? `Betroffen: ${failed.join(", ")}`
        : (guardian.workersDegraded ? "Hintergrund-Worker fehlen" : "Alle Module grün");
      const remediation = guardian.remediation || {};
      const applied = remediation.appliedCount ?? 0;
      const remediationHint = remediation.enabled
        ? (applied > 0 ? `Auto-Reparatur: ${applied} Playbook(s)` : "Auto-Reparatur bereit")
        : "";
      const sec = guardian.security || {};
      const secHint = sec.enabled
        ? (sec.elevated
          ? `Security: ${sec.failedLogins15m ?? 0} Fehl-Logins/15min (${String(sec.severity || "warn").toUpperCase()})`
          : `Security: ${sec.failedLogins24h ?? 0} Fehl-Logins/24h · OK`)
        : "";
      const extraHints = [remediationHint, secHint].filter(Boolean).join(" · ");
      const ops = guardian.ops || {};
      const opsHtml = `
        <div class="guardian-ops">
          <span class="${(ops.criticalInvoiceRetries || 0) > 0 ? "warn" : ""}">Rechnungs-Retry: ${ops.criticalInvoiceRetries ?? 0}</span>
          <span class="${(ops.invoiceDeadLetters || 0) > 0 ? "warn" : ""}">Invoice DL: ${ops.invoiceDeadLetters ?? 0}</span>
          <span class="${(ops.queueDeadLetterEvents || 0) > 0 ? "warn" : ""}">Queue DL: ${ops.queueDeadLetterEvents ?? 0}</span>
          <span>Worker: ${ops.activeWorkers ?? 0}</span>
        </div>`;
      const historyHtml = (history || []).slice(0, 8).map((row) => {
        const ts = String(row.timestamp || "").replace("T", " ").slice(0, 16);
        const st = String(row.status || "?").toUpperCase();
        const fixes = row.appliedCount ? ` · ${row.appliedCount} Fix` : "";
        return `<div class="guardian-history-row">${ts} · ${st}${fixes}</div>`;
      }).join("") || `<div class="guardian-history-row">—</div>`;
      return `
        <div class="card guardian-card ${cls}" id="guardianCard">
          <div class="guardian-head">
            <div>
              <div class="label">Platform Guardian</div>
              <div class="guardian-status">${statusLabel}</div>
              <div class="label" style="margin-top:0.35rem">${alertHint}</div>
              ${extraHints ? `<div class="label" style="margin-top:0.25rem">${extraHints}</div>` : ""}
            </div>
            <div class="label">${host ? host + "<br>" : ""}${checked} UTC</div>
          </div>
          <div class="guardian-probes">${probeHtml || '<span class="guardian-probe">—</span>'}</div>
          ${opsHtml}
          <div class="guardian-actions">
            <button type="button" id="guardianCheckBtn">Health-Check</button>
            <button type="button" id="guardianRepairBtn">Jetzt reparieren</button>
          </div>
          <div class="guardian-history">${historyHtml}</div>
        </div>`;
    }

    function wireGuardianActions() {
      document.getElementById("guardianCheckBtn")?.addEventListener("click", async () => {
        try {
          await fetch("/api/guardian/check", { method: "POST", credentials: "include" });
          await load();
        } catch (e) {
          alert(e.message || "Check fehlgeschlagen");
        }
      });
      document.getElementById("guardianRepairBtn")?.addEventListener("click", async () => {
        if (!window.confirm("Guardian-Reparatur jetzt ausführen?")) return;
        try {
          const res = await fetch("/api/guardian/remediate", { method: "POST", credentials: "include" });
          if (!res.ok) throw new Error(await res.text());
          await load();
        } catch (e) {
          alert(e.message || "Reparatur fehlgeschlagen");
        }
      });
    }

    function render(data, forecast, guardianBundle) {
      const guardian = guardianBundle?.status || guardianBundle;
      const guardianHistory = guardianBundle?.history || [];
      lastPayload = data;
      const status = document.getElementById("status");
      const grid = document.getElementById("grid");
      const t = data.totals || {};
      status.textContent = `${data.date || "—"} · ${data.scope === "global" ? "Alle Firmen" : "Eine Firma"} · Live`;

      const emerg = t.activeEmergencies ?? 0;
      const sec = t.openSecurityAlerts ?? 0;

      grid.innerHTML = `
        ${renderGuardianCard(guardian, guardianHistory)}
        <div class="card ops-card clickable" data-action="onsite" title="KI: Wer ist auf der Baustelle?">
          <div class="ops-label">Auf Baustelle</div><div class="ops-metric">${t.workersOnSite ?? 0}</div>
        </div>
        <div class="card clickable" data-action="companies">
          <div class="label">Firmen aktiv</div><div class="metric">${t.companies ?? 0}</div>
        </div>
        <div class="card clickable ${emerg > 0 ? "critical" : ""}" data-action="emergency">
          <div class="label">Notfälle aktiv</div><div class="metric" style="color:${emerg > 0 ? "var(--danger)" : "var(--accent)"}">${emerg}</div>
        </div>
        <div class="card clickable ${sec > 3 ? "critical" : ""}" data-action="security">
          <div class="label">Offene Security-Alerts</div><div class="metric">${sec}</div>
        </div>
        <div class="card" style="grid-column: 1 / -1">
          <div class="label">Firmen — Klick für KI & Admin</div>
          <table>
            <thead><tr><th>Firma</th><th>On-site</th><th>Gates heute</th><th>Notfall</th><th>Security</th></tr></thead>
            <tbody>${(data.companies || []).map((c) => `
              <tr data-cid="${c.id || c.companyId || ""}" data-name="${(c.name || "").replace(/"/g, "")}">
                <td><strong>${c.name}</strong></td>
                <td>${c.workersOnSite}</td>
                <td>${c.activeGatesToday}</td>
                <td>${c.activeEmergencies > 0 ? "⚠ " + c.activeEmergencies : "—"}</td>
                <td>${c.openSecurityAlerts > 0 ? c.openSecurityAlerts : "—"}</td>
              </tr>`).join("")}</tbody>
          </table>
          <div class="actions">
            <a href="${companyLink("/ai-command-center.html", companyId)}">KI Command Center</a>
            <a href="/admin-v2/index.html#inbox">Posteingang</a>
            <button type="button" id="refreshBtn">Jetzt aktualisieren</button>
          </div>
        </div>
        <div class="card" style="grid-column: 1 / -1">
          <div class="label">Live-Ereignisse (SSE)</div>
          <div id="eventFeed" class="event-feed"><span class="muted">Verbinde…</span></div>
        </div>`;

      grid.querySelectorAll("[data-action]").forEach((el) => {
        el.addEventListener("click", () => {
          const a = el.dataset.action;
          const base = companyLink("/ai-command-center.html", companyId);
          const prompts = {
            onsite: "Wer ist gerade auf allen Baustellen und wo gibt es Engpässe?",
            emergency: "Gibt es aktive Notfälle und was sind die Sofortmaßnahmen?",
            security: "Fasse offene Security-Alerts zusammen und priorisiere.",
            companies: "Vergleiche die Firmen nach Risiko und Anwesenheit.",
          };
          const q = encodeURIComponent(prompts[a] || "");
          location.href = `${base}${base.includes("?") ? "&" : "?"}autoprompt=${q}`;
        });
      });

      grid.querySelectorAll("tr[data-cid]").forEach((row) => {
        row.addEventListener("click", () => {
          const cid = row.dataset.cid;
          if (!cid) return;
          location.href = companyLink("/ai-command-center.html", cid);
        });
      });
      document.getElementById("refreshBtn")?.addEventListener("click", load);
      wireGuardianActions();
      if (forecast) renderForecastCard(grid, forecast);
    }

    async function loadForecast() {
      if (!companyId) return null;
      try {
        const res = await fetch(
          `/api/ops-os/predictions/tomorrow?company_id=${encodeURIComponent(companyId)}`,
          { credentials: "include" },
        );
        if (!res.ok) return null;
        return await res.json();
      } catch {
        return null;
      }
    }

    async function loadGuardianBundle() {
      try {
        const [statusRes, historyRes] = await Promise.all([
          fetch("/api/guardian/status", { credentials: "include" }),
          fetch("/api/guardian/history?limit=20", { credentials: "include" }),
        ]);
        const status = statusRes.ok ? await statusRes.json() : null;
        const historyPayload = historyRes.ok ? await historyRes.json() : {};
        return { status, history: historyPayload.history || [] };
      } catch {
        return { status: null, history: [] };
      }
    }

    async function load() {
      const status = document.getElementById("status");
      const grid = document.getElementById("grid");
      try {
        let url = "/api/ops-os/command-center";
        if (companyId) url += `?company_id=${encodeURIComponent(companyId)}`;
        const [res, forecast, guardianBundle] = await Promise.all([
          fetch(url, { credentials: "include" }),
          loadForecast(),
          loadGuardianBundle(),
        ]);
        if (!res.ok) throw new Error(res.status + " " + res.statusText);
        render(await res.json(), forecast, guardianBundle);
      } catch (e) {
        status.textContent = "";
        grid.innerHTML = `<p class="err">Bitte in Admin v2 anmelden, dann diese Seite öffnen. ${e.message}</p>`;
      }
    }

    let stopRealtime = null;

    async function startEventStream() {
      const feed = document.getElementById("eventFeed");
      if (!feed || !window.BauPassOpsRealtime) return;
      if (stopRealtime) stopRealtime();
      feed.innerHTML = '<span class="muted">Verbinde Live-Stream…</span>';
      stopRealtime = await window.BauPassOpsRealtime.start({
        companyId,
        feedEl: feed,
        onMode: (mode) => {
          const st = document.getElementById("status");
          if (st) st.textContent = `${st.textContent.split("·")[0].trim()} · Live (${mode})`;
        },
      });
    }

    (function initEmbed() {
      const params = new URLSearchParams(location.search);
      if (params.get("embed") === "1") {
        document.documentElement.classList.add("embed-document");
        document.body.classList.add("embed-mode");
        document.querySelector(".ops-header .ops-nav")?.remove();
        document.querySelector("header .ops-nav")?.remove();
      } else if (window.BaupassEmbed) {
        const extra = companyId ? { company_id: companyId } : {};
        window.BaupassEmbed.wireEmbedNav(".ops-nav a[href^='/']", extra);
      }
    })();

    load();
    setInterval(load, 15000);
    startEventStream();

    (async () => {
      const ap = qs.get("autoprompt");
      if (ap) {
        const dest = companyLink("/ai-command-center.html", companyId) + (companyId ? "&" : "?") + "autoprompt=" + ap;
        if (!location.pathname.includes("ai-command")) location.href = dest;
      }
    })();
  </script>
</body>
</html>
