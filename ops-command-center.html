<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />

  <meta name="application-name" content="BauPass Ops Center" />
  <title>BauPass — Ops Center</title>
  <link rel="apple-touch-icon" sizes="192x192" href="/worker-icon-192.png" />
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="/worker-icon-192.svg" />
  <link id="appFavicon" rel="icon" type="image/png" sizes="192x192" href="/worker-icon-192.png" />
  <link rel="stylesheet" href="/design-tokens.css" />

  <style>
    main { padding: 0.75rem 1rem; display: grid; gap: 0.75rem; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); }
    .card {
      background: var(--panel); border-radius: 12px; padding: 0.85rem; border: 1px solid var(--border);
      transition: border-color 0.2s, transform 0.15s;
    }
    .card.critical { border-color: var(--danger); box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.25); }
    .card.clickable { cursor: pointer; }
    .card.clickable:hover { border-color: var(--accent); transform: translateY(-2px); }
    .metric { font-size: 1.65rem; font-weight: 700; color: var(--accent); }
    .label { font-size: 0.8rem; color: var(--muted); }
    table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
    th, td { text-align: start; padding: 0.4rem 0.35rem; border-bottom: 1px solid var(--border); }
    tr[data-cid] { cursor: pointer; }
    tr[data-cid]:hover { background: #14202c; }
    .err { color: var(--danger); padding: 1rem; }
    #status { font-size: 0.8rem; color: var(--muted); }
    .actions { margin-top: 0.6rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .actions a, .actions button {
      font-size: 0.72rem; padding: 0.3rem 0.55rem; border-radius: 8px; border: 1px solid var(--border);
      background: #0c1218; color: var(--accent); cursor: pointer; text-decoration: none;
    }
    .event-feed { max-height: 190px; overflow-y: auto; font-size: 0.74rem; }
    .event-line { padding: 0.35rem 0; border-bottom: 1px solid var(--border); color: var(--muted); }
    .event-line strong { color: var(--text); }
    .guardian-card { grid-column: 1 / -1; border-color: var(--accent); }
    .guardian-card.degraded { border-color: var(--warn); }
    .guardian-card.down { border-color: var(--danger); box-shadow: 0 0 0 1px rgba(248, 113, 113, 0.25); }
    .guardian-head { display: flex; justify-content: space-between; gap: 0.75rem; flex-wrap: wrap; align-items: center; }
    .guardian-status { font-size: 1.1rem; font-weight: 700; color: var(--accent); text-transform: uppercase; }
    .guardian-card.degraded .guardian-status { color: var(--warn); }
    .guardian-card.down .guardian-status { color: var(--danger); }
    .guardian-probes { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.65rem; }
    .guardian-probe {
      font-size: 0.68rem; padding: 0.18rem 0.4rem; border-radius: 999px;
      border: 1px solid var(--border); color: var(--muted);
    }
    .guardian-probe.ok { border-color: rgba(75, 227, 209, 0.35); color: var(--accent); }
    .guardian-probe.fail { border-color: rgba(248, 113, 113, 0.45); color: var(--danger); }
    .guardian-actions { display: flex; flex-wrap: wrap; gap: 0.3rem; margin-top: 0.55rem; }
    .guardian-actions button {
      font-size: 0.7rem; padding: 0.28rem 0.5rem; border-radius: 8px;
      border: 1px solid var(--border); background: #0c1218; color: var(--accent); cursor: pointer;
    }
    .guardian-ops { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.55rem; }
    .guardian-ops span { font-size: 0.68rem; color: var(--muted); padding: 0.18rem 0.4rem; border: 1px solid var(--border); border-radius: 999px; }
    .guardian-ops span.warn { color: var(--warn); border-color: rgba(251, 191, 36, 0.4); }
    .guardian-history { margin-top: 0.55rem; font-size: 0.68rem; color: var(--muted); max-height: 110px; overflow-y: auto; }
    .guardian-history-row { padding: 0.2rem 0; border-bottom: 1px solid var(--border); }
  </style>
</head>

    const tr = (key, vars = {}) => {
      let text = (OPS_I18N[OPS_LANG] || OPS_I18N.de)[key] || (OPS_I18N.de[key] || key);
      Object.entries(vars).forEach(([k, v]) => {
        text = text.replace(new RegExp(`\\{${k}\\}`, "g"), String(v));
      });
      return text;
    };

    const qs = new URLSearchParams(location.search);
    const companyId = qs.get("company_id") || "";
    const mapLink = document.getElementById("mapLink");
    if (mapLink && companyId) mapLink.href = `/ops-live-map.html?company_id=${encodeURIComponent(companyId)}`;

    let lastPayload = null;
    let lastForecast = null;
    let lastGuardianBundle = null;
    let lastStatusDate = "—";
    let lastStatusScope = "global";

    function applyOpsUiLanguage() {
      OPS_LANG = getUiLang();
      const isAr = OPS_LANG === "ar";
      document.documentElement.lang = OPS_LANG;
      document.documentElement.dir = isAr ? "rtl" : "ltr";
      document.title = `BauPass — ${tr("title")}`;
      const titleEl = document.getElementById("opsTitle");
      if (titleEl) titleEl.textContent = tr("title");
      const navMap = {
        navAi: "navAi",
        navHub: "navHub",
        navAdmin: "navAdmin",
        navForeman: "navForeman",
        mapLink: "navLiveMap",
      };
      Object.entries(navMap).forEach(([id, key]) => {
        const el = document.getElementById(id);
        if (el) el.textContent = tr(key);
      });
      const statusEl = document.getElementById("status");
      if (statusEl && !lastPayload) statusEl.textContent = tr("loading");
    }

    function syncOpsLangFromParent(lang) {
      const code = String(lang || "").slice(0, 2).toLowerCase();
      if (!["de", "en", "ar"].includes(code) || code === OPS_LANG) return;
      applyOpsUiLanguage();
      if (lastPayload) render(lastPayload, lastForecast, lastGuardianBundle);
    }

    window.addEventListener("baupass-lang-sync", (event) => {
      syncOpsLangFromParent(event?.detail?.lang);
    });
    window.addEventListener("storage", (event) => {
      if (event.key === UI_LANG_KEY && event.newValue) syncOpsLangFromParent(event.newValue);
    });

    function companyLink(path, cid) {
      const u = new URL(path, location.origin);
      if (cid) u.searchParams.set("company_id", cid);
      if (window.BaupassEmbed?.isEmbedMode?.()) {
        u.searchParams.set("embed", "1");
      }
      return u.pathname + u.search;
    }

    function actionPrompts() {
      return {
        onsite: tr("promptOnsite"),
        emergency: tr("promptEmergency"),
        security: tr("promptSecurity"),
        companies: tr("promptCompanies"),
        tomorrow: tr("forecastPrompt"),
      };
    }

    function renderForecastCard(grid, fc) {
      if (!fc?.date || !grid) return;
      const el = document.createElement("div");
      el.className = "card";
      el.dataset.action = "tomorrow";
      el.title = tr("forecastTitle");
      el.innerHTML = `
        <div class="label">${tr("forecastTomorrow")} · ${fc.weekdayLabel || ""}</div>
        <div class="metric" style="font-size:1.35rem">${fc.expectedOnSite ?? "—"} <span style="font-size:0.75rem;color:var(--muted)">${tr("onSiteShort")}</span></div>
        <div class="label" style="margin-top:0.35rem">${(fc.summary || "").slice(0, 90)}…</div>`;
      el.addEventListener("click", () => {
        const base = companyLink("/ai-command-center.html", companyId);
        const q = encodeURIComponent(actionPrompts().tomorrow);
        location.href = `${base}${base.includes("?") ? "&" : "?"}autoprompt=${q}`;
      });
      grid.insertBefore(el, grid.querySelector(".card[style*='grid-column']") || grid.firstChild);
    }

    function renderGuardianCard(guardian, history) {
      if (!guardian || !guardian.timestamp) return "";
      const status = String(guardian.status || "unknown").toLowerCase();
      const cls = status === "ok" ? "" : status === "down" ? "down" : "degraded";
      const statusLabel = status === "ok" ? tr("statusOk") : status === "down" ? tr("statusOffline") : tr("statusDegraded");
      const failed = Array.isArray(guardian.failedProbes) ? guardian.failedProbes : [];
      const probes = Array.isArray(guardian.probes) ? guardian.probes : [];
      const probeHtml = probes.map((p) => {
        const ok = !!p.ok;
        const label = p.id || "probe";
        return `<span class="guardian-probe ${ok ? "ok" : "fail"}">${label}${p.latencyMs != null ? ` · ${p.latencyMs}ms` : ""}</span>`;
      }).join("");
      const host = (guardian.cloud && guardian.cloud.host) || "";
      const checked = (guardian.timestamp || "").replace("T", " ").slice(0, 19);
      const alertHint = failed.length
        ? tr("guardianAffected", { list: failed.join(", ") })
        : (guardian.workersDegraded ? tr("guardianWorkersMissing") : tr("guardianAllGreen"));
      const remediation = guardian.remediation || {};
      const applied = remediation.appliedCount ?? 0;
      const remediationHint = remediation.enabled
        ? (applied > 0 ? tr("guardianAutoRepair", { n: applied }) : tr("guardianAutoRepairReady"))
        : "";
      const sec = guardian.security || {};
      const secHint = sec.enabled
        ? (sec.elevated
          ? tr("guardianSecurityElevated", { n: sec.failedLogins15m ?? 0, severity: String(sec.severity || "warn").toUpperCase() })
          : tr("guardianSecurityOk", { n: sec.failedLogins24h ?? 0 }))
        : "";
      const extraHints = [remediationHint, secHint].filter(Boolean).join(" · ");
      const ops = guardian.ops || {};
      const opsHtml = `
        <div class="guardian-ops">
          <span class="${(ops.criticalInvoiceRetries || 0) > 0 ? "warn" : ""}">${tr("invoiceRetry")}: ${ops.criticalInvoiceRetries ?? 0}</span>
          <span class="${(ops.invoiceDeadLetters || 0) > 0 ? "warn" : ""}">${tr("invoiceDl")}: ${ops.invoiceDeadLetters ?? 0}</span>
          <span class="${(ops.queueDeadLetterEvents || 0) > 0 ? "warn" : ""}">${tr("queueDl")}: ${ops.queueDeadLetterEvents ?? 0}</span>
          <span>${tr("worker")}: ${ops.activeWorkers ?? 0}</span>
        </div>`;
      const historyHtml = (history || []).slice(0, 8).map((row) => {
        const ts = String(row.timestamp || "").replace("T", " ").slice(0, 16);
        const st = String(row.status || "?").toUpperCase();
        const fixes = row.appliedCount ? ` · ${row.appliedCount} ${tr("guardianFix")}` : "";
        return `<div class="guardian-history-row">${ts} · ${st}${fixes}</div>`;
      }).join("") || `<div class="guardian-history-row">—</div>`;
      return `
        <div class="card guardian-card ${cls}" id="guardianCard">
          <div class="guardian-head">
            <div>
              <div class="label">${tr("guardianLabel")}</div>
              <div class="guardian-status">${statusLabel}</div>
              <div class="label" style="margin-top:0.35rem">${alertHint}</div>
              ${extraHints ? `<div class="label" style="margin-top:0.25rem">${extraHints}</div>` : ""}
            </div>
            <div class="label">${host ? host + "<br>" : ""}${checked} UTC</div>
          </div>
          <div class="guardian-probes">${probeHtml || '<span class="guardian-probe">—</span>'}</div>
          ${opsHtml}
          <div class="guardian-actions">
            <button type="button" id="guardianCheckBtn">${tr("healthCheck")}</button>
            <button type="button" id="guardianRepairBtn">${tr("repairNow")}</button>
          </div>
          <div class="guardian-history">${historyHtml}</div>
        </div>`;
    }

    function api(path, opts = {}) {
      if (!window.BaupassAuth?.fetchApi) {
        throw new Error("auth");
      }
      return window.BaupassAuth.fetchApi(path, opts);
    }

    function wireGuardianActions() {
      document.getElementById("guardianCheckBtn")?.addEventListener("click", async () => {
        try {
          await api("/api/guardian/check", { method: "POST" });
          await load();
        } catch (e) {
          alert(e.message || tr("checkFailed"));
        }
      });
      document.getElementById("guardianRepairBtn")?.addEventListener("click", async () => {
        if (!window.confirm(tr("confirmRepair"))) return;
        try {
          await api("/api/guardian/remediate", { method: "POST" });
          await load();
        } catch (e) {
          alert(e.message || tr("repairFailed"));
        }
      });
    }

    function render(data, forecast, guardianBundle) {
      const guardian = guardianBundle?.status || guardianBundle;
      const guardianHistory = guardianBundle?.history || [];
      lastPayload = data;
      lastForecast = forecast;
      lastGuardianBundle = guardianBundle;
      lastStatusDate = data.date || "—";
      lastStatusScope = data.scope || "global";
      const status = document.getElementById("status");
      const grid = document.getElementById("grid");
      const totals = data.totals || {};
      const scopeLabel = data.scope === "global" ? tr("scopeGlobal") : tr("scopeOne");
      status.textContent = `${lastStatusDate} · ${scopeLabel} · ${tr("live")}`;

      const emerg = totals.activeEmergencies ?? 0;
      const sec = totals.openSecurityAlerts ?? 0;
      const prompts = actionPrompts();

      grid.innerHTML = `
        ${renderGuardianCard(guardian, guardianHistory)}
        <div class="card ops-card clickable" data-action="onsite" title="${tr("cardOnSiteHint")}">
          <div class="ops-label">${tr("cardOnSite")}</div><div class="ops-metric">${totals.workersOnSite ?? 0}</div>
        </div>
        <div class="card clickable" data-action="companies">
          <div class="label">${tr("cardCompanies")}</div><div class="metric">${totals.companies ?? 0}</div>
        </div>
        <div class="card clickable ${emerg > 0 ? "critical" : ""}" data-action="emergency">
          <div class="label">${tr("cardEmergencies")}</div><div class="metric" style="color:${emerg > 0 ? "var(--danger)" : "var(--accent)"}">${emerg}</div>
        </div>
        <div class="card clickable ${sec > 3 ? "critical" : ""}" data-action="security">
          <div class="label">${tr("cardSecurity")}</div><div class="metric">${sec}</div>
        </div>
        <div class="card" style="grid-column: 1 / -1">
          <div class="label">${tr("companiesTableTitle")}</div>
          <table>
            <thead><tr><th>${tr("thCompany")}</th><th>${tr("thOnSite")}</th><th>${tr("thGates")}</th><th>${tr("thEmergency")}</th><th>${tr("thSecurity")}</th></tr></thead>
            <tbody>${(data.companies || []).map((c) => `
              <tr data-cid="${c.id || c.companyId || ""}" data-name="${(c.name || "").replace(/"/g, "")}">
                <td><strong>${c.name}</strong></td>
                <td>${c.workersOnSite}</td>
                <td>${c.activeGatesToday}</td>
                <td>${c.activeEmergencies > 0 ? "⚠ " + c.activeEmergencies : "—"}</td>
                <td>${c.openSecurityAlerts > 0 ? c.openSecurityAlerts : "—"}</td>
              </tr>`).join("")}</tbody>
          </table>
          <div class="actions">
            <a href="${companyLink("/ai-command-center.html", companyId)}">${tr("navAi")}</a>
            <a href="/admin-v2/index.html#inbox">${tr("inbox")}</a>
            <button type="button" id="refreshBtn">${tr("refreshNow")}</button>
          </div>
        </div>
        <div class="card" style="grid-column: 1 / -1">
          <div class="label">${tr("liveEvents")}</div>
          <div id="eventFeed" class="event-feed"><span class="muted">${tr("connecting")}</span></div>
        </div>`;

      grid.querySelectorAll("[data-action]").forEach((el) => {
        el.addEventListener("click", () => {
          const a = el.dataset.action;
          const base = companyLink("/ai-command-center.html", companyId);
          const q = encodeURIComponent(prompts[a] || "");
          location.href = `${base}${base.includes("?") ? "&" : "?"}autoprompt=${q}`;
        });
      });

      grid.querySelectorAll("tr[data-cid]").forEach((row) => {
        row.addEventListener("click", () => {
          const cid = row.dataset.cid;
          if (!cid) return;
          location.href = companyLink("/ai-command-center.html", cid);
        });
      });
      document.getElementById("refreshBtn")?.addEventListener("click", load);
      wireGuardianActions();
      if (forecast) renderForecastCard(grid, forecast);
      startEventStream().catch(() => {});
    }

    async function loadForecast() {
      if (!companyId) return null;
      try {
        return await api(
          `/api/ops-os/predictions/tomorrow?company_id=${encodeURIComponent(companyId)}`,
        );
      } catch {
        return null;
      }
    }

    async function loadGuardianBundle() {
      try {
        const [status, historyPayload] = await Promise.all([
          api("/api/guardian/status"),
          api("/api/guardian/history?limit=20"),
        ]);
        return { status, history: historyPayload.history || [] };
      } catch {
        return { status: null, history: [] };
      }
    }

    async function load() {
      const status = document.getElementById("status");
      const grid = document.getElementById("grid");
      try {
        let url = "/api/ops-os/command-center";
        if (companyId) url += `?company_id=${encodeURIComponent(companyId)}`;
        const [data, forecast, guardianBundle] = await Promise.all([
          api(url),
          loadForecast(),
          loadGuardianBundle(),
        ]);
        render(data, forecast, guardianBundle);
      } catch (e) {
        status.textContent = "";
        grid.innerHTML = `<p class="err">${tr("authError")} ${e.message}</p>`;
      }
    }

    let stopRealtime = null;

    async function startEventStream() {
      const feed = document.getElementById("eventFeed");
      if (!feed || !window.BauPassOpsRealtime) return;
      if (stopRealtime) stopRealtime();
      feed.innerHTML = `<span class="muted">${tr("connectingStream")}</span>`;
      stopRealtime = await window.BauPassOpsRealtime.start({
        companyId,
        feedEl: feed,
        onMode: (mode) => {
          const st = document.getElementById("status");
          if (st) {
            const scopeLabel = lastStatusScope === "global" ? tr("scopeGlobal") : tr("scopeOne");
            st.textContent = `${lastStatusDate} · ${scopeLabel} · ${tr("live")} (${mode})`;
          }
        },
      });
    }

    (function initEmbed() {
      const params = new URLSearchParams(location.search);
      if (params.get("embed") === "1") {
        document.documentElement.classList.add("embed-document");
        document.body.classList.add("embed-mode");
        document.querySelector(".ops-header .ops-nav")?.remove();
        document.querySelector("header .ops-nav")?.remove();
      } else if (window.BaupassEmbed) {
        const extra = companyId ? { company_id: companyId } : {};
        window.BaupassEmbed.wireEmbedNav(".ops-nav a[href^='/']", extra);
      }
    })();

    applyOpsUiLanguage();
    (async () => {
      try {
        if (window.BaupassAuth?.bootstrapSession) {
          await window.BaupassAuth.bootstrapSession();
        }
      } catch {
        // load() surfaces auth errors in the grid
      }
      try {
        if (window.BaupassAuth?.resolveTenantBranding) {
          await window.BaupassAuth.resolveTenantBranding({ companyId });
        }
      } catch {
        // optional branding
      }
      load();
      setInterval(load, 15000);
    })();

    (async () => {
      const ap = qs.get("autoprompt");
      if (ap) {
        const dest = companyLink("/ai-command-center.html", companyId) + (companyId ? "&" : "?") + "autoprompt=" + ap;
        if (!location.pathname.includes("ai-command")) location.href = dest;
      }
    })();
  </script>
</body>
</html>
