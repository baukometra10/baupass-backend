<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050816" />
  <meta name="apple-mobile-web-app-title" content="BauPass Arbeitsverträge" />
  <meta name="application-name" content="BauPass Arbeitsverträge" />
  <title>BauPass — Arbeitsverträge</title>
  <link rel="apple-touch-icon" sizes="192x192" href="/worker-icon-192.png" />
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="/worker-icon-192.svg" />
  <link id="appFavicon" rel="icon" type="image/png" sizes="192x192" href="/worker-icon-192.png" />
  <link rel="stylesheet" href="/embed-shell.css?v=20260605layout1" />
  <style>
    :root { --bg:#050816; --panel:#141c28; --border:#2a3544; --text:#e8eef4; --muted:#94a3b8; --accent:#5eead4; }
    * { box-sizing:border-box; }
    body { margin:0; font-family:system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    header { padding:1rem 1.25rem; border-bottom:1px solid var(--border); background:var(--panel); display:flex; justify-content:space-between; gap:1rem; align-items:center; }
    main { max-width:1200px; margin:0 auto; padding:1rem 1.25rem 1.5rem; display:grid; grid-template-columns: 320px minmax(0, 1fr); gap:1rem; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:1rem; }
    .panel h2, .panel h3 { margin:0 0 0.6rem; }
    .contract-list { display:grid; gap:0.5rem; }
    .contract-item { width:100%; text-align:left; background:rgba(255,255,255,0.03); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:0.75rem; cursor:pointer; }
    .contract-item:hover { border-color:var(--accent); }
    form { display:grid; gap:0.75rem; }
    .grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(220px, 1fr)); gap:0.75rem; }
    label { display:grid; gap:0.3rem; font-size:0.82rem; }
    input, select, textarea, button { font:inherit; }
    input, select, textarea { width:100%; padding:0.6rem 0.7rem; border-radius:10px; border:1px solid var(--border); background:#0f1419; color:var(--text); }
    textarea { min-height:130px; resize:vertical; }
    .actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
    button { padding:0.6rem 0.9rem; border-radius:10px; border:1px solid var(--border); background:#0f1419; color:var(--text); cursor:pointer; }
    button.primary { background:#164e63; border-color:#5eead4; }
    .editor { min-height:320px; }
    .muted { color:var(--muted); }
    .status { margin-top:0.5rem; font-size:0.78rem; color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <div>
      <strong>BauPass</strong>
      <div class="muted">Arbeitsverträge</div>
    </div>
    <a href="/admin-v2/index.html" class="muted" style="text-decoration:none;">Zurück zu Betrieb</a>
  </header>
  <main>
    <section class="panel">
      <h3>Verträge suchen</h3>
      <input id="contractSearch" type="search" placeholder="Vertragstitel oder Mitarbeiter-ID" />
      <div id="contractList" class="contract-list" style="margin-top:0.75rem;"></div>
    </section>
    <section class="panel">
      <h2>AI Arbeitsvertrag</h2>
      <p class="muted">Vertragstyp wählen, Daten ergänzen, KI-Entwurf erzeugen und als PDF speichern.</p>
      <form id="contractForm">
        <div class="grid">
          <label><span>Firma</span><input id="companyId" readonly /></label>
          <label><span>Vertragstyp</span><select id="templateId"></select></label>
          <label><span>Mitarbeiter-ID</span><input id="workerId" /></label>
          <label><span>Titel</span><input id="contractTitle" value="Arbeitsvertrag" /></label>
          <label><span>Sprache</span><select id="language"><option value="de">DE</option><option value="en">EN</option><option value="ar">AR</option></select></label>
          <label><span>Arbeitsbeginn</span><input id="startDate" type="date" /></label>
          <label><span>Arbeitsort</span><input id="workLocation" /></label>
          <label><span>Wochenstunden</span><input id="weeklyHours" /></label>
          <label><span>Vergütung</span><input id="salary" /></label>
        </div>
        <label><span>Vorgaben und Vertragsinhalte</span><textarea id="notes"></textarea></label>
        <div class="actions">
          <button type="button" class="primary" id="generateBtn">KI-Entwurf erstellen</button>
          <button type="button" id="saveBtn">Speichern</button>
          <button type="button" id="pdfBtn">PDF herunterladen</button>
        </div>
        <textarea id="contractEditor" class="editor"></textarea>
        <div id="statusLine" class="status">Noch kein Vertrag geladen.</div>
      </form>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const companyId = params.get("company_id") || "";
    const token = localStorage.getItem("baupass-admin-v2-token") || localStorage.getItem("baupass-control-token") || "";
    let currentContractId = "";
    let contracts = [];
    const headers = () => ({ "Accept": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) });
    const api = async (path, options = {}) => {
      const res = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) }, credentials: "include" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || data.message || res.statusText);
      return data;
    };
    document.getElementById("companyId").value = companyId;
    async function loadTemplates() {
      const data = await api(`/api/contracts/templates?company_id=${encodeURIComponent(companyId)}`);
      const select = document.getElementById("templateId");
      select.innerHTML = (data.templates || []).map((row) => `<option value="${row.id}">${row.name}</option>`).join("");
    }
    async function loadContracts() {
      const data = await api(`/api/contracts?company_id=${encodeURIComponent(companyId)}`);
      contracts = data.contracts || [];
      renderContractList();
    }
    function renderContractList() {
      const q = (document.getElementById("contractSearch").value || "").trim().toLowerCase();
      const host = document.getElementById("contractList");
      const rows = contracts.filter((row) => {
        const text = `${row.title || ""} ${row.worker_id || ""} ${row.first_name || ""} ${row.last_name || ""}`.toLowerCase();
        return !q || text.includes(q);
      });
      host.innerHTML = rows.length
        ? rows.map((row) => `<button type="button" class="contract-item" data-id="${row.id}"><strong>${row.title || row.contract_type}</strong><br><span class="muted">${row.first_name || ""} ${row.last_name || ""}</span></button>`).join("")
        : `<p class="muted">Keine Verträge gefunden.</p>`;
      host.querySelectorAll("[data-id]").forEach((btn) => {
        btn.addEventListener("click", async () => {
          const data = await api(`/api/contracts/${btn.getAttribute("data-id")}?company_id=${encodeURIComponent(companyId)}`);
          currentContractId = data.id || "";
          document.getElementById("contractTitle").value = data.title || "";
          document.getElementById("workerId").value = data.worker_id || "";
          document.getElementById("contractEditor").value = data.final_text || data.draft_text || "";
          document.getElementById("statusLine").textContent = `Ausgewählt: ${data.title || data.id}`;
        });
      });
    }
    document.getElementById("contractSearch").addEventListener("input", renderContractList);
    document.getElementById("generateBtn").addEventListener("click", async () => {
      const body = {
        company_id: companyId,
        template_id: document.getElementById("templateId").value,
        worker_id: document.getElementById("workerId").value || undefined,
        title: document.getElementById("contractTitle").value,
        language: document.getElementById("language").value,
        notes: document.getElementById("notes").value,
        form: {
          start_date: document.getElementById("startDate").value,
          work_location: document.getElementById("workLocation").value,
          weekly_hours: document.getElementById("weeklyHours").value,
          salary_gross_monthly: document.getElementById("salary").value,
        },
      };
      const data = await api("/api/contracts/draft", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(body) });
      currentContractId = data.contract?.id || "";
      document.getElementById("contractEditor").value = data.contract?.draft_text || "";
      document.getElementById("statusLine").textContent = `KI-Entwurf erstellt: ${currentContractId}`;
      await loadContracts();
    });
    document.getElementById("saveBtn").addEventListener("click", async () => {
      if (!currentContractId) return;
      await api(`/api/contracts/${encodeURIComponent(currentContractId)}`, { method: "PUT", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ company_id: companyId, final_text: document.getElementById("contractEditor").value }) });
      document.getElementById("statusLine").textContent = "Vertrag gespeichert.";
      await loadContracts();
    });
    document.getElementById("pdfBtn").addEventListener("click", async () => {
      if (!currentContractId) return;
      const data = await api(`/api/contracts/${encodeURIComponent(currentContractId)}/generate-pdf`, { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify({ company_id: companyId }) });
      if (data.download) window.open(data.download, "_blank", "noopener");
    });
    loadTemplates().then(loadContracts).catch((e) => { document.getElementById("statusLine").textContent = e.message; });
  </script>
</body>
</html>
