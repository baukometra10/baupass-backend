<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050816" />
  <meta name="apple-mobile-web-app-title" content="WorkPass Mitarbeiter-Chat" />
  <meta name="application-name" content="WorkPass Mitarbeiter-Chat" />
  <title>SUPPIX — Mitarbeiter-Chat</title>
  <link rel="apple-touch-icon" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="/branding/suppix-ai-mark.svg" />
  <link id="appFavicon" rel="icon" type="image/png" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <style>
    :root { --bg:#050816; --panel:#141c28; --border:#2a3544; --text:#e8eef4; --muted:#94a3b8; --accent:#5eead4; --input-bg:#0f1419; --item-bg:rgba(255,255,255,0.03); }
    body.theme-white { --item-bg: rgba(15,23,42,0.04); --input-bg: #ffffff; --bg:#f1f5f9; --panel:#ffffff; --text:#0f172a; --muted:#64748b; --border:rgba(15,23,42,0.12); }
    body.theme-black { --item-bg: rgba(255,255,255,0.03); --input-bg: #0f1419; }
    * { box-sizing:border-box; }
    html { height:100%; }
    body { margin:0; min-height:100%; font-family:system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); overflow-x:hidden; overflow-y:auto; }
    header { padding:1rem 1.25rem; border-bottom:1px solid var(--border); background:var(--panel); display:flex; justify-content:space-between; gap:1rem; align-items:center; }
    main { max-width:1200px; margin:0 auto; padding:1rem 1.25rem 1.5rem; display:grid; grid-template-columns: 320px minmax(0, 1fr); gap:1rem; }
    @media (max-width: 980px) { main { grid-template-columns: 1fr; } }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:1rem; }
    .thread-list { display:grid; gap:0.5rem; }
    .thread-item { width:100%; text-align:left; background:var(--item-bg, rgba(255,255,255,0.03)); border:1px solid var(--border); color:var(--text); border-radius:10px; padding:0.75rem; cursor:pointer; }
    .thread-item:hover { border-color:var(--accent); }
    .message-list { display:grid; gap:0.6rem; max-height:420px; overflow:auto; margin-bottom:0.8rem; }
    .bubble { padding:0.75rem; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); }
    .bubble.admin { background:rgba(22,78,99,0.24); border-color:rgba(94,234,212,0.18); }
    .bubble-meta { display:flex; justify-content:flex-end; gap:0.4rem; margin-top:0.45rem; font-size:0.75rem; color:var(--muted); }
    .bubble-read.is-read { color:#5eead4; font-weight:600; }
    textarea, input, button { font:inherit; }
    textarea, input { width:100%; padding:0.65rem 0.75rem; border-radius:10px; border:1px solid var(--border); background:#0f1419; color:var(--text); }
    textarea { min-height:110px; resize:vertical; }
    .actions { display:flex; gap:0.5rem; flex-wrap:wrap; }
    button { padding:0.65rem 0.9rem; border-radius:10px; border:1px solid var(--border); background:#0f1419; color:var(--text); cursor:pointer; }
    button.primary { background:#164e63; border-color:#5eead4; }
    .muted { color:var(--muted); }
  </style>
</head>
<body>
  <header>
    <div>
      <strong>WorkPass</strong>
      <div class="muted">Mitarbeiter-Chat</div>
    </div>
    <a href="/admin-v2/index.html" id="backLink" class="muted" style="text-decoration:none;">Zurück zu Betrieb</a>
  </header>
  <main>
    <section class="panel">
      <h3>Chats</h3>
      <input id="threadSearch" type="search" placeholder="Mitarbeiter oder Thema suchen" />
      <p class="muted" style="font-size:0.85rem;margin:0.5rem 0 0;">Alle aktiven Mitarbeiter — auch ohne bisherigen Chatverlauf.</p>
      <div id="threadList" class="thread-list" style="margin-top:0.75rem;"></div>
    </section>
    <section class="panel">
      <h2>Unterhaltung</h2>
      <p class="muted">Direkte Kommunikation mit Mitarbeitern inklusive Anhängen.</p>
      <div id="threadMeta" class="muted" style="margin-bottom:0.75rem;">Noch kein Chat ausgewählt.</div>
      <div id="messageList" class="message-list"></div>
      <div class="actions" style="margin-bottom:0.75rem;">
        <input id="chatFile" type="file" />
      </div>
      <textarea id="chatReply" placeholder="Antwort schreiben…"></textarea>
      <div class="actions" style="margin-top:0.75rem;">
        <button type="button" class="primary" id="sendReplyBtn">Senden</button>
      </div>
    </section>
  </main>
  <script src="/workpass-storage.js?v=20260624storage1"></script>
  <script src="/control-pass-theme.js?v=20260619theme1"></script>
  <script>
    const WP = window.WorkPassStorage;
    const wpGet = (key) => (WP?.getItem ? WP.getItem(key) : localStorage.getItem(key));
    const params = new URLSearchParams(location.search);
    const companyId = params.get("company_id") || wpGet(WP?.KEYS?.ADMIN_COMPANY || "workpass-admin-company") || "";
    const token = wpGet(WP?.KEYS?.ADMIN_TOKEN || "workpass-admin-token") || wpGet(WP?.KEYS?.SESSION_TOKEN || "workpass-session-token") || "";
    const backLink = document.getElementById("backLink");
    if (companyId) backLink.href = `/admin-v2/index.html?company_id=${encodeURIComponent(companyId)}#operations`;
    let threads = [];
    let currentThreadId = "";
    let currentWorkerId = "";
    let chatPollTimer = null;
    const headers = () => ({ "Accept": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) });
    const api = async (path, options = {}) => {
      const res = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) }, credentials: "include" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || data.message || res.statusText);
      return data;
    };
    async function apiMultipart(path, { fields = {}, fileField = "file", file } = {}) {
      const form = new FormData();
      Object.entries(fields).forEach(([key, value]) => form.append(key, value));
      if (file) form.append(fileField, file);
      const res = await fetch(path, { method: "POST", headers: headers(), body: form, credentials: "include" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || data.message || res.statusText);
      return data;
    }
    function formatChatTimestamp(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return raw;
      const timeStr = date.toLocaleTimeString("de-DE", { hour: "2-digit", minute: "2-digit" });
      const now = new Date();
      if (date.toDateString() === now.toDateString()) return timeStr;
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      if (date.toDateString() === yesterday.toDateString()) return `Gestern, ${timeStr}`;
      return `${date.toLocaleDateString("de-DE", { day: "2-digit", month: "2-digit", year: "numeric" })}, ${timeStr}`;
    }
    function chatReadLabel(msg) {
      const sender = String(msg.senderType || "");
      if (sender === "admin") {
        return msg.readByRecipient ? "Gelesen" : "Zugestellt";
      }
      if (sender === "worker" && msg.readByRecipient) {
        return "Gelesen";
      }
      return "";
    }
    function renderChatBubble(msg) {
      const who = msg.senderType === "worker" ? "Mitarbeiter" : "Firma";
      const time = formatChatTimestamp(msg.createdAt);
      const read = chatReadLabel(msg);
      const attach = Array.isArray(msg.attachments) && msg.attachments.length
        ? `<div class="muted" style="margin-top:0.5rem;">${msg.attachments.map((a) => `<a href="/api/chat/attachments/${a.id}/download" target="_blank" rel="noopener">📎 ${a.filename}</a>`).join("<br>")}</div>`
        : "";
      return `<div class="bubble ${msg.senderType === "admin" ? "admin" : ""}"><strong>${who}</strong><br><span>${msg.body || ""}</span>${attach}<div class="bubble-meta"><span>${time}</span>${read ? `<span class="bubble-read${msg.readByRecipient ? " is-read" : ""}">${read}</span>` : ""}</div></div>`;
    }
    function renderThreads() {
      const q = (document.getElementById("threadSearch").value || "").trim().toLowerCase();
      const host = document.getElementById("threadList");
      const rows = threads.filter((row) => (`${row.subject || ""} ${row.first_name || ""} ${row.last_name || ""} ${row.badge_id || ""}`).toLowerCase().includes(q));
      host.innerHTML = rows.length
        ? rows.map((row) => {
            const name = `${row.first_name || ''} ${row.last_name || ''}`.trim() || row.badge_id || 'Mitarbeiter';
            const meta = row.hasThread ? (row.subject || 'general') : 'Neuer Chat';
            return `<button type="button" class="thread-item" data-id="${row.id || ''}" data-worker="${row.worker_id}"><strong>${name}</strong><br><span class="muted">${meta}</span></button>`;
          }).join("")
        : `<p class="muted">Keine Mitarbeiter gefunden.</p>`;
      host.querySelectorAll("[data-worker]").forEach((btn) => {
        btn.addEventListener("click", () => openThread(btn.getAttribute("data-id"), btn.getAttribute("data-worker"), btn));
      });
    }
    async function ensureThread(threadId, workerId) {
      if (threadId) return threadId;
      const res = await api(`/api/chat/threads?company_id=${encodeURIComponent(companyId)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ worker_id: workerId, subject: "general" }),
      });
      return res.threadId || "";
    }
    async function openThread(threadId, workerId, buttonEl) {
      try {
        const resolvedId = await ensureThread(threadId, workerId);
        if (!resolvedId) throw new Error("Chat konnte nicht geöffnet werden.");
        if (buttonEl) buttonEl.setAttribute("data-id", resolvedId);
        const row = threads.find((item) => String(item.worker_id) === String(workerId));
        if (row) {
          row.id = resolvedId;
          row.hasThread = true;
        }
        await loadMessages(resolvedId, workerId);
        startChatPolling();
        renderThreads();
      } catch (error) {
        document.getElementById("threadMeta").textContent = error.message || String(error);
      }
    }
    async function loadThreads() {
      const data = await api(`/api/chat/threads?company_id=${encodeURIComponent(companyId)}`);
      threads = data.threads || [];
      renderThreads();
    }
    async function loadMessages(threadId, workerId, options = {}) {
      const quiet = Boolean(options.quiet);
      currentThreadId = threadId || "";
      currentWorkerId = workerId || "";
      const row = threads.find((item) => String(item.worker_id) === String(workerId));
      const name = row ? `${row.first_name || ''} ${row.last_name || ''}`.trim() : workerId;
      const data = await api(`/api/chat/threads/${encodeURIComponent(currentThreadId)}?company_id=${encodeURIComponent(companyId)}`);
      const messages = data.messages || [];
      if (!quiet) {
        document.getElementById("threadMeta").textContent = name ? `Chat mit ${name}` : `Thread: ${currentThreadId}`;
      }
      document.getElementById("messageList").innerHTML = messages.length
        ? messages.map((msg) => renderChatBubble(msg)).join("")
        : `<p class="muted">Noch keine Nachrichten.</p>`;
      const list = document.getElementById("messageList");
      list.scrollTop = list.scrollHeight;
    }
    function stopChatPolling() {
      if (chatPollTimer) {
        clearInterval(chatPollTimer);
        chatPollTimer = null;
      }
    }
    function startChatPolling() {
      stopChatPolling();
      chatPollTimer = setInterval(() => {
        if (!currentThreadId || !currentWorkerId) return;
        loadMessages(currentThreadId, currentWorkerId, { quiet: true }).catch(() => {});
      }, 5000);
    }
    document.getElementById("threadSearch").addEventListener("input", renderThreads);
    document.getElementById("sendReplyBtn").addEventListener("click", async () => {
      if (!currentThreadId || !currentWorkerId) return;
      const body = document.getElementById("chatReply").value.trim();
      const file = document.getElementById("chatFile").files[0] || null;
      if (!body && !file) return;
      const sendBtn = document.getElementById("sendReplyBtn");
      sendBtn.disabled = true;
      try {
        const res = await api(`/api/chat/threads/${encodeURIComponent(currentThreadId)}/messages?company_id=${encodeURIComponent(companyId)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ worker_id: currentWorkerId, body: body || (file ? `📎 ${file.name}` : "") }),
        });
        if (file && res?.message?.id) {
          await apiMultipart(`/api/chat/threads/${encodeURIComponent(currentThreadId)}/attachments?company_id=${encodeURIComponent(companyId)}`, {
            fields: { message_id: String(res.message.id), worker_id: currentWorkerId },
            file,
          });
        }
        document.getElementById("chatReply").value = "";
        document.getElementById("chatFile").value = "";
        await loadMessages(currentThreadId, currentWorkerId);
        const row = threads.find((item) => String(item.worker_id) === String(currentWorkerId));
        if (row) {
          row.hasThread = true;
          row.id = currentThreadId;
        }
        renderThreads();
      } catch (error) {
        document.getElementById("threadMeta").textContent = error.message || String(error);
      } finally {
        sendBtn.disabled = false;
      }
    });
    loadThreads().catch((e) => { document.getElementById("threadMeta").textContent = e.message; });
  </script>
</body>
</html>
