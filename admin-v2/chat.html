<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#050816" />
  <meta name="apple-mobile-web-app-title" content="SUPPIX Mitarbeiter-Chat" />
  <meta name="application-name" content="SUPPIX Mitarbeiter-Chat" />
  <title>SUPPIX — Mitarbeiter-Chat</title>
  <link rel="apple-touch-icon" sizes="192x192" href="/branding/suppix-icon-192.png" id="chatAppTouchIcon" />
  <link id="appFavicon" rel="icon" type="image/png" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <style>
    :root { --bg:#050816; --panel:#141c28; --border:#2a3544; --text:#e8eef4; --muted:#94a3b8; --accent:#5eead4; --accent-on:#111827; --input-bg:#0f1419; --item-bg:rgba(255,255,255,0.03); --active-item:rgba(94,234,212,0.13); }
    body.theme-white { --item-bg: rgba(15,23,42,0.04); --active-item:rgba(20,184,166,0.14); --input-bg: #ffffff; --bg:#f1f5f9; --panel:#ffffff; --text:#0f172a; --muted:#64748b; --border:rgba(15,23,42,0.12); }
    body.theme-black { --item-bg: rgba(255,255,255,0.03); --input-bg: #0f1419; }
    * { box-sizing:border-box; }
    html, body { height:100%; margin:0; overflow:hidden; }
    body { font-family:system-ui, "Segoe UI", sans-serif; background:var(--bg); color:var(--text); }
    .chat-app { display:flex; flex-direction:column; height:100%; min-height:0; }
    header { flex-shrink:0; padding:0.85rem 1.25rem; border-bottom:1px solid var(--border); background:var(--panel); display:flex; justify-content:space-between; gap:1rem; align-items:center; flex-wrap:wrap; }
    .brand-row { display:flex; align-items:center; gap:0.55rem; }
    .brand-logo { width:28px; height:28px; border-radius:6px; object-fit:contain; }
    .header-lang { font-size:0.78rem; padding:0.3rem 0.4rem; border-radius:8px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); }
    .chat-shell { flex:1; min-height:0; display:grid; grid-template-columns:minmax(300px, 360px) minmax(0, 1fr); gap:0.85rem; padding:0.85rem 1rem 1rem; max-width:1360px; width:100%; margin:0 auto; }
    @media (max-width: 980px) {
      .chat-shell { grid-template-columns:1fr; padding:0.65rem; }
      .chat-sidebar { max-height:38vh; }
    }
    .panel { background:var(--panel); border:1px solid var(--border); border-radius:14px; padding:0.85rem 1rem; min-height:0; }
    .chat-sidebar { display:flex; flex-direction:column; gap:0.65rem; overflow:hidden; padding:0.7rem; }
    .chat-sidebar h3 { margin:0; font-size:1.08rem; padding:0 0.15rem; }
    .sidebar-hint { font-size:0.82rem; margin:0; padding:0 0.15rem; }
    .thread-list { display:flex; flex-direction:column; gap:0.12rem; flex:1; min-height:0; overflow-y:auto; padding:0.15rem 0.15rem 0.15rem 0; }
    .thread-item { width:100%; text-align:left; background:transparent; border:1px solid transparent; color:var(--text); border-radius:14px; padding:0.58rem 0.62rem; cursor:pointer; display:grid; grid-template-columns:42px minmax(0,1fr); gap:0.7rem; align-items:center; min-height:62px; transition:background .12s ease,border-color .12s ease,transform .12s ease; }
    .thread-item.is-active { background:var(--active-item); border-color:rgba(94,234,212,0.34); }
    .thread-item.is-loading { opacity:0.78; }
    .thread-item:hover { background:var(--item-bg); border-color:rgba(94,234,212,0.24); }
    .thread-avatar { width:42px; height:42px; border-radius:50%; display:grid; place-items:center; color:#042f2e; font-weight:800; letter-spacing:.02em; background:linear-gradient(135deg,#5eead4,#93c5fd); box-shadow:0 4px 14px rgba(15,23,42,.18); }
    .thread-body { min-width:0; display:grid; gap:0.12rem; }
    .thread-top { display:flex; align-items:center; justify-content:space-between; gap:0.55rem; min-width:0; }
    .thread-name { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; font-weight:750; }
    .thread-badge { flex-shrink:0; font-size:.72rem; color:var(--muted); }
    .thread-preview { overflow:hidden; text-overflow:ellipsis; white-space:nowrap; color:var(--muted); font-size:.86rem; }
    .chat-main { display:flex; flex-direction:column; min-height:0; overflow:hidden; padding:0; }
    .chat-main-head { flex-shrink:0; padding:0.85rem 1rem 0.65rem; border-bottom:1px solid var(--border); }
    .chat-main-head h2 { margin:0 0 0.25rem; font-size:1.15rem; }
    .chat-main-head p { margin:0; }
    .message-list { flex:1; min-height:0; overflow-y:auto; display:flex; flex-direction:column; gap:0.6rem; padding:0.85rem 1rem; }
    .bubble { padding:0.75rem; border-radius:14px; background:rgba(255,255,255,0.04); border:1px solid var(--border); max-width:min(92%, 560px); }
    .bubble.admin { align-self:flex-end; background:rgba(22,78,99,0.24); border-color:rgba(94,234,212,0.18); }
    .bubble.admin.is-pending { opacity: 0.72; }
    .bubble.worker { align-self:flex-start; }
    .bubble-meta { display:flex; justify-content:flex-end; gap:0.4rem; margin-top:0.45rem; font-size:0.75rem; color:var(--muted); }
    .bubble-read.is-read { color:#5eead4; font-weight:600; }
    textarea, input, button { font:inherit; }
    textarea, input[type="search"], input[type="text"] { width:100%; padding:0.65rem 0.75rem; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); }
    .chat-compose { flex-shrink:0; border-top:1px solid var(--border); padding:0.75rem 1rem 0.85rem; display:grid; gap:0.65rem; background:var(--panel); }
    .chat-compose textarea { min-height:72px; max-height:120px; resize:none; }
    .actions { display:flex; gap:0.5rem; flex-wrap:wrap; align-items:center; }
    button { padding:0.65rem 0.9rem; border-radius:10px; border:1px solid var(--border); background:var(--input-bg); color:var(--text); cursor:pointer; }
    button.primary { background:#164e63; border-color:#5eead4; }
    button:disabled { opacity:0.6; cursor:not-allowed; }
    .header-link {
      color: var(--accent);
      text-decoration: none;
      font-size: 0.78rem;
      font-weight: 600;
      padding: 0.35rem 0.55rem;
      border: 1px solid rgba(94, 234, 212, 0.38);
      border-radius: 8px;
      background: rgba(94, 234, 212, 0.1);
      white-space: nowrap;
    }
    .header-link:hover {
      border-color: var(--accent);
      color: var(--text);
      background: rgba(94, 234, 212, 0.18);
    }
    .muted { color:var(--muted); }
    .chat-attachment-btn {
      display: inline-flex;
      align-items: center;
      gap: 0.35rem;
      margin-top: 0.35rem;
      padding: 0.45rem 0.7rem;
      border-radius: 10px;
      border: 1px solid rgba(94, 234, 212, 0.28);
      background: rgba(22, 78, 99, 0.18);
      color: var(--text);
      cursor: pointer;
      font: inherit;
      text-align: left;
      word-break: break-word;
    }
    .chat-attachment-btn:hover { border-color: var(--accent); }
    .chat-image-preview {
      display: block;
      max-width: min(240px, 100%);
      margin-top: 0.45rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      cursor: pointer;
      background: rgba(0, 0, 0, 0.12);
    }
    .chat-image-preview:hover { border-color: var(--accent); }
    .chat-image-actions {
      display: flex;
      gap: 0.4rem;
      flex-wrap: wrap;
      margin-top: 0.35rem;
    }
    .chat-delete-btn {
      border: none;
      background: transparent;
      cursor: pointer;
      opacity: 0.55;
      padding: 0 0.2rem;
      font-size: 0.85rem;
      line-height: 1;
    }
    .chat-delete-btn:hover { opacity: 1; }
  </style>
</head>
<body>
  <div class="chat-app">
    <header>
      <div class="brand-row">
        <img data-tenant-logo class="brand-logo" src="/branding/suppix-icon-192.png" alt="" width="28" height="28" />
        <div>
          <strong data-tenant-brand-title>SUPPIX</strong>
          <div class="muted" data-aci18n="pageSubtitle">Mitarbeiter-Chat</div>
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:0.5rem;flex-wrap:wrap;">
        <select id="chatLangSelect" class="header-lang" aria-label="Sprache">
          <option value="de">DE</option>
          <option value="en">EN</option>
          <option value="ar">AR</option>
          <option value="tr">TR</option>
          <option value="fr">FR</option>
          <option value="es">ES</option>
          <option value="it">IT</option>
          <option value="pl">PL</option>
        </select>
        <a href="/admin-v2/index.html" id="backLink" class="header-link" data-aci18n="back">Zurück zu Betrieb</a>
      </div>
    </header>
    <main class="chat-shell">
      <section class="panel chat-sidebar">
        <h3 data-aci18n="chatsTitle">Chats</h3>
        <input id="threadSearch" type="search" data-aci18n="searchPh" data-aci18n-attr="placeholder" placeholder="Mitarbeiter oder Thema suchen" />
        <p class="muted sidebar-hint" data-aci18n="sidebarHint">Alle aktiven Mitarbeiter — auch ohne bisherigen Chatverlauf.</p>
        <div id="threadList" class="thread-list"></div>
      </section>
      <section class="panel chat-main">
        <div class="chat-main-head">
          <h2 data-aci18n="conversationTitle">Unterhaltung</h2>
          <p id="threadMeta" class="muted" data-aci18n="noThreadSelected">Noch kein Chat ausgewählt.</p>
        </div>
        <div id="messageList" class="message-list">
          <p class="muted" id="pickWorkerHint" data-aci18n="pickWorkerHint">Wählen Sie links einen Mitarbeiter aus.</p>
        </div>
        <div class="chat-compose">
          <div class="actions">
            <input id="chatFile" type="file" accept=".pdf,.jpg,.jpeg,.png,.webp,.doc,.docx,image/*" />
          </div>
          <textarea id="chatReply" data-aci18n="replyPh" data-aci18n-attr="placeholder" placeholder="Antwort schreiben…" rows="3"></textarea>
          <div class="actions">
            <button type="button" class="primary" id="sendReplyBtn" data-aci18n="send">Senden</button>
          </div>
        </div>
      </section>
    </main>
  </div>
  <script src="/admin-v2/chat-i18n.js?v=20260707r"></script>
  <script src="/e2e-crypto.js?v=20260707e2e3"></script>
  <script src="/tenant-brand-icon.js?v=20260630d"></script>
  <script src="/embed-helpers.js?v=20260705c"></script>
  <script src="/workpass-storage.js?v=20260624storage1"></script>
  <script src="/control-pass-theme.js?v=20260619theme1"></script>
  <script>
    const WP = window.WorkPassStorage;
    const wpGet = (key) => (WP?.getItem ? WP.getItem(key) : localStorage.getItem(key));
    const wpSet = (key, val) => (WP?.setItem ? WP.setItem(key, val) : localStorage.setItem(key, val));
    const params = new URLSearchParams(location.search);
    let companyId = params.get("company_id") || wpGet(WP?.KEYS?.ADMIN_COMPANY || "workpass-admin-company") || "";
    const token = wpGet(WP?.KEYS?.ADMIN_TOKEN || "workpass-admin-token") || wpGet(WP?.KEYS?.SESSION_TOKEN || "workpass-session-token") || "";
    const backLink = document.getElementById("backLink");
    if (companyId) backLink.href = `/admin-v2/index.html?company_id=${encodeURIComponent(companyId)}#operations`;
    if (window.BaupassAuth?.resolveTenantBranding) {
      void window.BaupassAuth.resolveTenantBranding({ companyId: companyId || undefined });
    }
    let threads = [];
    let currentThreadId = "";
    let currentWorkerId = "";
    let chatPollTimer = null;
    const CHAT_POLL_MS = 2000;
    let adminChatLastFingerprint = "";
    let openingThreadWorkerId = "";
    let chatLoadSequence = 0;
    let adminE2EReadinessAt = 0;
    const ADMIN_E2E_READINESS_TTL_MS = 60000;
    let lastThreadMetaName = "";
    function chatLocale() {
      const lang = window.getAdminChatLang?.() || "de";
      const map = { de: "de-DE", en: "en-GB", ar: "ar-SA", tr: "tr-TR", fr: "fr-FR", es: "es-ES", it: "it-IT", pl: "pl-PL" };
      return map[lang] || "de-DE";
    }
    function setThreadMeta(text, { dynamic = false } = {}) {
      const el = document.getElementById("threadMeta");
      el.textContent = text;
      if (dynamic) el.dataset.dynamic = "1";
      else delete el.dataset.dynamic;
    }
    window.refreshAdminChatDynamicUi = function refreshAdminChatDynamicUi() {
      renderThreads();
      if (!currentThreadId) {
        const list = document.getElementById("messageList");
        if (list && !currentWorkerId) {
          list.innerHTML = `<p class="muted" id="pickWorkerHint">${window.adminChatT("pickWorkerHint")}</p>`;
        }
        if (!document.getElementById("threadMeta")?.dataset.dynamic) {
          setThreadMeta(window.adminChatT("noThreadSelected"));
        }
      } else if (lastThreadMetaName) {
        setThreadMeta(window.adminChatT("chatWith", { name: lastThreadMetaName }), { dynamic: true });
        loadMessages(currentThreadId, currentWorkerId, { quiet: true }).catch(() => {});
      }
    };
    function getAdminUser() {
      try {
        return JSON.parse(wpGet(WP?.KEYS?.ADMIN_USER || "workpass-admin-user") || "{}");
      } catch {
        return {};
      }
    }
    async function ensureAdminSession() {
      if (getAdminUserId()) return true;
      try {
        const res = await fetch("/api/session/bootstrap", {
          headers: headers(),
          credentials: "include",
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok || !data?.user?.id) return false;
        wpSet(WP?.KEYS?.ADMIN_USER || "workpass-admin-user", JSON.stringify(data.user));
        if (data.token) wpSet(WP?.KEYS?.ADMIN_TOKEN || "workpass-admin-token", data.token);
        const cid = String(
          data.user.preview_company_id || data.user.company_id || companyId || ""
        ).trim();
        if (cid) {
          companyId = cid;
          wpSet(WP?.KEYS?.ADMIN_COMPANY || "workpass-admin-company", cid);
        }
        return true;
      } catch {
        return false;
      }
    }
    function getAdminUserId() {
      return String(getAdminUser().id || "").trim();
    }
    let adminE2EIdentityReady = false;
    let adminE2ERequired = false;
    let adminE2EPublicKeysCache = null;
    let adminE2EPublicKeyRowsCache = null;
    let adminE2EPublicKeysCacheKey = "";
    let adminE2EPublicKeysCacheAt = 0;
    let adminChatAttachmentMetaById = {};
    const headers = () => ({ "Accept": "application/json", ...(token ? { "Authorization": `Bearer ${token}` } : {}) });
    const api = async (path, options = {}) => {
      const res = await fetch(path, { ...options, headers: { ...headers(), ...(options.headers || {}) }, credentials: "include" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.error || data.message || res.statusText);
      return data;
    };
    async function apiMultipart(path, { fields = {}, fileField = "file", file } = {}) {
      const form = new FormData();
      Object.entries(fields).forEach(([key, value]) => form.append(key, value));
      if (file) form.append(fileField, file);
      const res = await fetch(path, { method: "POST", headers: headers(), body: form, credentials: "include" });
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.message || data.error || res.statusText);
      return data;
    }
    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/"/g, "&quot;");
    }
    function escapeAttr(value) {
      return escapeHtml(value).replace(/'/g, "&#39;");
    }
    function threadDisplayName(row) {
      return `${row?.first_name || ""} ${row?.last_name || ""}`.trim()
        || row?.badge_id
        || row?.worker_id
        || window.adminChatT("workerDefault");
    }
    function threadInitials(name) {
      const parts = String(name || "").trim().split(/\s+/).filter(Boolean);
      if (!parts.length) return "MA";
      const first = parts[0]?.[0] || "";
      const last = (parts.length > 1 ? parts[parts.length - 1]?.[0] : parts[0]?.[1]) || "";
      return `${first}${last}`.toUpperCase();
    }
    const ADMIN_E2E_KEYS_TTL_MS = 60000;
    function adminE2ECryptoAvailable() {
      return typeof window.E2ECrypto !== "undefined" && Boolean(getAdminUserId());
    }
    async function refreshAdminE2EReadiness(workerId, force = false) {
      if (!companyId || !workerId) {
        adminE2ERequired = false;
        return false;
      }
      const now = Date.now();
      if (!force && now - adminE2EReadinessAt < ADMIN_E2E_READINESS_TTL_MS) {
        return adminE2ERequired;
      }
      try {
        const data = await api(
          `/api/e2e/identity/chat-readiness?company_id=${encodeURIComponent(companyId)}&worker_id=${encodeURIComponent(workerId)}`
        );
        adminE2ERequired = Boolean(data?.e2eRequired);
        adminE2EReadinessAt = now;
        return Boolean(data?.keysReady);
      } catch {
        adminE2ERequired = false;
        return false;
      }
    }
    async function ensureAdminE2EIdentity() {
      if (!adminE2ECryptoAvailable()) {
        adminE2EIdentityReady = false;
        return false;
      }
      try {
        await window.E2ECrypto?.ensureCryptoSessionReady?.();
        const identity = await window.E2ECrypto.ensureLocalIdentity("user", getAdminUserId());
        const registerBody = { publicKeySpkiB64: identity.publicKeySpkiB64 };
        if (companyId) {
          registerBody.company_id = companyId;
          registerBody.companyId = companyId;
        }
        await fetch("/api/e2e/identity/admin/me", {
          method: "PUT",
          headers: { ...headers(), "Content-Type": "application/json" },
          credentials: "include",
          body: JSON.stringify(registerBody),
        }).then(async (res) => {
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.error || `HTTP ${res.status}`);
          return data;
        });
        adminE2EIdentityReady = true;
        return true;
      } catch {
        adminE2EIdentityReady = false;
        return false;
      }
    }
    function extractAdminE2EKeyMaterial(row) {
      return String(row?.publicKeySpkiB64 || row?.public_key_spki_b64 || "").trim();
    }
    async function fetchAdminE2EPublicKeyRows(workerId, force = false) {
      if (!adminE2ECryptoAvailable() || !workerId) {
        return [];
      }
      if (!adminE2EIdentityReady) {
        await ensureAdminE2EIdentity();
      }
      const cacheKey = `${companyId}:${workerId}`;
      const now = Date.now();
      if (!force && adminE2EPublicKeysCache && adminE2EPublicKeysCacheKey === cacheKey && now - adminE2EPublicKeysCacheAt < ADMIN_E2E_KEYS_TTL_MS) {
        return adminE2EPublicKeyRowsCache || [];
      }
      try {
        const data = await api(`/api/e2e/identity/admin/public-keys?company_id=${encodeURIComponent(companyId)}&worker_id=${encodeURIComponent(workerId)}`);
        adminE2EPublicKeyRowsCache = Array.isArray(data.publicKeys) ? data.publicKeys : [];
        adminE2EPublicKeysCache = adminE2EPublicKeyRowsCache
          .map((row) => extractAdminE2EKeyMaterial(row))
          .filter(Boolean);
        adminE2EPublicKeysCacheKey = cacheKey;
        adminE2EPublicKeysCacheAt = now;
        return adminE2EPublicKeyRowsCache;
      } catch {
        return adminE2EPublicKeyRowsCache || [];
      }
    }
    async function fetchAdminE2EChatRecipientKeys(workerId, force = false) {
      await window.E2ECrypto?.ensureCryptoSessionReady?.();
      await ensureAdminE2EIdentity();
      const rows = await fetchAdminE2EPublicKeyRows(workerId, force);
      const adminKeys = rows
        .filter((row) => String(row?.entityType || row?.entity_type || "").toLowerCase() === "user")
        .map((row) => extractAdminE2EKeyMaterial(row))
        .filter(Boolean);
      const workerKeys = rows
        .filter((row) => String(row?.entityType || row?.entity_type || "").toLowerCase() === "worker")
        .map((row) => extractAdminE2EKeyMaterial(row))
        .filter(Boolean);
      try {
        const local = await window.E2ECrypto.ensureLocalIdentity("user", getAdminUserId());
        if (local?.publicKeySpkiB64) adminKeys.push(local.publicKeySpkiB64);
      } catch {
        // ignore
      }
      if (!adminKeys.length) {
        return [];
      }
      return [...new Set([...adminKeys, ...workerKeys])];
    }
    async function fetchAdminE2EPublicKeys(workerId, force = false) {
      await fetchAdminE2EPublicKeyRows(workerId, force);
      return adminE2EPublicKeysCache || [];
    }
    async function encryptAdminChatBody(plaintext, workerId) {
      const text = String(plaintext || "");
      if (!text || window.E2ECrypto?.isE2EEnvelope?.(text)) {
        return text;
      }
      await refreshAdminE2EReadiness(workerId, false);
      if (!adminE2ERequired) {
        return text;
      }
      await ensureAdminSession();
      if (!adminE2ECryptoAvailable()) {
        throw new Error("e2e_keys_missing");
      }
      const keys = await fetchAdminE2EChatRecipientKeys(workerId, false);
      if (!keys.length) {
        const retryKeys = await fetchAdminE2EChatRecipientKeys(workerId, true);
        if (!retryKeys.length) {
          throw new Error("e2e_keys_missing");
        }
        return await window.E2ECrypto.encryptUtf8(text, retryKeys);
      }
      return await window.E2ECrypto.encryptUtf8(text, keys);
    }
    async function decryptAdminChatBody(storedBody) {
      const text = String(storedBody || "").trim();
      if (!text || !adminE2ECryptoAvailable()) {
        return text;
      }
      const looksE2E = window.E2ECrypto.looksLikeE2EPayload?.(text) || window.E2ECrypto.isE2EEnvelope(text);
      if (!looksE2E) {
        return text;
      }
      const userId = getAdminUserId();
      if (!userId) {
        return text;
      }
      try {
        await window.E2ECrypto.ensureCryptoSessionReady?.();
        await ensureAdminE2EIdentity();
        return await window.E2ECrypto.decryptUtf8WithArchive(text, "user", userId);
      } catch (error) {
        console.warn("[E2E] Admin chat decrypt failed:", error?.message || error);
        return window.adminChatT("e2eDecryptFailed");
      }
    }
    async function encryptAdminChatAttachment(file, workerId) {
      if (!adminE2ERequired) {
        return { file, fields: {}, filename: file.name || "upload.bin" };
      }
      const keys = await fetchAdminE2EChatRecipientKeys(workerId, true);
      if (!keys.length) throw new Error("e2e_keys_missing");
      const buffer = await file.arrayBuffer();
      const packed = await window.E2ECrypto.encryptBlob(new Uint8Array(buffer), keys, {
        filename: file.name || "upload.bin",
        mime: file.type || "application/octet-stream",
      });
      return {
        file: new Blob([packed.blob], { type: "application/vnd.suppix.e2e+binary" }),
        fields: { e2e_meta: packed.meta, e2e_encrypted: "1" },
        filename: `${file.name || "upload.bin"}.e2e`,
      };
    }
    async function prepareAdminChatMessagesForDisplay(messages) {
      return Promise.all((messages || []).map(async (msg) => ({
        ...msg,
        body: await decryptAdminChatBody(msg.body),
      })));
    }
    function adminChatMessagesFingerprint(messages) {
      if (!Array.isArray(messages) || !messages.length) return "empty";
      const last = messages[messages.length - 1];
      return `${messages.length}:${String(last?.id || "")}:${String(last?.createdAt || last?.created_at || "")}`;
    }
    function isImageAttachment(filename, contentType) {
      const mime = String(contentType || "").toLowerCase();
      if (/^image\//i.test(mime)) return true;
      return /\.(jpe?g|png|webp|gif)$/i.test(String(filename || ""));
    }
    function downloadHeaders() {
      return token ? { Authorization: `Bearer ${token}` } : {};
    }
    async function downloadChatAttachment(attachmentId, filename, contentType) {
      const res = await fetch(`/api/chat/attachments/${encodeURIComponent(attachmentId)}/download`, {
        headers: downloadHeaders(),
        credentials: "include",
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.message || data.error || res.statusText);
      }
      const blob = await res.blob();
      let outBlob = blob;
      let outName = filename || "download";
      const meta = adminChatAttachmentMetaById[attachmentId] || "";
      if (meta && adminE2ECryptoAvailable()) {
        const buffer = new Uint8Array(await blob.arrayBuffer());
        const decrypted = await window.E2ECrypto.decryptBlob(buffer, meta, "user", getAdminUserId());
        outBlob = new Blob([decrypted.bytes], { type: decrypted.mime || contentType || "application/octet-stream" });
        outName = decrypted.filename || outName;
      }
      const url = URL.createObjectURL(outBlob);
      const safeName = outName || (isImageAttachment(filename, contentType) ? "bild.jpg" : "download");
      const anchor = document.createElement("a");
      anchor.href = url;
      anchor.download = safeName;
      anchor.rel = "noopener";
      document.body.appendChild(anchor);
      anchor.click();
      anchor.remove();
      setTimeout(() => URL.revokeObjectURL(url), 60000);
    }
    async function loadChatImagePreview(img) {
      const attachmentId = img.getAttribute("data-attachment-id") || "";
      const filename = img.getAttribute("data-filename") || "bild.jpg";
      const contentType = img.getAttribute("data-content-type") || "";
      if (!attachmentId || img.dataset.loaded === "1") return;
      try {
        const res = await fetch(`/api/chat/attachments/${encodeURIComponent(attachmentId)}/download`, {
          headers: downloadHeaders(),
          credentials: "include",
        });
        if (!res.ok) return;
        const blob = await res.blob();
        const url = URL.createObjectURL(blob);
        img.src = url;
        img.dataset.loaded = "1";
        img.title = window.adminChatT("clickToSave", { name: filename });
        img.addEventListener("click", () => {
          downloadChatAttachment(attachmentId, filename, contentType || blob.type).catch((error) => {
            setThreadMeta(error.message || String(error), { dynamic: true });
          });
        });
      } catch {
        img.remove();
      }
    }
    function hydrateChatImagePreviews() {
      document.querySelectorAll("img.chat-image-preview[data-attachment-id]").forEach((img) => {
        loadChatImagePreview(img);
      });
    }
    function formatChatTimestamp(value) {
      const raw = String(value || "").trim();
      if (!raw) return "";
      const date = new Date(raw);
      if (Number.isNaN(date.getTime())) return raw;
      const timeStr = date.toLocaleTimeString(chatLocale(), { hour: "2-digit", minute: "2-digit" });
      const now = new Date();
      if (date.toDateString() === now.toDateString()) return timeStr;
      const yesterday = new Date(now);
      yesterday.setDate(yesterday.getDate() - 1);
      if (date.toDateString() === yesterday.toDateString()) return `${window.adminChatT("yesterday")}, ${timeStr}`;
      return `${date.toLocaleDateString(chatLocale(), { day: "2-digit", month: "2-digit", year: "numeric" })}, ${timeStr}`;
    }
    function chatReadLabel(msg) {
      const sender = String(msg.senderType || "");
      if (sender === "admin") {
        return msg.readByRecipient ? window.adminChatT("read") : window.adminChatT("delivered");
      }
      if (sender === "worker" && msg.readByRecipient) {
        return window.adminChatT("read");
      }
      return "";
    }
    function canDeleteAdminMessage(msg) {
      const sender = String(msg.senderType || "");
      const senderUserId = String(msg.senderUserId || msg.sender_user_id || "");
      return sender === "admin" && !msg.readByRecipient && messageIdPresent(msg) && senderUserId === getAdminUserId();
    }
    function messageIdPresent(msg) {
      return Boolean(String(msg.id || "").trim());
    }
    function renderChatBubble(msg) {
      const who = msg.senderType === "worker" ? window.adminChatT("senderWorker") : window.adminChatT("senderCompany");
      const time = formatChatTimestamp(msg.createdAt);
      const read = chatReadLabel(msg);
      const attach = Array.isArray(msg.attachments) && msg.attachments.length
        ? `<div class="muted" style="margin-top:0.5rem;">${msg.attachments.map((a) => {
            const rawId = String(a.id || "");
            const meta = String(a.e2eMeta || a.e2e_meta || "").trim();
            if (rawId && meta) adminChatAttachmentMetaById[rawId] = meta;
            const id = escapeHtml(rawId);
            const name = escapeHtml(a.filename || window.adminChatT("attachment"));
            const type = escapeHtml(a.contentType || "");
            const image = isImageAttachment(a.filename, a.contentType);
            if (image) {
              return `<div class="chat-image-actions">
                <button type="button" class="chat-attachment-btn" data-attachment-id="${id}" data-filename="${name}" data-content-type="${type}">⬇ ${name}</button>
              </div>
              <img class="chat-image-preview" data-attachment-id="${id}" data-filename="${name}" data-content-type="${type}" alt="${name}" loading="lazy" />`;
            }
            return `<button type="button" class="chat-attachment-btn" data-attachment-id="${id}" data-filename="${name}" data-content-type="${type}">📎 ${name}</button>`;
          }).join("<br>")}</div>`
        : "";
      const body = escapeHtml(msg.body || "");
      const messageId = escapeHtml(String(msg.id || ""));
      const deleteBtn = canDeleteAdminMessage(msg)
        ? `<button type="button" class="chat-delete-btn" data-chat-delete-id="${messageId}" title="${window.adminChatT("deleteMessageTitle")}">🗑</button>`
        : "";
      const sideClass = msg.senderType === "admin" ? "admin" : "worker";
      return `<div class="bubble ${sideClass}"><strong>${who}</strong><br><span>${body}</span>${attach}<div class="bubble-meta"><span>${time}</span>${read ? `<span class="bubble-read${msg.readByRecipient ? " is-read" : ""}">${read}</span>` : ""}${deleteBtn}</div></div>`;
    }
    async function deleteAdminChatMessage(messageId) {
      if (!messageId || !currentWorkerId) return;
      await api(`/api/chat/messages/${encodeURIComponent(messageId)}?company_id=${encodeURIComponent(companyId)}&worker_id=${encodeURIComponent(currentWorkerId)}`, {
        method: "DELETE",
      });
      await loadMessages(currentThreadId, currentWorkerId);
    }
    function renderThreads() {
      const q = (document.getElementById("threadSearch").value || "").trim().toLowerCase();
      const host = document.getElementById("threadList");
      const rows = threads.filter((row) => (`${row.subject || ""} ${row.first_name || ""} ${row.last_name || ""} ${row.badge_id || ""}`).toLowerCase().includes(q));
      host.innerHTML = rows.length
        ? rows.map((row) => {
            const name = threadDisplayName(row);
            const meta = row.hasThread ? (row.subject || "general") : window.adminChatT("newChat");
            const active = currentWorkerId && String(row.worker_id) === String(currentWorkerId) ? " is-active" : "";
            const loading = openingThreadWorkerId && String(row.worker_id) === String(openingThreadWorkerId) ? " is-loading" : "";
            const badge = row.badge_id ? `#${row.badge_id}` : "";
            return `<button type="button" class="thread-item${active}${loading}" data-id="${escapeAttr(row.id || "")}" data-worker="${escapeAttr(row.worker_id || "")}" aria-current="${active ? "true" : "false"}">
              <span class="thread-avatar" aria-hidden="true">${escapeHtml(threadInitials(name))}</span>
              <span class="thread-body">
                <span class="thread-top">
                  <span class="thread-name">${escapeHtml(name)}</span>
                  ${badge ? `<span class="thread-badge">${escapeHtml(badge)}</span>` : ""}
                </span>
                <span class="thread-preview">${escapeHtml(meta)}</span>
              </span>
            </button>`;
          }).join("")
        : `<p class="muted">${window.adminChatT("noWorkersFound")}</p>`;
      host.querySelectorAll("[data-worker]").forEach((btn) => {
        btn.addEventListener("click", () => openThread(btn.getAttribute("data-id"), btn.getAttribute("data-worker"), btn));
      });
    }
    async function ensureThread(threadId, workerId) {
      if (threadId) return threadId;
      const res = await api(`/api/chat/threads?company_id=${encodeURIComponent(companyId)}`, {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ worker_id: workerId, subject: "general" }),
      });
      return res.threadId || "";
    }
    async function openThread(threadId, workerId, buttonEl) {
      const requestedWorkerId = String(workerId || "").trim();
      if (!requestedWorkerId) return;
      const sequence = ++chatLoadSequence;
      stopChatPolling();
      openingThreadWorkerId = requestedWorkerId;
      currentWorkerId = requestedWorkerId;
      currentThreadId = threadId || "";
      adminChatLastFingerprint = "";
      const row = threads.find((item) => String(item.worker_id) === requestedWorkerId);
      const name = row ? threadDisplayName(row) : requestedWorkerId;
      lastThreadMetaName = name || "";
      setThreadMeta(window.adminChatT("chatWith", { name }), { dynamic: true });
      const list = document.getElementById("messageList");
      if (list) {
        list.innerHTML = `<p class="muted">${window.adminChatT("chatLoading") || "Lade Unterhaltung..."}</p>`;
      }
      renderThreads();
      try {
        const resolvedId = await ensureThread(threadId, requestedWorkerId);
        if (sequence !== chatLoadSequence || currentWorkerId !== requestedWorkerId) {
          return;
        }
        if (!resolvedId) throw new Error(window.adminChatT("openThreadFailed"));
        if (buttonEl) buttonEl.setAttribute("data-id", resolvedId);
        if (row) {
          row.id = resolvedId;
          row.hasThread = true;
        }
        currentThreadId = resolvedId;
        await loadMessages(resolvedId, requestedWorkerId);
        startChatPolling();
        renderThreads();
      } catch (error) {
        if (sequence === chatLoadSequence) {
          setThreadMeta(error.message || String(error), { dynamic: true });
        }
      } finally {
        if (sequence === chatLoadSequence) {
          openingThreadWorkerId = "";
          renderThreads();
        }
      }
    }
    async function loadThreads() {
      const data = await api(`/api/chat/threads?company_id=${encodeURIComponent(companyId)}`);
      threads = data.threads || [];
      renderThreads();
    }
    async function loadMessages(threadId, workerId, options = {}) {
      const quiet = Boolean(options.quiet);
      currentThreadId = threadId || "";
      currentWorkerId = workerId || "";
      try {
        if (workerId && !quiet) {
          await refreshAdminE2EReadiness(workerId, false);
          void ensureAdminE2EIdentity();
        }
        const row = threads.find((item) => String(item.worker_id) === String(workerId));
        const name = row ? `${row.first_name || ''} ${row.last_name || ''}`.trim() : workerId;
        const data = await api(`/api/chat/threads/${encodeURIComponent(currentThreadId)}?company_id=${encodeURIComponent(companyId)}`);
        const rawMessages = data.messages || [];
        const fingerprint = adminChatMessagesFingerprint(rawMessages);
        if (quiet && fingerprint === adminChatLastFingerprint) {
          return;
        }
        adminChatLastFingerprint = fingerprint;
        const messages = await prepareAdminChatMessagesForDisplay(rawMessages);
        if (!quiet) {
          lastThreadMetaName = name || "";
          setThreadMeta(name ? window.adminChatT("chatWith", { name }) : window.adminChatT("threadLabel", { id: currentThreadId }), { dynamic: true });
        }
        const list = document.getElementById("messageList");
        list.innerHTML = messages.length
          ? messages.map((msg) => {
              try {
                return renderChatBubble(msg);
              } catch (error) {
                console.warn("[admin-chat] bubble render failed:", error);
                return `<div class="bubble worker"><strong>${window.adminChatT("senderWorker")}</strong><br><span class="muted">${escapeHtml(String(error?.message || error))}</span></div>`;
              }
            }).join("")
          : `<p class="muted">${window.adminChatT("noMessages")}</p>`;
        list.scrollTop = list.scrollHeight;
        hydrateChatImagePreviews();
        renderThreads();
      } catch (error) {
        if (!quiet) {
          setThreadMeta(error.message || String(error), { dynamic: true });
        }
        throw error;
      }
    }
    function stopChatPolling() {
      if (chatPollTimer) {
        clearInterval(chatPollTimer);
        chatPollTimer = null;
      }
    }
    function startChatPolling() {
      stopChatPolling();
      chatPollTimer = setInterval(() => {
        if (!currentThreadId || !currentWorkerId) return;
        loadMessages(currentThreadId, currentWorkerId, { quiet: true }).catch(() => {});
      }, CHAT_POLL_MS);
    }
    document.getElementById("threadSearch").addEventListener("input", renderThreads);
    document.getElementById("messageList").addEventListener("click", (event) => {
      const deleteBtn = event.target instanceof Element ? event.target.closest("[data-chat-delete-id]") : null;
      if (deleteBtn) {
        const messageId = deleteBtn.getAttribute("data-chat-delete-id") || "";
        if (!messageId) return;
        deleteAdminChatMessage(messageId).catch((error) => {
          setThreadMeta(error.message || String(error), { dynamic: true });
        });
        return;
      }
      const btn = event.target instanceof Element ? event.target.closest("[data-attachment-id]") : null;
      if (!btn) return;
      const attachmentId = btn.getAttribute("data-attachment-id") || "";
      const filename = btn.getAttribute("data-filename") || "download";
      const contentType = btn.getAttribute("data-content-type") || "";
      if (!attachmentId) return;
      downloadChatAttachment(attachmentId, filename, contentType).catch((error) => {
        setThreadMeta(error.message || String(error), { dynamic: true });
      });
    });
    document.getElementById("sendReplyBtn").addEventListener("click", async () => {
      if (!currentThreadId || !currentWorkerId) return;
      const body = document.getElementById("chatReply").value.trim();
      const file = document.getElementById("chatFile").files[0] || null;
      if (!body && !file) return;
      const sendBtn = document.getElementById("sendReplyBtn");
      sendBtn.disabled = true;
      const replyInput = document.getElementById("chatReply");
      const draftBody = body || (file ? `📎 ${file.name}` : "");
      const list = document.getElementById("messageList");
      const pendingId = `pending-${Date.now()}`;
      replyInput.value = "";
      document.getElementById("chatFile").value = "";
      if (!file && draftBody) {
        list.insertAdjacentHTML("beforeend", renderChatBubble({
          id: pendingId,
          senderType: "admin",
          body: draftBody,
          createdAt: new Date().toISOString(),
          readByRecipient: false,
        }).replace('class="bubble admin"', 'class="bubble admin is-pending"'));
        list.scrollTop = list.scrollHeight;
      }
      try {
        const outboundBody = await encryptAdminChatBody(draftBody, currentWorkerId);
        const res = await api(`/api/chat/threads/${encodeURIComponent(currentThreadId)}/messages?company_id=${encodeURIComponent(companyId)}`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ worker_id: currentWorkerId, body: outboundBody }),
        });
        if (file && res?.message?.id) {
          let uploadFile = file;
          let extraFields = { message_id: String(res.message.id), worker_id: currentWorkerId };
          if (adminE2ERequired && adminE2ECryptoAvailable()) {
            const packed = await encryptAdminChatAttachment(file, currentWorkerId);
            uploadFile = new File([packed.file], packed.filename, { type: "application/vnd.suppix.e2e+binary" });
            extraFields = { ...extraFields, ...packed.fields };
          }
          await apiMultipart(`/api/chat/threads/${encodeURIComponent(currentThreadId)}/attachments?company_id=${encodeURIComponent(companyId)}`, {
            fields: extraFields,
            file: uploadFile,
          });
        }
        list.querySelector(".bubble.admin.is-pending")?.remove();
        adminChatLastFingerprint = "";
        void loadMessages(currentThreadId, currentWorkerId, { quiet: true });
        const row = threads.find((item) => String(item.worker_id) === String(currentWorkerId));
        if (row) {
          row.hasThread = true;
          row.id = currentThreadId;
        }
        renderThreads();
      } catch (error) {
        list.querySelector(".bubble.admin.is-pending")?.remove();
        if (!replyInput.value) {
          replyInput.value = draftBody;
        }
        const msg = String(error?.message || error || "");
        if (msg === "e2e_keys_missing") {
          setThreadMeta(window.adminChatT("e2eKeysMissing"), { dynamic: true });
        } else {
          setThreadMeta(msg, { dynamic: true });
        }
      } finally {
        sendBtn.disabled = false;
      }
    });
    window.applyAdminChatI18n?.();
    window.initAdminChatLangSync?.();
    void (async () => {
      await ensureAdminSession();
      await window.E2ECrypto?.ensureCryptoSessionReady?.();
      await ensureAdminE2EIdentity();
      await loadThreads();
    })().catch((e) => { setThreadMeta(e.message, { dynamic: true }); });
  </script>
</body>
</html>
