<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System-Bewertung — SUPPIX</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --panel: #ffffff;
      --text: #0f172a;
      --muted: #64748b;
      --border: #e2e8f0;
      --accent: #1d4ed8;
      --accent-hover: #1e40af;
      --error: #b91c1c;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      font-size: 15px;
      line-height: 1.5;
    }
    .survey-card {
      max-width: 520px;
      width: 100%;
      background: var(--panel);
      border-radius: 16px;
      padding: 28px;
      border: 1px solid var(--border);
      box-shadow: 0 12px 40px rgba(15, 23, 42, 0.08);
    }
    h1 {
      margin: 0;
      font-size: 1.35rem;
      font-weight: 700;
      line-height: 1.3;
    }
    .scale-hint { font-size: 0.85rem; color: var(--muted); margin: 0.5rem 0 1rem; }
    .survey-head { display: flex; justify-content: space-between; align-items: start; gap: 0.75rem; margin-bottom: 0.25rem; }
    .survey-lang { font-size: 0.82rem; padding: 0.25rem 0.35rem; border-radius: 8px; border: 1px solid var(--border); background: #fff; }
    .muted { color: var(--muted); }
    .small { font-size: 0.85rem; }
    .hidden { display: none !important; }
    .satisfaction-form label { display: block; margin-bottom: 0.85rem; font-size: 0.9rem; }
    .satisfaction-form input,
    .satisfaction-form select,
    .satisfaction-form textarea {
      width: 100%;
      margin-top: 0.35rem;
      padding: 0.55rem 0.65rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font: inherit;
      background: #fff;
    }
    .satisfaction-check { display: flex; align-items: flex-start; gap: 0.5rem; }
    .satisfaction-check input { width: auto; margin-top: 0.2rem; }
    .satisfaction-roi-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.75rem; }
    @media (max-width: 520px) { .satisfaction-roi-row { grid-template-columns: 1fr; } }
    .primary {
      display: inline-block;
      border: none;
      border-radius: 10px;
      background: var(--accent);
      color: #fff;
      font-weight: 600;
      padding: 0.7rem 1rem;
      cursor: pointer;
      font-size: 0.95rem;
    }
    .primary:hover { background: var(--accent-hover); }
    .error { color: var(--error); font-size: 0.88rem; margin-top: 0.5rem; }
  </style>
</head>
<body>
  <div class="survey-card">
    <div class="survey-head">
      <h1 data-surveyi18n="title">System-Bewertung</h1>
      <select id="surveyLangSelect" class="survey-lang" aria-label="Sprache">
        <option value="de">DE</option><option value="en">EN</option><option value="ar">AR</option>
        <option value="tr">TR</option><option value="fr">FR</option><option value="es">ES</option>
        <option value="it">IT</option><option value="pl">PL</option>
      </select>
    </div>
    <p class="scale-hint" data-surveyi18n="scaleHint">1 = sehr gut · 5 = sehr schlecht</p>
    <p id="authHint" class="muted small hidden" data-surveyi18n="authHint">Bitte zuerst anmelden.</p>
    <form id="surveyForm" class="satisfaction-form">
      <label>
        <span data-surveyi18n="scoreLabel">Zufriedenheit (1–5)</span>
        <select id="score" required>
          <option value="">—</option>
          <option value="1" data-surveyi18n="score1">1 — Sehr gut</option>
          <option value="2" data-surveyi18n="score2">2 — Gut</option>
          <option value="3" data-surveyi18n="score3">3 — Neutral</option>
          <option value="4" data-surveyi18n="score4">4 — Schlecht</option>
          <option value="5" data-surveyi18n="score5">5 — Sehr schlecht</option>
        </select>
      </label>
      <label class="satisfaction-check">
        <input type="checkbox" id="recommend" />
        <span data-surveyi18n="recommend">Würden Sie das System einer anderen Firma empfehlen?</span>
      </label>
      <label>
        <span data-surveyi18n="bestFeature">Welche Funktion nutzen Sie am meisten?</span>
        <input type="text" id="bestFeature" maxlength="500" />
      </label>
      <label>
        <span data-surveyi18n="frequentRequest">Was wünschen Sie sich häufiger?</span>
        <input type="text" id="frequentRequest" maxlength="500" />
      </label>
      <label>
        <span data-surveyi18n="confusion">Was ist verwirrend oder unklar?</span>
        <textarea id="confusion" rows="2" maxlength="1000"></textarea>
      </label>
      <div class="satisfaction-roi-row">
        <label>
          <span data-surveyi18n="timeSaved">Geschätzte Zeitersparnis (Std./Woche)</span>
          <input type="number" id="timeSaved" min="0" step="0.5" />
        </label>
        <label>
          <span data-surveyi18n="costSaved">Geschätzte Kosteneinsparung (EUR/Monat)</span>
          <input type="number" id="costSaved" min="0" step="10" />
        </label>
      </div>
      <p id="errorBox" class="error hidden"></p>
      <button type="submit" class="primary" style="width:100%;margin-top:0.5rem" data-surveyi18n="submit">Absenden</button>
    </form>
    <p id="successBox" class="muted hidden" style="text-align:center;padding:2rem 0" data-surveyi18n="success">Vielen Dank für Ihre Bewertung!</p>
  </div>
  <script src="/satisfaction-survey-i18n.js?v=20260705g"></script>
  <script>
    const TOKEN_KEYS = window.WorkPassStorage?.SESSION_TOKEN_KEYS || ["workpass-admin-token", "workpass-session-token", "workpass-token"];
    function token() {
      for (const k of TOKEN_KEYS) {
        const v = (localStorage.getItem(k) || "").trim();
        if (v) return v;
      }
      return "";
    }
    window.initSurveyLangSync?.();
    const authHint = document.getElementById("authHint");
    const form = document.getElementById("surveyForm");
    const successBox = document.getElementById("successBox");
    if (!token()) {
      authHint.classList.remove("hidden");
      form.style.display = "none";
    }
    form.addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const err = document.getElementById("errorBox");
      err.classList.add("hidden");
      const score = Number(document.getElementById("score").value || 0);
      if (score < 1 || score > 5) {
        err.textContent = window.surveyT("scoreRequired");
        err.classList.remove("hidden");
        return;
      }
      try {
        const res = await fetch("/api/v2/satisfaction-survey", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${token()}`,
          },
          body: JSON.stringify({
            satisfaction_score: score,
            would_recommend: document.getElementById("recommend").checked,
            best_feature: document.getElementById("bestFeature").value.trim(),
            frequent_request: document.getElementById("frequentRequest").value.trim(),
            confusion_note: document.getElementById("confusion").value.trim(),
            time_saved_hours: document.getElementById("timeSaved").value || null,
            cost_saved_estimate: document.getElementById("costSaved").value || null,
          }),
        });
        if (!res.ok) {
          const d = await res.json().catch(() => ({}));
          throw new Error(d.error || window.surveyT("errorGeneric"));
        }
        form.style.display = "none";
        successBox.classList.remove("hidden");
      } catch (e) {
        err.textContent = e.message;
        err.classList.remove("hidden");
      }
    });
  </script>
</body>
</html>
