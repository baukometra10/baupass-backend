<!DOCTYPE html>
<html lang="de" dir="ltr">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>BauPass — Enterprise-Hub</title>
  <link rel="stylesheet" href="/design-tokens.css" />
  <link rel="stylesheet" href="/embed-shell.css?v=20260605layout1" />
  <link rel="stylesheet" href="/ai-voice-ui.css?v=20260601voice13" />
  <style>
    :root {
      --bg: #0b1118;
      --panel: #141c28;
      --border: #2a3544;
      --text: #e8eef4;
      --muted: #94a3b8;
      --accent: #5eead4;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, "Segoe UI", sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; }
    a { color: var(--accent); }
    header {
      padding: 0.85rem 1.25rem; border-bottom: 1px solid var(--border);
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between;
      background: var(--panel); position: sticky; top: 0; z-index: 10;
    }
    header h1 { margin: 0; font-size: 1.15rem; }
    .nav-links { display: flex; flex-wrap: wrap; gap: 0.5rem; font-size: 0.85rem; }
    .nav-links a { text-decoration: none; padding: 0.35rem 0.65rem; border: 1px solid var(--border); border-radius: 8px; }
    .hub-lang-select {
      padding: 0.35rem 0.5rem; border-radius: 8px; border: 1px solid var(--border);
      background: #0f1419; color: var(--text); font-size: 0.85rem;
    }
    .layout { display: grid; grid-template-columns: 1fr 340px; gap: 1rem; padding: 1rem 1.25rem; max-width: 1600px; margin: 0 auto; width: 100%; }
    @media (max-width: 1100px) { .layout { grid-template-columns: 1fr; } }
    .hub-embed-top { display: contents; }
    .hub-quick-nav {
      display: none;
      margin-bottom: 0.85rem;
    }
    .hub-quick-nav-title {
      margin: 0 0 0.5rem;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .hub-quick-nav-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 0.45rem;
    }
    .hub-quick-tile {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.2rem;
      padding: 0.55rem 0.65rem;
      border-radius: 10px;
      border: 1px solid var(--border);
      background: rgba(15, 23, 32, 0.85);
      color: var(--text);
      font: inherit;
      font-size: 0.8rem;
      cursor: pointer;
      text-align: start;
      transition: border-color 0.15s, background 0.15s, transform 0.12s;
    }
    .hub-quick-tile:hover {
      border-color: rgba(94, 234, 212, 0.45);
      background: rgba(15, 76, 92, 0.35);
      transform: translateY(-1px);
    }
    .hub-quick-tile strong { font-size: 0.88rem; color: var(--accent); font-weight: 700; }
    .hub-quick-tile span { font-size: 0.72rem; color: var(--muted); line-height: 1.3; }
    .hub-quick-tile.is-accent {
      border-color: rgba(94, 234, 212, 0.5);
      background: linear-gradient(135deg, rgba(15, 76, 92, 0.55), rgba(20, 28, 40, 0.9));
    }
    .stats { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; }
    .stat {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.5rem 0.75rem; font-size: 0.8rem; cursor: pointer;
    }
    .stat strong { display: block; font-size: 1.1rem; color: var(--accent); }
    .stat.active { outline: 2px solid var(--accent); }
    .toolbar { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 1rem; align-items: center; }
    .toolbar input {
      flex: 1; min-width: 180px; padding: 0.5rem 0.75rem; border-radius: 8px;
      border: 1px solid var(--border); background: #0f1419; color: var(--text);
    }
    .toolbar label { font-size: 0.85rem; color: var(--muted); display: flex; align-items: center; gap: 0.35rem; }
    .layer {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      margin-bottom: 0.65rem; overflow: hidden;
    }
    .layer-head {
      padding: 0.75rem 1rem; cursor: pointer; display: flex; justify-content: space-between; align-items: center;
    }
    .layer-head:hover { background: #1a2332; }
    .layer-num { opacity: 0.6; font-size: 0.8rem; margin-left: 0.5rem; }
    .layer-body { display: none; padding: 0 1rem 0.75rem; }
    .layer.open .layer-body { display: block; }
    .cap-grid { display: grid; gap: 0.5rem; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); }
    .cap {
      border: 1px solid var(--border); border-radius: 10px; padding: 0.6rem 0.75rem; font-size: 0.82rem;
    }
    .cap h4 { margin: 0 0 0.25rem; font-size: 0.9rem; }
    .cap .ar { color: var(--muted); font-size: 0.78rem; }
    .badge {
      display: inline-block; font-size: 0.7rem; padding: 0.15rem 0.45rem; border-radius: 6px;
      margin-top: 0.35rem; font-weight: 600;
    }
    .cap-actions { margin-top: 0.4rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .cap-actions a, .cap-actions button {
      font-size: 0.72rem; padding: 0.2rem 0.45rem; border-radius: 6px;
      border: 1px solid var(--border); background: #0f1419; color: var(--accent); cursor: pointer; text-decoration: none;
    }
    .ai-panel {
      background: var(--panel); border: 1px solid var(--border); border-radius: 12px;
      display: flex; flex-direction: column; max-height: calc(100vh - 120px); position: sticky; top: 72px;
    }
    .ai-panel h2 { margin: 0; padding: 0.75rem 1rem; font-size: 1rem; border-bottom: 1px solid var(--border); }
    #aiLog {
      flex: 1; overflow-y: auto; padding: 0.75rem; font-size: 0.85rem; min-height: 200px;
    }
    .msg-user { background: #1e3a5f; padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; }
    .msg-bot { background: #1a2e28; padding: 0.5rem; border-radius: 8px; margin-bottom: 0.5rem; white-space: pre-wrap; }
    .msg-err { color: #f87171; }
    .ai-form { padding: 0.75rem; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 0.5rem; }
    .ai-form textarea {
      resize: vertical; min-height: 64px; padding: 0.5rem; border-radius: 8px;
      border: 1px solid var(--border); background: #0f1419; color: var(--text); font-family: inherit;
    }
    .ai-form-row { display: flex; gap: 0.35rem; align-items: stretch; }
    .ai-form-row textarea { flex: 1; }
    .ai-form button.ai-send-btn {
      padding: 0.5rem; border: none; border-radius: 8px; background: var(--accent); color: #0b1118; font-weight: 700; cursor: pointer;
    }
    .ai-action-row { display: flex; flex-wrap: wrap; gap: 0.35rem; margin-top: 0.4rem; }
    .ai-action-btn {
      font-size: 0.72rem; padding: 0.25rem 0.55rem; border-radius: 8px;
      border: 1px solid var(--accent); background: #14202c; color: var(--accent); cursor: pointer;
    }
    .ai-toolbar { padding: 0 0.75rem 0.5rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
    .ai-toolbar button {
      font-size: 0.72rem; padding: 0.25rem 0.5rem; border-radius: 6px;
      border: 1px solid var(--border); background: #0f1419; color: var(--accent); cursor: pointer;
    }
    .ai-toolbar button.primary { background: #1a3a4a; color: var(--text); border-color: var(--accent); }
    #aiPrompts { padding: 0 0.75rem 0.5rem; display: flex; flex-wrap: wrap; gap: 0.35rem; }
    #aiPrompts button {
      font-size: 0.7rem; padding: 0.2rem 0.45rem; border-radius: 999px;
      border: 1px solid var(--border); background: #0f1419; color: var(--muted); cursor: pointer; text-align: start;
    }
    #aiPrompts button:hover { color: var(--accent); border-color: var(--accent); }
    .msg-sources { font-size: 0.7rem; color: var(--muted); margin-top: 0.25rem; }
    .maturity { font-size: 0.85rem; color: var(--muted); padding: 0 0 0.75rem; }
    .plan-banner {
      background: linear-gradient(135deg, #1a3a4a, #141c28); border: 1px solid var(--border);
      border-radius: 12px; padding: 1rem; margin-bottom: 1rem;
    }
    .monatsplan-hero {
      background: linear-gradient(135deg, #0f4c5c, #1a3040);
      border: 1px solid rgba(94, 234, 212, 0.35);
      border-radius: 12px;
      padding: 1rem 1.1rem;
      margin-bottom: 0.75rem;
    }
    .monatsplan-hero h3 {
      margin: 0 0 0.5rem;
      font-size: 1rem;
      color: var(--accent);
    }
    .monatsplan-hero ol {
      margin: 0 0 0.75rem;
      padding-left: 1.2rem;
      font-size: 0.82rem;
      color: var(--text);
      line-height: 1.45;
    }
    .monatsplan-hero li { margin-bottom: 0.35rem; }
    .monatsplan-hero .hero-actions {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
      gap: 0.5rem;
    }
    .monatsplan-hero .monatsplan-open-hint {
      margin: 0;
      font-size: 0.78rem;
      color: var(--muted, #8fa0b0);
      max-width: 36rem;
      line-height: 1.35;
    }
    .monatsplan-hero .hero-btn-primary {
      padding: 0.55rem 1rem;
      border-radius: 8px;
      border: none;
      background: var(--accent);
      color: #0b1118;
      font-weight: 700;
      cursor: pointer;
      font-size: 0.88rem;
    }
    .monatsplan-hero .hero-btn-ghost {
      padding: 0.55rem 0.85rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: transparent;
      color: var(--accent);
      cursor: pointer;
      font-size: 0.85rem;
      text-decoration: none;
    }
    .playbook-links .playbook-link-deployment {
      border-color: rgba(94, 234, 212, 0.5);
      background: rgba(15, 76, 92, 0.35);
      font-weight: 700;
      cursor: pointer;
      font-family: inherit;
    }
    .playbook-links .playbook-link-deployment:hover {
      background: rgba(94, 234, 212, 0.22);
    }
    .role-playbook {
      background: linear-gradient(135deg, #152535, #1a3040);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 0.85rem 1rem;
      margin-bottom: 1rem;
    }
    .role-playbook h3 { margin: 0 0 0.5rem; font-size: 0.9rem; color: var(--accent); }
    .playbook-widgets { display: flex; flex-wrap: wrap; gap: 0.5rem; margin-bottom: 0.65rem; }
    .playbook-widget {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 0.45rem 0.65rem; font-size: 0.78rem; min-width: 110px;
    }
    .playbook-widget strong { display: block; font-size: 1.05rem; color: var(--accent); }
    .playbook-widget.sev-high strong { color: #fbbf24; }
    .playbook-widget.sev-medium strong { color: #fbbf24; }
    .playbook-links { display: flex; flex-wrap: wrap; gap: 0.4rem; }
    .playbook-links a {
      font-size: 0.75rem; padding: 0.3rem 0.55rem; border-radius: 8px;
      border: 1px solid var(--border); text-decoration: none; color: var(--accent);
    }
    .plan-banner strong { color: var(--accent); font-size: 1.2rem; }
    .plan-matrix { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.5rem; margin: 0.75rem 0; }
    .plan-card { border: 1px solid var(--border); border-radius: 10px; padding: 0.5rem; font-size: 0.78rem; text-align: center; }
    .plan-card.current { outline: 2px solid var(--accent); }
    .cap.locked { opacity: 0.72; border-style: dashed; cursor: pointer; }
    .cap.locked:hover { opacity: 0.9; border-color: rgba(248, 113, 113, 0.45); }
    .cap:not(.locked) { cursor: pointer; }
    .plan-upgrade-banner {
      margin-bottom: 0.5rem;
      padding: 0.55rem 0.75rem;
      border-radius: 10px;
      border: 1px solid rgba(248, 113, 113, 0.35);
      background: rgba(127, 29, 29, 0.18);
      font-size: 0.82rem;
      line-height: 1.4;
    }
    .plan-upgrade-banner strong { color: #fca5a5; }
    .plan-upgrade-cta-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.4rem;
      margin-top: 0.45rem;
    }
    .plan-upgrade-cta-row button {
      font-size: 0.75rem;
      padding: 0.35rem 0.65rem;
      border-radius: 8px;
      border: 1px solid rgba(94, 234, 212, 0.45);
      background: rgba(15, 76, 92, 0.35);
      color: #e0f2f1;
      cursor: pointer;
    }
    .plan-upgrade-cta-row button:hover { background: rgba(26, 138, 173, 0.45); }
    .cap:not(.locked):hover { border-color: rgba(34, 168, 212, 0.45); background: #121c28; }
    .cap-detail-panel {
      position: fixed; inset: 0; z-index: 1200; display: flex; align-items: flex-end; justify-content: center;
      background: rgba(0, 0, 0, 0.55); padding: 1rem;
    }
    .cap-detail-panel.hidden { display: none !important; }
    .cap-detail-card {
      width: min(520px, 100%); max-height: 70vh; overflow: auto;
      background: var(--panel); border: 1px solid var(--border); border-radius: 14px; padding: 1rem 1.1rem;
    }
    .cap-detail-close {
      float: right; border: none; background: transparent; color: var(--muted); font-size: 1.4rem; cursor: pointer;
    }
    .cap-detail-actions { margin-top: 0.75rem; display: flex; flex-wrap: wrap; gap: 0.5rem; }
    .cap-detail-actions .primary-button { font-size: 0.85rem; padding: 0.45rem 0.9rem; }
    .cap .plan-badge { font-size: 0.68rem; margin-right: 0.25rem; }
    .cap .enabled-badge { color: #4ade80; }
    .cap .locked-badge { color: #f87171; }
    .err-box { background: #3f1d1d; border: 1px solid #7f1d1d; padding: 1rem; border-radius: 10px; margin: 1rem; }
    .hidden { display: none !important; }
    body.embed-mode { min-height: 100%; height: 100%; overflow: hidden; display: flex; flex-direction: column; }
    body.embed-mode #mainLayout.layout {
      flex: 1;
      min-height: 0;
      height: 100%;
      max-height: 100%;
      overflow: hidden;
      padding: 0.5rem 0.65rem 0.65rem;
      max-width: none;
    }
    body.embed-mode #mainLayout.embed-layout-split {
      display: grid;
      grid-template-columns: minmax(0, 1fr);
      gap: 0.65rem;
    }
    body.embed-mode .hub-main-col {
      display: flex;
      flex-direction: column;
      gap: 0.55rem;
      min-width: 0;
      overflow-y: auto;
    }
    body.embed-mode #hubEmbedTop {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 0.6rem;
      width: 100%;
    }
    body.embed-mode #hubQuickNav {
      display: none !important;
    }
    body.embed-mode #stats.hub-embed-stats {
      display: flex;
      flex-wrap: nowrap;
      gap: 0.4rem;
      overflow-x: auto;
      margin-bottom: 0;
      padding-bottom: 0.2rem;
    }
    body.embed-mode #stats.hub-embed-stats .stat {
      flex: 0 0 auto;
      min-width: 5.2rem;
    }
    body.embed-mode .monatsplan-steps-compact {
      margin: 0 0 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
      line-height: 1.4;
    }
    body.embed-mode .monatsplan-hero .hero-btn-primary {
      width: 100%;
    }
    body.embed-mode .ai-panel,
    body.embed-mode .ai-panel.embed-panel-fixed {
      display: none !important;
    }
    body.embed-mode .monatsplan-hero {
      flex-shrink: 0;
      border: 2px solid rgba(94, 234, 212, 0.45);
      box-shadow: 0 8px 28px rgba(15, 76, 92, 0.35);
    }
    body.embed-mode .monatsplan-hero .hero-btn-primary {
      font-size: 1rem;
      padding: 0.65rem 1.2rem;
    }
    .monatsplan-open-hint {
      margin: 0.5rem 0 0;
      font-size: 0.82rem;
      color: var(--muted);
      max-width: 42rem;
    }
    body.embed-mode .plan-banner {
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.5rem;
    }
    body.embed-mode .plan-matrix {
      display: none;
    }
    body.embed-mode .role-playbook {
      padding: 0.65rem 0.85rem;
      margin-bottom: 0.5rem;
    }
    body.embed-mode .toolbar.hub-embed-toolbar {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.35rem;
      padding: 0.25rem 0 0.35rem;
      flex-shrink: 0;
    }
    body.embed-mode .toolbar.hub-embed-toolbar #search {
      flex: 1;
      min-width: 8rem;
    }
    body.embed-mode #embedLayersHint {
      font-size: 0.78rem;
      color: var(--muted);
      margin: 0 0 0.35rem;
      line-height: 1.35;
    }
    body.embed-mode #layers.hub-embed-layers {
      display: block;
      flex: 1;
      min-height: 10rem;
      padding-bottom: 0.5rem;
    }
    body.embed-mode #layers.hub-embed-layers .layer {
      margin-bottom: 0.4rem;
    }
    body.embed-mode #layers.hub-embed-layers .cap-grid {
      grid-template-columns: repeat(auto-fill, minmax(155px, 1fr));
      gap: 0.45rem;
    }
    body.embed-mode #layers.hub-embed-layers .cap {
      padding: 0.55rem 0.6rem;
    }
    body.embed-mode #layers.hub-embed-layers .cap h4 {
      font-size: 0.82rem;
    }
    body.embed-mode #maturity {
      display: none;
    }
    body.embed-mode #mainLayout.embed-layout-split > section,
    body.embed-mode #mainLayout.embed-layout-split > aside {
      min-height: 0;
      min-width: 0;
    }
    body.embed-mode #aiLog.embed-scroll-main {
      min-height: 0 !important;
      flex: 1 1 auto;
      overflow-y: auto;
    }
    body.embed-mode .ai-form-legacy-send { display: none; }
  </style>
</head>
<body>
  <header id="hubHeader">
    <div>
      <h1 id="hubTitle">Enterprise-Hub</h1>
      <p id="subtitle" style="margin:0.25rem 0 0;font-size:0.8rem;color:var(--muted)"></p>
    </div>
    <nav class="nav-links" id="hubNav">
      <label class="hub-lang-select" style="border:none;padding:0">
        <span class="muted small" id="hubLangLabel">Lang</span>
        <select id="hubLangSelect" aria-label="Language">
          <option value="de">DE</option>
          <option value="en">EN</option>
          <option value="ar">AR</option>
        </select>
      </label>
      <a href="/admin-v2/index.html#enterprise" id="navAdminV2">Admin v2</a>
      <a href="/index.html" id="navLegacy">Legacy</a>
      <a href="/ops-command-center.html" id="navOps">Ops</a>
      <a href="/ai-command-center.html" id="navAiCenter">KI</a>
      <a href="/join.html" id="navJoin">Join</a>
    </nav>
  </header>

  <div id="previewNote" class="err-box hidden" style="background:#1a2e3a;border-color:#2a5a6a;color:#94a3b8"></div>
  <div id="authErr" class="err-box hidden"></div>

  <div class="layout" id="mainLayout">
    <section class="hub-main-col">
      <div id="hubQuickNav" class="hub-quick-nav hidden" aria-label="Schnellzugriff"></div>
      <div id="hubEmbedTop" class="hub-embed-top">
        <div id="planBanner" class="plan-banner hidden"></div>
        <div id="planUpgradeBanner" class="plan-upgrade-banner hidden" role="status"></div>
        <div id="monatsplanHero" class="monatsplan-hero hidden"></div>
      </div>
      <div id="rolePlaybook" class="role-playbook hidden"></div>
      <p id="maturity" class="maturity"></p>
      <div id="stats" class="stats hub-embed-stats"></div>
      <p id="embedLayersHint" class="hidden" aria-live="polite"></p>
      <div class="toolbar hub-embed-toolbar">
        <select id="companySelect" class="hidden" style="min-width:200px;padding:0.5rem;border-radius:8px;border:1px solid var(--border);background:#0f1419;color:var(--text)"></select>
        <input id="search" type="search" placeholder="" />
        <select id="filterPlan">
          <option value="all"></option>
          <option value="enabled"></option>
          <option value="locked"></option>
        </select>
        <label><input type="checkbox" id="openAll" /> <span id="openAllLabel"></span></label>
      </div>
      <div id="layers" class="hub-embed-layers"></div>
      <div id="capDetailPanel" class="cap-detail-panel hidden" aria-hidden="true" role="dialog" aria-labelledby="capDetailTitle">
        <div class="cap-detail-card">
          <button type="button" class="cap-detail-close" id="capDetailClose" aria-label="Close">&times;</button>
          <h3 id="capDetailTitle"></h3>
          <p id="capDetailSub" class="muted small"></p>
          <p id="capDetailNote" class="small"></p>
          <div id="capDetailActions" class="cap-detail-actions"></div>
        </div>
      </div>
    </section>

    <aside class="ai-panel embed-panel-fixed">
      <h2 id="aiPanelTitle">BauPass KI</h2>
      <div id="aiStatus" style="padding:0 0.75rem;font-size:0.78rem;color:var(--muted)"></div>
      <div class="ai-toolbar">
        <button type="button" id="aiBriefingBtn" class="primary"></button>
        <a href="/ai-command-center.html" id="aiCenterLink" style="font-size:0.72rem;padding:0.25rem 0.5rem;border-radius:6px;border:1px solid var(--border);text-decoration:none;color:var(--accent)"></a>
      </div>
      <div id="aiPrompts"></div>
      <div id="aiLog" class="embed-scroll-main"></div>
      <form class="ai-form embed-panel-footer" id="aiForm">
        <div class="ai-form-row">
          <textarea id="aiQuestion" rows="1" placeholder=""></textarea>
          <button type="button" id="aiVoiceBtn" aria-label=""></button>
          <button type="submit" id="aiSendBtn" class="bp-ai-send" aria-label=""></button>
        </div>
        <button type="submit" class="ai-send-btn ai-form-legacy-send"></button>
      </form>
    </aside>
  </div>

  <script src="/embed-helpers.js?v=20260609csrf"></script>
  <script src="/ai-voice-ui.js?v=20260601voice22"></script>
  <script>

    async function api(path, opts, retried) {
      const headers = window.BaupassAuth
        ? window.BaupassAuth.authHeaders(opts?.headers || {})
        : (opts?.headers || {});
      const res = await fetch(path, { credentials: "include", ...opts, headers });
      const data = await res.json().catch(() => ({}));
      if (res.status === 401 && !retried && window.BaupassAuth?.bootstrapSession) {
        try {
          await window.BaupassAuth.bootstrapSession();
          return api(path, opts, true);
        } catch {
          throw new Error("auth");
        }
      }
      if (res.status === 401) throw new Error("auth");
      if (!res.ok) {
        const err = new Error(data.error || res.statusText);
        err.payload = data;
        err.status = res.status;
        throw err;
      }
      return data;
    }

      const targetPlan = String(opts.targetPlan || opts.plan || "").trim().toLowerCase();
      const params = typeof hubCompanyParams === "function" ? hubCompanyParams() : {};
      const companyId = params.company_id || params.companyId || "";
      const role = String(currentUserRole || "").toLowerCase();
      const isCompanyAdmin = role === "company-admin";
      const view = isCompanyAdmin ? "invoices" : "admin";
      const payload = {
        type: "baupass-navigate",
        view,
        companyId,
        focusBilling: isCompanyAdmin,
        focusCompanies: !isCompanyAdmin,
        hubUpgradePlan: targetPlan,
      };
      if (window.self !== window.top) {
        try {
          window.parent?.postMessage(payload, location.origin);
        } catch {
          // ignore
        }
        return;
      }
      const u = new URL("/index.html", location.origin);
      u.searchParams.set("view", view);
      if (targetPlan) u.searchParams.set("upgrade_plan", targetPlan);
      if (companyId) u.searchParams.set("company_id", companyId);
      if (isCompanyAdmin) u.searchParams.set("billing", "1");
      window.location.href = u.pathname + u.search;
    }

    function hubNavigateToView(view, extra = {}) {
      const v = String(view || "").trim();
      if (!v) return;
      const params = typeof hubCompanyParams === "function" ? hubCompanyParams() : {};
      const companyId = params.company_id || params.companyId || "";
      if (v === "deployment-plan" || (v === "admin-v2" && extra.focusEinsatzplan)) {
        goToDeploymentPlanView().catch(() => {
          alert(t("monatsplanPreviewLogin"));
        });
        return;
      }
      if (v === "ai-assistant") {
        if (window.self !== window.top) {
          try {
            window.parent?.postMessage(
              { type: "baupass-navigate", view: "ai-assistant", companyId },
              location.origin,
            );
          } catch {
            // ignore
          }
          return;
        }
        const u = new URL("/ai-command-center.html", location.origin);
        Object.keys(params).forEach((key) => {
          const val = params[key];
          if (val != null && String(val).trim() !== "") u.searchParams.set(key, String(val).trim());
        });
        window.location.href = u.pathname + u.search;
        return;
      }
      if (window.self !== window.top) {
        try {
          window.parent?.postMessage(
            { type: "baupass-navigate", view: v, companyId, ...extra },
            location.origin,
          );
        } catch {
          // ignore
        }
        return;
      }
      const u = new URL("/index.html", location.origin);
      u.searchParams.set("view", v);
      Object.keys(params).forEach((key) => {
        const val = params[key];
        if (val != null && String(val).trim() !== "") {
          u.searchParams.set(key, String(val).trim());
        }
      });
      window.location.href = u.pathname + u.search + u.hash;
    }

    function roleDashboardUrl() {
      let url = "/api/dashboard/role";
      if (selectedCompanyId) url += `?company_id=${encodeURIComponent(selectedCompanyId)}`;
      return url;
    }

    function appendCompanyToUrl(href) {
      if (!selectedCompanyId || !href || href.startsWith("http")) return href;
      const u = new URL(href, location.origin);
      if (!u.searchParams.has("company_id")) u.searchParams.set("company_id", selectedCompanyId);
      return u.pathname + u.search + u.hash;

    async function loadRolePlaybook(isPreview) {
      const el = document.getElementById("rolePlaybook");
      if (!el) return;
      if (isPreview || (currentUserRole === "superadmin" && !selectedCompanyId)) {
        el.classList.toggle("hidden", isPreview);
        if (!isPreview && currentUserRole === "superadmin") {
          el.classList.remove("hidden");
          el.innerHTML = `<h3>${t("rolePlaybook")}</h3><p style="margin:0;font-size:0.82rem;color:var(--muted)">${t("rolePickCompany")}</p>`;
        } else {
          el.classList.add("hidden");
          el.innerHTML = "";
        }
        return;
      }
      try {
        const dash = await api(roleDashboardUrl());
        const widgets = (dash.widgets || []).map((w) => {
          const sev = w.severity === "high" ? " sev-high" : (w.severity === "medium" ? " sev-medium" : "");
          const detail = w.detail ? `<span style="display:block;font-size:0.7rem;color:var(--muted)">${w.detail}</span>` : "";
          return `<div class="playbook-widget${sev}"><span>${w.label}</span><strong>${w.value ?? "—"}</strong>${detail}</div>`;
        }).join("");
        const depLink = `<button type="button" class="playbook-link-deployment" data-hub-go-deployment="1">${t("monatsplanLinkLabel")}</button>`;
        const links = depLink + (dash.quickLinks || []).map((l) => {
          const href = appendCompanyToUrl(l.url || "#");
          return `<a href="${href}">${l.label}</a>`;
        }).join("");
        const fc = dash.forecast || {};
        const forecastLine = fc.summary
          ? `<p style="margin:0.35rem 0 0;font-size:0.78rem;color:var(--muted)">${fc.summary}</p>`
          : "";
        el.innerHTML = `<h3>${t("rolePlaybook")} · ${dash.role || ""}</h3>
          <div class="playbook-widgets">${widgets || ""}</div>${forecastLine}
          <div class="playbook-links">${links}</div>`;
        if (isHubEmbedMode() && window.BaupassEmbed) {
          el.querySelectorAll(".playbook-links a[href^='/']").forEach((link) => {
            link.addEventListener("click", (ev) => {
              const href = link.getAttribute("href") || "";
              const view = window.BaupassEmbed.viewFromHref(href);
              if (!view) return;
              ev.preventDefault();
              hubNavigateToView(view);
            });
          });
        }
        el.classList.remove("hidden");
      } catch {
        el.classList.add("hidden");
        el.innerHTML = "";
      }
    }

    async function hubHasSession() {
      if (currentUserRole) return true;
      try {
        if (window.BaupassAuth?.bootstrapSession) {
          const boot = await window.BaupassAuth.bootstrapSession();
          currentUserRole = boot?.user?.role || "";
          if (currentUserRole === "company-admin" && boot?.user?.company_id) {
            selectedCompanyId = boot.user.company_id;
          }
          return Boolean(currentUserRole);
        }
        const boot = await api("/api/session/bootstrap");
        if (boot?.authenticated && boot?.user?.role) {
          currentUserRole = boot.user.role;
          return true;
        }
      } catch {
        // not signed in
      }
      return false;
    }

    function hubUpgradeMailto(planKey) {
      const params = typeof hubCompanyParams === "function" ? hubCompanyParams() : {};
      const companyId = params.company_id || params.companyId || selectedCompanyId || "";
      const plan = String(planKey || "professional").trim();
      const subject = encodeURIComponent(`BauPass Tarif-Upgrade: ${plan}`);
      const body = encodeURIComponent(
        `Gewünschter Tarif: ${plan}\nFirma-ID: ${companyId || "—"}\n\nBitte kontaktieren Sie uns für ein Angebot.`,
      );
      window.location.href = `mailto:support@baupass.de?subject=${subject}&body=${body}`;
    }

    function hubCanSelfServeCheckout() {
      return Boolean(hubBilling.selfServeCheckout) && String(currentUserRole || "").toLowerCase() === "company-admin";
    }

    function hubRequestStripeCheckout(planKey) {
      const plan = String(planKey || "professional").trim().toLowerCase();
      const params = typeof hubCompanyParams === "function" ? hubCompanyParams() : {};
      const companyId = params.company_id || params.companyId || "";
      if (window.self !== window.top) {
        try {
          window.parent?.postMessage(
            { type: "baupass-upgrade-checkout", plan, companyId },
            location.origin,
          );
        } catch {
          // ignore
        }
        return;
      }
      hubOpenUpgradeAdmin({ targetPlan: plan });
    }

    function hubHandlePlanUpgrade(target) {
      if (target === "admin") {
        hubOpenUpgradeAdmin();
        return;
      }
      if (target === "mail") {
        hubUpgradeMailto(catalog?.entitlements?.plan || "professional");
        return;
      }
      if (target === "professional" || target === "enterprise") {
        if (hubCanSelfServeCheckout()) {
          hubRequestStripeCheckout(target);
          return;
        }
        if (String(currentUserRole || "").toLowerCase() === "company-admin") {
          hubOpenUpgradeAdmin({ targetPlan: target });
          return;
        }
        hubUpgradeMailto(target);
        return;
      }
      document.getElementById("filterPlan").value = "locked";
      filterEntitlement = "locked";
      renderLayers();
      hubOpenUpgradeAdmin({ targetPlan: target });
    }

        if (!trigger) return;
        ev.preventDefault();
        ev.stopPropagation();

    function renderStats(stats, labels) {
      const el = document.getElementById("stats");
      const entries = Object.entries(stats).filter(([k]) => k !== "total");
      const allLabel = t("allLabel");
      el.innerHTML = [
        `<div class="stat ${!filterSurface ? "active" : ""}" data-surface=""><strong>${stats.total}</strong>${allLabel}</div>`,
        ...entries.map(([k, v]) => {
          const lab = surfaceLabel(k, labels);
          return `<div class="stat ${filterSurface === k ? "active" : ""}" data-surface="${k}">
            <strong>${v}</strong>${lab}</div>`;
        }),
      ].join("");
      el.querySelectorAll(".stat").forEach((s) => {
        s.addEventListener("click", () => {
          filterSurface = s.dataset.surface || "";
          renderLayers();
          renderStats(stats, labels);
          const layers = document.getElementById("layers");
          if (layers && isHubEmbedMode()) {
            requestAnimationFrame(() => {
              layers.scrollIntoView({ block: "nearest", behavior: "smooth" });
            });
          }
        });
      });
    }

    function matchItem(it, q) {
      if (filterSurface && it.surface !== filterSurface) return false;
      if (filterEntitlement === "enabled" && !it.enabled) return false;
      if (filterEntitlement === "locked" && it.enabled) return false;
      if (!q) return true;
      const hay = (
        itemLabel(it) + " " + (it.labelAr || "") + " " + (it.labelDe || "") + " " + (it.labelEn || "") + " " +
        itemNote(it) + " " + (it.apis || []).join(" ")
      ).toLowerCase();
      return hay.includes(q);
    }

    function planMetaLine(plan, meta) {
      if (HUB_LANG === "ar") return `${meta.labelAr || planLabel(plan)} — ${meta.taglineAr || ""}`;
      if (HUB_LANG === "en") return `${meta.label || planLabel(plan)} — ${meta.taglineEn || meta.taglineAr || ""}`;
      return `${meta.label || planLabel(plan)} — ${meta.taglineDe || meta.taglineAr || ""}`;
    }

    function renderPlanBanner(cat) {
      const ent = cat.entitlements || {};
      const plan = ent.plan || "starter";
      const meta = (cat.plans || {})[plan] || {};
      const capWord = t("capWord");
      const comparison = (cat.planComparison || []).map((row) => {
        const cur = row.plan === plan ? " current" : "";
        return `<div class="plan-card${cur}"><strong>${planLabel(row.plan)}</strong><br>${row.enabledCount}/${row.total} ${capWord}<br>${row.coveragePercent}%</div>`;

      document.getElementById("planBanner").innerHTML = `
        <div><strong>${t("yourPlan")}: ${planMetaLine(plan, meta)}</strong></div>
        <div style="margin-top:0.5rem;font-size:0.85rem">
          <span class="enabled-badge">✓ ${ent.enabledCount || 0} ${t("enabled")}</span> ·
          <span class="locked-badge">🔒 ${ent.lockedCount || 0} ${t("locked")}</span> ·
          ${t("coverage")} <strong>${ent.coveragePercent || 0}%</strong> ${t("coverageOf")}
        </div>
        <div class="plan-matrix">${comparison}</div>

    function renderPlanUpgradeBanner(cat) {
      const el = document.getElementById("planUpgradeBanner");
      if (!el) return;
      const ent = cat.entitlements || {};
      const locked = Number(ent.lockedCount || 0);
      if (locked <= 0) {
        el.classList.add("hidden");
        el.innerHTML = "";
        return;
      }
      const plan = String(ent.plan || "starter");
      const msg = t("planUpgradeBanner").replace("{locked}", String(locked));
      const selfServe = hubCanSelfServeCheckout();
      const ctas = [];
      const role = String(currentUserRole || "").toLowerCase();
      if (role !== "company-admin") {
        ctas.push(`<button type="button" data-hub-upgrade="admin">${t("planUpgradeCtaAdmin")}</button>`);
      }
      if (plan !== "professional" && plan !== "enterprise") {
        ctas.push(
          `<button type="button" data-hub-upgrade="professional">${selfServe ? t("planUpgradeCtaCheckoutPro") : t("planUpgradeCtaProfessional")}</button>`,
        );
      }
      if (plan !== "enterprise") {
        ctas.push(
          `<button type="button" data-hub-upgrade="enterprise">${selfServe ? t("planUpgradeCtaCheckoutEnt") : t("planUpgradeCtaEnterprise")}</button>`,
        );
      }
      if (!selfServe) {
        ctas.push(`<button type="button" class="ghost-button" data-hub-upgrade="mail">${t("planUpgradeCtaMail")}</button>`);
      }
      el.innerHTML = `${msg}<div class="plan-upgrade-cta-row">${ctas.join("")}</div>`;
      el.querySelectorAll("[data-hub-upgrade]").forEach((btn) => {
        btn.addEventListener("click", () => {
          hubHandlePlanUpgrade(btn.getAttribute("data-hub-upgrade") || "");
        });
      });
      el.classList.remove("hidden");
    }

    function findCatalogItem(itemId) {
      if (!catalog?.layers || !itemId) return null;
      for (const layer of catalog.layers) {
        const hit = (layer.items || []).find((it) => it.id === itemId);
        if (hit) return hit;
      }
      return null;
    }

    function closeCapDetail() {
      const panel = document.getElementById("capDetailPanel");
      if (!panel) return;
      panel.classList.add("hidden");
      panel.setAttribute("aria-hidden", "true");
    }

    function openCapDetail(itemId) {
      const it = findCatalogItem(itemId);
      const panel = document.getElementById("capDetailPanel");
      if (!it || !panel) return;
      const locked = it.enabled === false;
      document.getElementById("capDetailTitle").textContent = itemLabel(it);
      const subEl = document.getElementById("capDetailSub");
      const noteText = itemNote(it);
      if (subEl) {
        subEl.textContent = noteText;
        subEl.classList.toggle("hidden", !noteText);
      }
      document.getElementById("capDetailNote").textContent = "";
      const actions = document.getElementById("capDetailActions");
      actions.innerHTML = "";
      if (locked) {
        const p = document.createElement("p");
        p.className = "locked-badge badge";
        p.textContent = `${t("capUpgrade")} ${planLabel(it.minPlan)}`;
        actions.appendChild(p);
        const hint = document.createElement("p");
        hint.className = "muted small";
        hint.textContent = t("capUpgradeHint");
        actions.appendChild(hint);
        const minPlan = String(it.minPlan || "professional").toLowerCase();
        if (hubCanSelfServeCheckout() && (minPlan === "professional" || minPlan === "enterprise")) {
          const checkoutBtn = document.createElement("button");
          checkoutBtn.type = "button";
          checkoutBtn.className = "primary-button";
          checkoutBtn.textContent =
            minPlan === "enterprise" ? t("planUpgradeCtaCheckoutEnt") : t("planUpgradeCtaCheckoutPro");
          checkoutBtn.addEventListener("click", () => {
            closeCapDetail();
            hubRequestStripeCheckout(minPlan);
          });
          actions.appendChild(checkoutBtn);
        } else {
          const adminBtn = document.createElement("button");
          adminBtn.type = "button";
          adminBtn.className = "primary-button";
          adminBtn.textContent = t("planUpgradeCtaAdmin");
          adminBtn.addEventListener("click", () => {
            closeCapDetail();
            hubOpenUpgradeAdmin({ targetPlan: minPlan });
          });
          actions.appendChild(adminBtn);
        }
      } else if (it.ui) {
        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = "primary-button";
        btn.textContent = t("openUi");
        btn.addEventListener("click", () => {
          closeCapDetail();
          if (window.BaupassEmbed) {
            window.BaupassEmbed.navigateFromEmbed(it.ui, hubCompanyParams());
          } else {
            location.href = it.ui;
          }
        });
        actions.appendChild(btn);
      }
      (it.apis || []).slice(0, 3).forEach((apiPath) => {
        const tryBtn = document.createElement("button");
        tryBtn.type = "button";
        tryBtn.className = "ghost-button";
        tryBtn.textContent = t("tryApi");
        tryBtn.addEventListener("click", async () => {
          try {
            const data = await api(apiPath.split(" ").pop() || apiPath);
            alert(JSON.stringify(data, null, 2).slice(0, 1200));
          } catch (e) {
            alert(`${t("apiErrorPrefix")}: ${e.message}`);
          }
        });
        actions.appendChild(tryBtn);
      });
      panel.classList.remove("hidden");
      panel.setAttribute("aria-hidden", "false");
    }

    function renderLayers() {
      const q = (document.getElementById("search").value || "").trim().toLowerCase();
      const openAll = document.getElementById("openAll").checked;
      const root = document.getElementById("layers");
      if (!catalog) return;
      root.innerHTML = catalog.layers.map((layer) => {
        const items = layer.items.filter((it) => matchItem(it, q));
        if (!items.length) return "";
        const open = openAll || q.length > 2;
        return `
          <article class="layer ${open ? "open" : ""}" data-layer="${layer.id}">
            <div class="layer-head">
              <div>
                <span class="layer-num">#${layer.number}</span>
                <strong>${layerTitle(layer)}</strong>
              </div>
              <span>${items.filter(i => i.enabled).length}/${items.length} ${t("layerEnabled")}</span>
            </div>
            <div class="layer-body">
              <div class="cap-grid">${items.map(renderCap).join("")}</div>
            </div>
          </article>`;
      }).join("");
      root.querySelectorAll(".layer-head").forEach((h) => {
        h.addEventListener("click", () => h.parentElement.classList.toggle("open"));
      });
      root.querySelectorAll("a[data-hub-ui]").forEach((link) => {
        link.addEventListener("click", (ev) => {
          ev.preventDefault();
          const raw = link.getAttribute("data-hub-ui") || link.getAttribute("href") || "";
          if (window.BaupassEmbed) {
            window.BaupassEmbed.navigateFromEmbed(raw, hubCompanyParams());
          } else {
            location.href = raw;
          }
        });
      });
    }

    function renderCap(it) {
      const color = SURFACE_COLORS[it.surface] || "#64748b";
      const lab = surfaceLabel(it.surface, catalog.surfaceLabels || {});
      const locked = it.enabled === false;
      const apis = !locked && (it.apis || []).slice(0, 2).map((a) =>
        `<button type="button" data-try="${a.split(" ")[1] || a}">${t("tryApi")}</button>`).join("");
      let ui = "";
      if (!locked && it.ui) {
        const uiHref = window.BaupassEmbed
          ? window.BaupassEmbed.withEmbed(it.ui, hubCompanyParams())
          : it.ui;
        const embedNav = window.BaupassEmbed?.isEmbedMode?.();
        ui = embedNav
          ? `<a href="${uiHref}" data-hub-ui="${it.ui}">${t("openUi")}</a>`
          : `<a href="${uiHref}" target="_blank" rel="noopener">${t("openUi")}</a>`;
      }
      const noteHtml = itemNote(it) ? `<div class="ar">${itemNote(it)}</div>` : "";
      const planTag = `<span class="plan-badge badge" style="background:#6366f122;color:#a5b4fc">${planLabel(it.minPlan)}+</span>`;
      const state = locked
        ? `<span class="locked-badge badge">🔒 ${t("capUpgrade")} ${planLabel(it.minPlan)}</span>`
        : `<span class="enabled-badge badge">${t("capAvailable")}</span>`;
      return `
        <div class="cap ${locked ? "locked" : ""}" data-item-id="${it.id}" data-cap-enabled="${locked ? "0" : "1"}">
          <h4>${itemLabel(it)}</h4>
          ${planTag}${state}
          <span class="badge" style="background:${color}22;color:${color}">${lab}</span>
          ${noteHtml}
          <div class="cap-actions">${ui}${apis}</div>
        </div>`;
    }

    function catalogUrl() {
      const base = "/api/platform/enterprise-catalog";
      if (!selectedCompanyId) return base;
      return `${base}?company_id=${encodeURIComponent(selectedCompanyId)}`;
    }

    async function fetchCatalog() {
      try {
        return await api(catalogUrl());
      } catch (e) {
        if (e.message === "auth") {
          const prev = await fetch("/api/platform/enterprise-catalog/preview").then((r) => r.json());
          prev._previewMode = true;
          return prev;
        }
        throw e;
      }
    }

    async function loadCompaniesForSuperadmin() {
      const sel = document.getElementById("companySelect");
      if (!sel || currentUserRole !== "superadmin") {
        sel?.classList.add("hidden");
        return;
      }
      try {
        const rows = await api("/api/companies");
        const list = Array.isArray(rows) ? rows.filter((c) => !c.deleted_at) : [];
        sel.innerHTML = `<option value="">${t("allCompanies")}</option>` +
          list.map((c) => `<option value="${c.id}" ${c.id === selectedCompanyId ? "selected" : ""}>${c.name} (${planLabel(c.plan)})</option>`).join("");
        if (!selectedCompanyId && list.length > 0) {
          selectedCompanyId = list[0].id;
          sel.value = selectedCompanyId;
          const url = new URL(location.href);
          url.searchParams.set("company_id", selectedCompanyId);
          history.replaceState({}, "", url);
        }
        sel.classList.remove("hidden");
        sel.title = t("companySelect");
        sel.onchange = () => {
          selectedCompanyId = sel.value || "";
          const url = new URL(location.href);
          if (selectedCompanyId) url.searchParams.set("company_id", selectedCompanyId);
          else url.searchParams.delete("company_id");
          history.replaceState({}, "", url);
          updateEmbedLayersHint();
          loadCatalog();
        };
      } catch {
        sel.classList.add("hidden");
      }
    }

    async function loadCatalog() {
      try {
        const cat = await fetchCatalog();
        const isPreview = !!cat._previewMode || cat.preview;
        hubPreviewMode = isPreview;
        const [caps, aiSt] = await Promise.all([
          isPreview ? null : api("/api/platform/capabilities").catch(() => null),
          isPreview ? { configured: false } : api("/api/ai/status").catch(() => ({ configured: false })),
        ]);
        catalog = cat;
        hubBilling = cat.billing || { stripeConfigured: false, selfServeCheckout: false };
        lastCaps = caps;
        lastAiSt = aiSt;
        document.getElementById("authErr").classList.add("hidden");
        document.getElementById("mainLayout").classList.remove("hidden");
        document.getElementById("previewNote").classList.toggle("hidden", !isPreview);
        renderPlanBanner(cat);
        await loadRolePlaybook(isPreview);
        renderMonatsplanHero();
        renderHubQuickNav();
        renderStats(cat.stats, cat.surfaceLabels);
        renderLayers();
        updateEmbedLayersHint();
        wireHubEmbedNav();
        refreshMaturityAndAiStatus();
        if (!isPreview && !aiSt.configured) {
          appendAi("system", t("aiAddKey"));
        }
        if (!isPreview) await loadAiPrompts();
      } catch (e) {
        document.getElementById("authErr").classList.remove("hidden");
        document.getElementById("layers").innerHTML = `<p class="err-box">${t("authErr")}</p>`;
      }
    }

    function hubCompanyParams() {
      return selectedCompanyId ? { company_id: selectedCompanyId } : {};
    }

    wireDeploymentPlanNavigation();

    (function initEmbed() {
      if (!isHubEmbedMode()) return;
      document.documentElement.classList.add("embed-document");
      document.getElementById("hubHeader")?.classList.add("hidden");
      document.body.classList.add("embed-mode");
      document.getElementById("mainLayout")?.classList.add("embed-layout-split");
      document.querySelector(".hub-main-col")?.classList.add("embed-scroll-main");
      document.body.style.minHeight = "100%";
      document.querySelector(".toolbar")?.classList.add("hub-embed-toolbar");
      const embedToolbar = document.querySelector(".hub-embed-toolbar");
      if (embedToolbar) {
        embedToolbar.setAttribute("aria-label", t("title"));
      }
      document.getElementById("layers")?.classList.add("hub-embed-layers");
      renderHubQuickNav();
      renderMonatsplanHero();
      updateEmbedLayersHint();
    })();

    window.addEventListener("message", (event) => {
      if (!event?.data || event.origin !== location.origin) return;
      if (event.data.type === "baupass-sync-lang") {
        syncHubLangFromParent(event.data.lang);
        return;
      }
      if (event.data.type !== "baupass-sync-token") return;
      const lang = String(event.data.lang || "").trim().slice(0, 2);
      if (lang) syncHubLangFromParent(lang);
      if (event.data.token) {
        window.BaupassAuth?.persistSessionToken?.(event.data.token);
      }
      const cid = String(event.data.companyId || "").trim();
      if (!cid || currentUserRole !== "superadmin" || cid === selectedCompanyId) return;
      selectedCompanyId = cid;
      const sel = document.getElementById("companySelect");
      if (sel) sel.value = cid;
      updateEmbedLayersHint();
      loadCatalog().catch(() => {});
    });

    function wireHubEmbedNav() {
      if (!window.BaupassEmbed) return;
      window.BaupassEmbed.wireEmbedNav("#hubNav a[href^='/']", hubCompanyParams());
      const aiLink = document.getElementById("aiCenterLink");
      if (aiLink) {
        aiLink.href = window.BaupassEmbed.withEmbed("/ai-command-center.html", hubCompanyParams());
        aiLink.addEventListener("click", (ev) => {
          ev.preventDefault();
          hubNavigateToView("ai-assistant");
        });
      }
    }

    function appendAi(role, text, isErr, extra) {
      const log = document.getElementById("aiLog");
      const div = document.createElement("div");
      div.className = role === "user" ? "msg-user" : (isErr ? "msg-bot msg-err" : "msg-bot");
      div.textContent = text;
      if (extra?.sources?.length) {
        const src = document.createElement("div");
        src.className = "msg-sources";
        src.textContent = `${t("aiSources")}: ${extra.sources.join(" · ")}`;
        div.appendChild(src);
      }
      const actions = extra?.actions || extra?.suggestedActions || [];
      if (actions.length && window.BaupassAiUi) {
        window.BaupassAiUi.renderActionButtons(div, actions, HUB_LANG);
      }
      log.appendChild(div);
      log.scrollTop = log.scrollHeight;
    }

    function aiCompanyRequired() {
      return currentUserRole === "superadmin" && !selectedCompanyId;
    }

    async function loadAiPrompts() {
      const el = document.getElementById("aiPrompts");
      if (!el) return;
      el.innerHTML = "";
      if (aiCompanyRequired()) return;
      try {
        let url = `/api/ai/prompts?lang=${encodeURIComponent(HUB_LANG)}`;
        if (selectedCompanyId) url += `&company_id=${encodeURIComponent(selectedCompanyId)}`;
        const data = await api(url);
        data.prompts.forEach((p) => {
          const btn = document.createElement("button");
          btn.type = "button";
          const label = p.text.length > 48 ? `${p.text.slice(0, 46)}…` : p.text;
          btn.textContent = label;
          btn.title = p.text;
          btn.addEventListener("click", () => submitAiQuestion(p.text));
          el.appendChild(btn);
        });
      } catch {
        el.innerHTML = "";
      }
    }

    function hubVoiceInputOptions() {
      return {
        inputId: "aiQuestion",
        buttonId: "aiVoiceBtn",
        sendId: "aiSendBtn",
        formId: "aiForm",
        hintId: "bpAiComposerHint",
        get lang() { return HUB_LANG; },
        get unsupportedHint() { return t("aiVoiceUnsupported"); },
        get hintText() { return t("voiceHint"); },
        multilingual: true,
        authHeaders: () => (window.BaupassAuth?.authHeaders?.() || {}),
        onMicError: (err) => {
          const msg = window.BaupassAiUi?.voiceErrorMessage?.(err, HUB_LANG) || t("aiVoiceMicDenied");
          appendAi("bot", msg, true);
        },
        onTranscribeError: (err) => {
          const msg = window.BaupassAiUi?.voiceErrorMessage?.(err, HUB_LANG) || String(err?.message || err);
          appendAi("bot", msg, true);
        },
        onListening: (active) => {
          const hint = document.getElementById("bpAiComposerHint");
          if (hint) hint.textContent = active ? t("aiVoiceListening") : t("voiceHint");
        },
        onTranscribing: (active) => {
          const hint = document.getElementById("bpAiComposerHint");
          if (hint) hint.textContent = active ? t("aiVoiceTranscribing") : t("voiceHint");
        },
      };
    }

    async function submitAiQuestion(q, options = {}) {
      const question = String(q || "").trim();
      if (!question) return;
      window.BaupassAiUi?.stopSpeaking?.();
      window.BaupassAiUi?.stopVoiceCapture?.("aiQuestion");
      const isVoiceTurn = Boolean(options.spoken);
      if (aiCompanyRequired()) {
        appendAi("bot", t("aiNeedCompany"), true);
        return;
      }
      appendAi("user", question);
      const log = document.getElementById("aiLog");
      const thinking = document.createElement("div");
      thinking.className = "msg-bot";
      thinking.textContent = t("aiThinking");
      log.appendChild(thinking);
      log.scrollTop = log.scrollHeight;
      try {
        const body = { question, lang: HUB_LANG, use_agent: true, agent_id: "operations", spoken: Boolean(options.spoken) };
        if (selectedCompanyId) body.company_id = selectedCompanyId;
        const data = await api("/api/ai/query", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify(body),
        });
        thinking.remove();
        if (data.error === "feature_not_available") {
          appendAi("bot", `${t("aiNeedEnterprise")} (${t("yourPlan")}: ${planLabel(data.plan)}, ${t("capUpgrade")} ${planLabel(data.requiredPlan)})`, true);
        } else if (data.error) {
          appendAi("bot", data.hint || data.error, true);
        } else {
          if (data.configWarning && !isVoiceTurn) appendAi("bot", data.configWarning, true);
          const sources = data.sources || data.contextSummary?.sources;
          const displayAnswer = isVoiceTurn && data.answer
            ? (window.BaupassAiUi?.cleanTextForDisplay?.(data.answer) || data.answer)
            : (data.answer || data.hint || t("aiAddKey"));
          appendAi("bot", displayAnswer, !data.answer, {
            sources: isVoiceTurn ? null : sources,
            actions: data.actions || data.suggestedActions,
          });
          if (data.answer) {
            await window.BaupassAiUi?.speakReply?.(displayAnswer, HUB_LANG, {
              spoken: isVoiceTurn,
            });
          }
        }
      } catch (e) {
        thinking.remove();
        const p = e.payload || {};
        if (p.error === "feature_not_available") {
          appendAi("bot", `${t("aiNeedEnterprise")} (${planLabel(p.plan)} → ${planLabel(p.requiredPlan)})`, true);
        } else if (p.error === "company_required") {
          appendAi("bot", p.hint || t("aiNeedCompany"), true);
        } else {
          appendAi("bot", p.hint || p.message || e.message || String(e), true);
        }
      }
    }

    document.getElementById("aiForm").addEventListener("submit", async (ev) => {
      ev.preventDefault();
      const input = document.getElementById("aiQuestion");
      window.BaupassAiUi?.stopVoiceCapture?.("aiQuestion");
      let q = input.value.trim();
      if (!q) return;
      const spoken = window.BaupassAiUi?.consumeVoiceInputFlag?.(input) || false;
      q = window.BaupassAiUi?.cleanQuestionText?.(q) || q;
      input.value = "";
      await submitAiQuestion(q, { spoken });
    });

    document.getElementById("aiBriefingBtn").addEventListener("click", async () => {
      if (aiCompanyRequired()) {
        appendAi("bot", t("aiNeedCompany"), true);
        return;
      }
      appendAi("user", t("aiBriefing"));
      const log = document.getElementById("aiLog");
      const thinking = document.createElement("div");
      thinking.className = "msg-bot";
      thinking.textContent = t("aiThinking");
      log.appendChild(thinking);
      try {
        let url = `/api/ai/briefing?lang=${encodeURIComponent(HUB_LANG)}`;
        if (selectedCompanyId) url += `&company_id=${encodeURIComponent(selectedCompanyId)}`;
        const data = await api(url);
        thinking.remove();
        if (data.error) {
          appendAi("bot", data.hint || data.error, true);
        } else {
          appendAi("bot", data.answer || t("aiAddKey"), !data.answer, { sources: data.sources });
        }
      } catch (e) {
        thinking.remove();
        appendAi("bot", e.payload?.hint || e.message || String(e), true);
      }
    });

    document.getElementById("search").addEventListener("input", renderLayers);
    document.getElementById("openAll").addEventListener("change", renderLayers);
    document.getElementById("filterPlan").addEventListener("change", (ev) => {
      filterEntitlement = ev.target.value;
      renderLayers();
    });

    document.getElementById("layers").addEventListener("click", async (ev) => {
      const cap = ev.target.closest(".cap[data-item-id]");
      if (cap && !ev.target.closest("a,button,[data-try]")) {
        openCapDetail(cap.getAttribute("data-item-id"));
        return;
      }
      const btn = ev.target.closest("[data-try]");
      if (!btn) return;
      const path = btn.getAttribute("data-try");
      try {
        const data = await api(path);
        alert(JSON.stringify(data, null, 2).slice(0, 1200));
      } catch (e) {
        alert(`${t("apiErrorPrefix")}: ${e.message}`);
      }
    });
    document.getElementById("capDetailClose")?.addEventListener("click", closeCapDetail);
    document.getElementById("capDetailPanel")?.addEventListener("click", (ev) => {
      if (ev.target.id === "capDetailPanel") closeCapDetail();
    });

    document.getElementById("hubLangSelect")?.addEventListener("change", (ev) => {
      setHubLang(ev.target.value);
    });

    applyStaticI18n();
    (async () => {
      try {
        const boot = window.BaupassAuth?.bootstrapSession
          ? await window.BaupassAuth.bootstrapSession()
          : await api("/api/session/bootstrap");
        if (boot?.authenticated === false || !boot?.user?.role) throw new Error("auth");
        currentUserRole = boot?.user?.role || "";
        if (currentUserRole === "company-admin" && boot?.user?.company_id) {
          selectedCompanyId = boot.user.company_id;
        }
        if (currentUserRole === "superadmin") {
          const qsCid = new URLSearchParams(location.search).get("company_id") || "";
          if (qsCid) selectedCompanyId = qsCid;
          else if (boot?.user?.preview_company_id && !selectedCompanyId) {
            selectedCompanyId = boot.user.preview_company_id;
          }
        }
      } catch {
        currentUserRole = "";
      }
      await loadCompaniesForSuperadmin();
      await loadCatalog();
      if (window.BaupassAiUi) {
        window.BaupassAiUi.bindVoiceInput(hubVoiceInputOptions());
      }
    })();
  </script>
</body>
</html>
