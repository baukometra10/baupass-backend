<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="apple-mobile-web-app-title" content="SUPPIX Live Ops" />
  <meta name="application-name" content="SUPPIX Live Ops" />
  <title>SUPPIX — Live Ops Map</title>
  <link rel="apple-touch-icon" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <link rel="icon" type="image/svg+xml" sizes="192x192" href="/branding/suppix-ai-mark.svg" />
  <link id="appFavicon" rel="icon" type="image/png" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
  <link rel="stylesheet" href="/design-tokens.css" />
  <link rel="stylesheet" href="/ops-shell.css" />
  <style>
    * { box-sizing: border-box; }
    body { margin: 0; font-family: system-ui, sans-serif; background: var(--bg); color: var(--text); height: 100vh; display: flex; flex-direction: column; }
    header {
      padding: 0.65rem 1rem; border-bottom: 1px solid var(--border); background: var(--panel);
      display: flex; flex-wrap: wrap; gap: 0.75rem; align-items: center; justify-content: space-between;
    }
    header a { color: var(--accent); font-size: 0.85rem; margin-inline-start: 0.75rem; }
    #map { flex: 1; min-height: 300px; }
    .legend {
      position: absolute; bottom: 12px; left: 12px; z-index: 500; background: var(--panel);
      border: 1px solid var(--border); border-radius: 10px; padding: 0.55rem 0.8rem; font-size: 0.78rem;
      min-width: 9.5rem;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.28);
    }
    .legend-row {
      display: flex;
      align-items: center;
      gap: 0.45rem;
      line-height: 1.35;
      white-space: nowrap;
    }
    .legend-row + .legend-row { margin-top: 0.35rem; }
    .legend-label { flex: 1 1 auto; min-width: 0; }
    .legend .legend-pin {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 18px;
      height: 18px;
      border-radius: 0;
      margin-inline-end: 6px;
      vertical-align: middle;
    }
    .legend .legend-pin svg { width: 16px; height: 16px; display: block; }
    .ops-map-pin-wrap {
      background: transparent;
      border: none;
    }
    .ops-map-pin {
      display: flex;
      flex-direction: column;
      align-items: center;
      filter: drop-shadow(0 2px 5px rgba(0, 0, 0, 0.55));
      pointer-events: auto;
    }
    .ops-map-pin-svg {
      width: 34px;
      height: 34px;
      display: block;
    }
    .ops-map-pin-worker { color: #5eead4; }
    .ops-map-pin-geofence { color: #38bdf8; }
    .ops-map-pin-gate { color: #fbbf24; }
    .ops-map-pin-label {
      margin-top: 1px;
      padding: 2px 6px;
      border-radius: 6px;
      background: rgba(8, 12, 18, 0.92);
      border: 1px solid rgba(148, 163, 184, 0.35);
      color: #f8fafc;
      font-size: 10px;
      font-weight: 700;
      line-height: 1.2;
      white-space: nowrap;
      max-width: 128px;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .side {
      width: 280px; max-width: 40vw; border-inline-start: 1px solid var(--border);
      background: var(--panel); overflow: auto; font-size: 0.8rem;
    }
    .wrap { display: flex; flex: 1; min-height: 0; position: relative; }
    .worker-row { padding: 0.45rem 0.65rem; border-bottom: 1px solid var(--border); cursor: pointer; }
    .worker-row:hover { background: #14202c; }
    #status { font-size: 0.8rem; color: #94a3b8; }
    @media (max-width: 800px) { .side { display: none; } }
  </style>
</head>
<body class="ops-app">
  <header class="ops-header">
    <div style="display:flex;align-items:center;gap:0.65rem;">
      <img data-tenant-logo class="tenant-logo-chip" src="/branding/suppix-ai-mark.svg" alt="Suppix AI" />
      <div>
        <strong id="opsMapTitle">Live Ops Map</strong>
        <span id="status">Laden…</span>
      </div>
    </div>
    <nav>
      <select id="companySelect" style="display:none"></select>
      <a href="/ops-command-center.html" data-omapi18n="navCommand">Command Center</a>
      <a href="/ai-command-center.html" data-omapi18n="navAi">KI</a>
      <a href="/admin-v2/index.html" data-omapi18n="navAdmin">Admin</a>
      <select id="opsMapLangSelect" aria-label="Sprache" style="font-size:0.78rem;padding:0.2rem 0.35rem;border-radius:6px;border:1px solid var(--border);background:var(--panel);color:var(--text);">
        <option value="de">DE</option><option value="en">EN</option><option value="ar">AR</option>
        <option value="tr">TR</option><option value="fr">FR</option><option value="es">ES</option>
        <option value="it">IT</option><option value="pl">PL</option>
      </select>
      <button type="button" id="refreshBtn" style="margin-inline-start:8px">Aktualisieren</button>
    </nav>
  </header>
  <div class="wrap">
    <div id="map"></div>
    <aside class="side" id="workerList"></aside>
    <div class="legend">
      <div class="legend-row"><span class="legend-pin ops-map-pin-worker"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" fill="currentColor"/></svg></span><span class="legend-label" data-omapi18n="legendOnSite">Auf Baustelle</span></div>
      <div class="legend-row"><span class="legend-pin ops-map-pin-geofence"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" fill="currentColor"/></svg></span><span class="legend-label" data-omapi18n="legendGeofence">Geofence</span></div>
      <div class="legend-row"><span class="legend-pin ops-map-pin-gate"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7zm0 9.5a2.5 2.5 0 1 1 0-5 2.5 2.5 0 0 1 0 5z" fill="currentColor"/></svg></span><span class="legend-label" data-omapi18n="legendGate">Gate (heute)</span></div>
    </div>
  </div>
  <script src="/embed-helpers.js?v=20260609csrf"></script>
  <script src="/ops-live-map-i18n.js?v=20260705g"></script>
  <script src="https://cdn.jsdelivr.net/npm/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
  <script src="https://cdn.jsdelivr.net/npm/socket.io-client@4.7.5/dist/socket.io.min.js" crossorigin="anonymous"></script>
  <script src="/ops-realtime.js"></script>
  <script>
    (function initEmbed() {
      const params = new URLSearchParams(location.search);
      if (params.get("embed") === "1") {
        document.body.classList.add("embed-mode");
        document.querySelectorAll("header.ops-header nav a").forEach((el) => el.remove());
      }
    })();

    const qs = new URLSearchParams(location.search);
    let companyId = qs.get("company_id") || "";
    let map, layers = { zones: [], workers: [], gates: [] };

    async function api(path) {
      const headers = window.BaupassAuth
        ? window.BaupassAuth.authHeaders({ Accept: "application/json" })
        : { Accept: "application/json" };
      const r = await fetch(path, { credentials: "include", headers });
      const d = await r.json().catch(() => ({}));
      if (r.status === 401) throw new Error("auth");
      if (!r.ok) throw new Error(d.error || d.hint || r.statusText);
      return d;
    }

    function clearLayers(key) {
      layers[key].forEach((l) => map.removeLayer(l));
      layers[key] = [];
    }

    function escapeHtml(value) {
      return String(value || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/"/g, "&quot;");
    }

    const PIN_SVG =
      '<svg viewBox="0 0 24 24" class="ops-map-pin-svg" aria-hidden="true">' +
      '<path d="M12 2C8.13 2 5 5.13 5 9c0 5.25 7 13 7 13s7-7.75 7-13c0-3.87-3.13-7-7-7z" fill="currentColor"/>' +
      '<circle cx="12" cy="9" r="2.6" fill="#fff"/>' +
      "</svg>";

    function mapPinIcon(kind, label) {
      const safeLabel = escapeHtml(label);
      const labelHtml = safeLabel
        ? `<span class="ops-map-pin-label">${safeLabel}</span>`
        : "";
      return L.divIcon({
        className: "ops-map-pin-wrap",
        html: `<div class="ops-map-pin ops-map-pin-${kind}" role="img" aria-label="${safeLabel}">${PIN_SVG}${labelHtml}</div>`,
        iconSize: [36, safeLabel ? 52 : 36],
        iconAnchor: [18, safeLabel ? 50 : 34],
        popupAnchor: [0, safeLabel ? -48 : -32],
      });
    }

    function addPinMarker(lat, lng, kind, label, popupHtml) {
      const marker = L.marker([lat, lng], {
        icon: mapPinIcon(kind, label),
        title: label || "",
        zIndexOffset: kind === "worker" ? 300 : kind === "gate" ? 200 : 100,
      }).addTo(map);
      if (popupHtml) marker.bindPopup(popupHtml);
      return marker;
    }

    function renderMap(data) {
      const c = data.center || { lat: 52.52, lng: 13.405 };
      if (!map) {
        map = L.map("map").setView([c.lat, c.lng], 15);
        L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
          maxZoom: 19, attribution: "© OSM",
        }).addTo(map);
      }
      clearLayers("zones");
      clearLayers("workers");
      clearLayers("gates");
      const bounds = [];
      (data.geofences || []).forEach((z) => {
        if (z.latitude == null) return;
        const circle = L.circle([z.latitude, z.longitude], {
          radius: z.radius_meters || 50,
          color: "#38bdf8",
          weight: 2,
          fillColor: "#38bdf8",
          fillOpacity: 0.16,
        }).addTo(map).bindPopup(`<b>${escapeHtml(z.site_name)}</b><br>${z.radius_meters}m`);
        layers.zones.push(circle);
        const siteLabel = z.site_name || "Geofence";
        const pin = addPinMarker(
          z.latitude,
          z.longitude,
          "geofence",
          siteLabel,
          `<b>${escapeHtml(siteLabel)}</b><br>${z.radius_meters || 50}m Radius`,
        );
        layers.zones.push(pin);
        bounds.push([z.latitude, z.longitude]);
      });
      (data.workersOnSite || []).forEach((w) => {
        const label = w.name || "MA";
        const popup =
          `<b>${escapeHtml(w.name)}</b><br>${escapeHtml(w.site || "")}` +
          `<br>${escapeHtml(w.gate || "")}<br><small>${escapeHtml((w.lastAccess || "").slice(0, 19))}</small>`;
        const m = addPinMarker(w.lat, w.lng, "worker", label, popup);
        layers.workers.push(m);
        bounds.push([w.lat, w.lng]);
      });
      (data.gates || []).forEach((g) => {
        const label = g.name || "Gate";
        const m = addPinMarker(g.lat, g.lng, "gate", label, `<b>${escapeHtml(label)}</b>`);
        layers.gates.push(m);
        bounds.push([g.lat, g.lng]);
      });
      if (bounds.length > 1) map.fitBounds(bounds, { padding: [40, 40] });
      document.getElementById("status").textContent =
        window.opsMapT("statusLine", {
          onSite: data.counts?.onSite ?? 0,
          zones: data.counts?.zones ?? 0,
          security: data.openSecurityAlerts ?? 0,
        });
      const list = document.getElementById("workerList");
      list.innerHTML = `<h3 style='margin:0.5rem 0.65rem;font-size:0.85rem'>${window.opsMapT("sidebarTitle")}</h3>` +
        (data.workersOnSite || []).map((w) =>
          `<div class="worker-row" data-lat="${w.lat}" data-lng="${w.lng}"><strong>${w.name}</strong><br><span style="color:#94a3b8">${w.site||""} · ${w.gate||""}</span></div>`
        ).join("") || `<p style='padding:0.65rem'>${window.opsMapT("nobodyCheckedIn")}</p>`;
      list.querySelectorAll(".worker-row").forEach((row) => {
        row.onclick = () => map.setView([+row.dataset.lat, +row.dataset.lng], 17);
      });
    }

    async function load() {
      if (!companyId) {
        document.getElementById("status").textContent = window.opsMapT("selectCompany");
        return;
      }
      const data = await api(`/api/ops-os/live-map?company_id=${encodeURIComponent(companyId)}`);
      renderMap(data);
    }

    async function applyOpsMapBranding() {
      try {
        if (window.BaupassAuth?.resolveTenantBranding) {
          await window.BaupassAuth.resolveTenantBranding({ companyId });
        }
      } catch {
        // optional
      }
    }

    async function boot() {
      try {
        const boot = window.BaupassAuth?.bootstrapSession
          ? await window.BaupassAuth.bootstrapSession()
          : await api("/api/session/bootstrap");
        const role = boot?.user?.role || "";
        if (role === "company-admin") companyId = boot.user.company_id || companyId;
        if (role === "superadmin") {
          const sel = document.getElementById("companySelect");
          sel.style.display = "inline-block";
          const rows = await api("/api/companies");
          sel.innerHTML = `<option value="">${window.opsMapT("companyPlaceholder")}</option>` + rows.filter(c => !c.deleted_at).map(c =>
            `<option value="${c.id}" ${c.id === companyId ? "selected" : ""}>${c.name}</option>`).join("");
          sel.onchange = () => {
            companyId = sel.value;
            applyOpsMapBranding().finally(() => load().catch(e => alert(e.message)));
          };
        }
        await applyOpsMapBranding();
        await load();
        if (window.SUPPIXOpsRealtime) {
          await window.SUPPIXOpsRealtime.start({
            companyId,
            feedEl: null,
            onMode: (mode) => {
              const st = document.getElementById("status");
              if (st && !st.textContent.includes("websocket") && !st.textContent.includes("sse")) {
                st.textContent += ` · ${mode}`;
              }
            },
            onEvent: () => load().catch(() => {}),
          });
        } else {
          let url = "/api/ops-os/events/stream";
          if (companyId) url += `?company_id=${encodeURIComponent(companyId)}`;
          const es = new EventSource(url, { withCredentials: true });
          es.onmessage = (ev) => {
            try {
              const p = JSON.parse(ev.data);
              if (p.type === "events") load().catch(() => {});
            } catch { /* ignore */ }
          };
        }
      } catch (e) {
        document.getElementById("status").textContent = window.opsMapT("authRequired");
        alert(e.message);
      }
    }

    window.__opsMapReload = () => load().catch((e) => alert(e.message));

    document.getElementById("refreshBtn")?.addEventListener("click", () =>
      load().catch((e) => alert(e.message)),
    );
    window.initOpsMapLangSync?.();
    boot();
  </script>
</body>
</html>
