<!DOCTYPE html>
<html lang="de" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Language" content="de" />
  <meta name="google" content="notranslate" />
  <meta name="theme-color" content="#050816" />
  <link rel="manifest" href="./emp-app-manifest.json?v=20260704d" />
  <link rel="apple-touch-icon" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <title>SUPPIX App installieren</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 20% 10%, #fff8f1, #f5ecdf 55%, #eadcc8 100%);
      color: #1f1f1f;
      padding: 20px;
    }
    .card {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      padding: 24px;
      display: grid;
      gap: 14px;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    button, a {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    #openAppBtn {
      background: linear-gradient(135deg, #c78652, #a66a3d);
      color: #fff;
    }
    #installBtn {
      background: #f6efe2;
      color: #3e2f26;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }
    .hint {
      font-size: 0.9rem;
      color: #5f5f5f;
    }
    .card-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 12px;
    }
    #workerInstallLangSelect {
      font-size: 0.82rem;
      padding: 0.25rem 0.35rem;
      border-radius: 8px;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }
  </style>
</head>
<body class="notranslate" translate="no">
  <main class="card">
    <div class="card-head">
      <h1 id="title" data-wii18n="title">Mitarbeiter-App installieren</h1>
      <select id="workerInstallLangSelect" aria-label="Sprache">
        <option value="de">DE</option><option value="en">EN</option><option value="ar">AR</option>
        <option value="tr">TR</option><option value="fr">FR</option><option value="es">ES</option><option value="it">IT</option><option value="pl">PL</option>
      </select>
    </div>
    <p id="subtitle" data-wii18n="subtitle">Installiere die SUPPIX App auf deinem Handy. Danach siehst du deinen digitalen Ausweis jederzeit direkt in der App.</p>
    <div class="actions">
      <button id="openAppBtn" type="button" data-wii18n="openApp">Ausweis in App öffnen</button>
      <button id="installBtn" type="button" data-wii18n="install">App installieren</button>
    </div>
    <p id="hint" class="hint" data-wii18n="hintDefault">Falls kein Installationsfenster erscheint: Browser-Menü öffnen und „Zum Startbildschirm“ bzw. „App installieren“ wählen.</p>
  </main>

  <script src="./worker-install-i18n.js?v=20260705h"></script>
  <script>
    window.initWorkerInstallLangSync();

    const params = new URL(window.location.href).searchParams;
    const accessToken = params.get("access") || "";
    const badgeId = (params.get("badge") || "").trim();
    const apiBase = params.get("apiBase") || "";
    const shouldAutoLaunch = params.get("launch") === "1" || window.matchMedia?.("(display-mode: standalone)")?.matches || Boolean(window.navigator.standalone);
    if (accessToken) {
      try {
        const tokenKeys = [
          "baupass-worker-access-token",
          "workpass-worker-access-token",
          "baupass-pending-access-token",
          "workpass-pending-access-token",
        ];
        tokenKeys.forEach((key) => {
          localStorage.setItem(key, accessToken);
        });
      } catch {
        // ignore storage failures
      }
    }
    if (badgeId) {
      try {
        localStorage.setItem("workpass-worker-badge-login", badgeId);
        sessionStorage.setItem("workpass-qr-pending-badge", badgeId);
      } catch {
        // ignore storage failures
      }
    }

    function apiBaseMatchesOrigin(base) {
      if (!base) return false;
      try {
        return new URL(base).origin === window.location.origin;
      } catch {
        return false;
      }
    }

    if (apiBaseMatchesOrigin(apiBase)) {
      try {
        ["baupass-api-base", "workpass-api-base"].forEach((key) => {
          localStorage.setItem(key, apiBase);
        });
      } catch {
        // ignore storage failures
      }
    } else {
      try {
        ["baupass-api-base", "workpass-api-base"].forEach((key) => {
          localStorage.removeItem(key);
        });
      } catch {
        // ignore storage failures
      }
    }

    async function resolveLatestTargetUrl() {
      let buildInfo = { build: "20260628c", entry: "/emp-app.html" };
      try {
        const response = await fetch(`./worker-build.json?t=${Date.now()}`, { cache: "no-store" });
        if (response.ok) {
          buildInfo = { ...buildInfo, ...(await response.json()) };
        }
      } catch {
        // keep fallback build info
      }

      const target = new URL(buildInfo.entry || "/emp-app.html", window.location.origin);
      target.searchParams.set("view", "card");
      target.searchParams.set("v", buildInfo.build || "20260628c");
      if (accessToken) {
        target.searchParams.set("access", accessToken);
      }
      if (badgeId) {
        target.searchParams.set("badge", badgeId);
        target.searchParams.set("fast", "1");
      }
      target.searchParams.set("launch", "1");
      if (apiBaseMatchesOrigin(apiBase)) {
        target.searchParams.set("apiBase", apiBase);
      }
      return target.toString();
    }

    let deferredInstallPrompt = null;
    const installBtn = document.querySelector("#installBtn");
    const openAppBtn = document.querySelector("#openAppBtn");
    const hint = document.querySelector("#hint");

    window.addEventListener("beforeinstallprompt", (event) => {
      deferredInstallPrompt = event;
      hint.dataset.dynamic = "1";
      hint.textContent = window.workerInstallT("hintAfterPrompt");
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredInstallPrompt) {
        hint.dataset.dynamic = "1";
        hint.textContent = window.workerInstallT("hintNoPrompt");
        return;
      }
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
    });

    openAppBtn.addEventListener("click", async () => {
      window.location.href = await resolveLatestTargetUrl();
    });

    if (shouldAutoLaunch) {
      hint.dataset.dynamic = "1";
      hint.textContent = window.workerInstallT("hintAutoLaunch");
      Promise.resolve()
        .then(resolveLatestTargetUrl)
        .then((targetUrl) => {
          window.location.replace(targetUrl);
        })
        .catch(() => {});
    }
  </script>
</body>
</html>
