<!DOCTYPE html>
<html lang="de" translate="no">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta http-equiv="Content-Language" content="de" />
  <meta name="google" content="notranslate" />
  <meta name="theme-color" content="#050816" />
  <link rel="manifest" href="./emp-app-manifest.json?v=20260513o" />
  <link rel="apple-touch-icon" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/branding/suppix-icon-192.png" />
  <title>SUPPIX App installieren</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: "Segoe UI", Arial, sans-serif;
      background: radial-gradient(circle at 20% 10%, #fff8f1, #f5ecdf 55%, #eadcc8 100%);
      color: #1f1f1f;
      padding: 20px;
    }
    .card {
      width: min(520px, 100%);
      background: #fff;
      border: 1px solid rgba(0, 0, 0, 0.08);
      border-radius: 20px;
      box-shadow: 0 18px 40px rgba(0, 0, 0, 0.12);
      padding: 24px;
      display: grid;
      gap: 14px;
    }
    h1 {
      margin: 0;
      font-size: 1.5rem;
    }
    p {
      margin: 0;
      line-height: 1.5;
    }
    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 8px;
    }
    button, a {
      appearance: none;
      border: 0;
      border-radius: 12px;
      padding: 12px 14px;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
    #openAppBtn {
      background: linear-gradient(135deg, #c78652, #a66a3d);
      color: #fff;
    }
    #installBtn {
      background: #f6efe2;
      color: #3e2f26;
      border: 1px solid rgba(0, 0, 0, 0.12);
    }
    .hint {
      font-size: 0.9rem;
      color: #5f5f5f;
    }
  </style>
</head>
<body class="notranslate" translate="no">
  <main class="card">
    <h1>Mitarbeiter-App installieren</h1>
    <p>Installiere die SUPPIX App auf deinem Handy. Danach siehst du deinen digitalen Ausweis jederzeit direkt in der App.</p>
    <div class="actions">
      <button id="openAppBtn" type="button">Ausweis in App oeffnen</button>
      <button id="installBtn" type="button">App installieren</button>
    </div>
    <p id="hint" class="hint">Falls kein Installationsfenster erscheint: Browser-Menue oeffnen und "Zum Startbildschirm" bzw. "App installieren" waehlen.</p>
  </main>

  <script>
    const params = new URL(window.location.href).searchParams;
    const accessToken = params.get("access") || "";
    const apiBase = params.get("apiBase") || "";
    const shouldAutoLaunch = params.get("launch") === "1" || window.matchMedia?.("(display-mode: standalone)")?.matches || Boolean(window.navigator.standalone);
    if (accessToken) {
      try {
        const tokenKeys = [
          "baupass-worker-access-token",
          "workpass-worker-access-token",
          "baupass-pending-access-token",
          "workpass-pending-access-token",
        ];
        tokenKeys.forEach((key) => {
          localStorage.setItem(key, accessToken);
        });
      } catch {
        // ignore storage failures
      }
    }

    function apiBaseMatchesOrigin(base) {
      if (!base) return false;
      try {
        return new URL(base).origin === window.location.origin;
      } catch {
        return false;
      }
    }

    if (apiBaseMatchesOrigin(apiBase)) {
      try {
        ["baupass-api-base", "workpass-api-base"].forEach((key) => {
          localStorage.setItem(key, apiBase);
        });
      } catch {
        // ignore storage failures
      }
    } else {
      try {
        ["baupass-api-base", "workpass-api-base"].forEach((key) => {
          localStorage.removeItem(key);
        });
      } catch {
        // ignore storage failures
      }
    }

    async function resolveLatestTargetUrl() {
      let buildInfo = { build: "20260513o", entry: "/emp-app.html" };
      try {
        const response = await fetch(`./worker-build.json?t=${Date.now()}`, { cache: "no-store" });
        if (response.ok) {
          buildInfo = { ...buildInfo, ...(await response.json()) };
        }
      } catch {
        // keep fallback build info
      }

      const target = new URL(buildInfo.entry || "/emp-app.html", window.location.origin);
      target.searchParams.set("view", "card");
      target.searchParams.set("v", buildInfo.build || "20260513o");
      if (accessToken) {
        target.searchParams.set("access", accessToken);
      }
      if (apiBaseMatchesOrigin(apiBase)) {
        target.searchParams.set("apiBase", apiBase);
      }
      return target.toString();
    }

    let deferredInstallPrompt = null;
    const installBtn = document.querySelector("#installBtn");
    const openAppBtn = document.querySelector("#openAppBtn");
    const hint = document.querySelector("#hint");

    window.addEventListener("beforeinstallprompt", (event) => {
      deferredInstallPrompt = event;
      hint.textContent = "Tippe auf 'App installieren', dann auf 'Ausweis in App oeffnen'.";
    });

    installBtn.addEventListener("click", async () => {
      if (!deferredInstallPrompt) {
        hint.textContent = "Kein automatischer Prompt verfuegbar. Bitte Browser-Menue nutzen: 'Zum Startbildschirm' / 'App installieren'.";
        return;
      }
      deferredInstallPrompt.prompt();
      await deferredInstallPrompt.userChoice;
      deferredInstallPrompt = null;
    });

    openAppBtn.addEventListener("click", async () => {
      window.location.href = await resolveLatestTargetUrl();
    });

    if (shouldAutoLaunch) {
      hint.textContent = "App wird aktualisiert und geoeffnet...";
      Promise.resolve()
        .then(resolveLatestTargetUrl)
        .then((targetUrl) => {
          window.location.replace(targetUrl);
        })
        .catch(() => {});
    }
  </script>
</body>
</html>
